<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Forest Open World Game</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #9fd3ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }
    canvas { display: block; }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(238, 242, 247, 0.78);
      backdrop-filter: blur(8px);
      color: #222;
      font-size: 16px;
      font-weight: 800;
      transition: opacity 0.25s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #ui {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 30;
      min-width: 280px;
      max-width: min(92vw, 520px);
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      color: #222;
      line-height: 1.5;
      font-size: 14px;
      user-select: none;
    }
    #title {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 4px;
    }
    #status {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 800;
      color: #1d3f7a;
    }
    #buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .modeBtn {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      background: #2f82ff;
      box-shadow: 0 8px 18px rgba(47, 130, 255, 0.22);
    }
    .modeBtn.active { background: #1d5fc0; }
    .modeBtn.attack {
      background: #ff6a2c;
      box-shadow: 0 8px 18px rgba(255, 106, 44, 0.22);
    }
    .modeBtn.attack.active { background: #cc4e1d; }

    #help {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.82;
      line-height: 1.5;
    }

    #playerHud {
      margin-top: 10px;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
    }
    .hudRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #1c3359;
    }
    .barWrap {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(28, 51, 89, 0.12);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.12);
    }
    .barFill {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #4fd06f, #19a54f);
      transition: width 0.08s linear;
    }

    #worldUI {
      position: fixed;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      overflow: hidden;
    }

    .boarTag {
      position: absolute;
      min-width: 120px;
      transform: translate(-50%, -100%);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
      opacity: 1;
      transition: opacity 0.1s linear;
      will-change: transform, opacity;
    }
    .boarLevel {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(0,0,0,0.50);
      margin-bottom: 5px;
    }
    .boarHpText {
      margin-top: 4px;
      font-size: 11px;
      opacity: 0.95;
    }
    .boarBarWrap {
      width: 120px;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.25);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.28);
    }
    .boarBarFill {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff5b5b, #e61d1d);
      transition: width 0.08s linear;
    }

    #sideButtons {
      position: fixed;
      right: 18px;
      bottom: 150px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 35;
      pointer-events: auto;
    }
    .sideBtn {
      width: 124px;
      height: 60px;
      border: 0;
      border-radius: 18px;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(0,0,0,0.16);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #herbCollectBtn {
      background: linear-gradient(180deg, #69d66f, #239b3a);
      display: none;
    }
    #captureBtn {
      background: linear-gradient(180deg, #ffb14d, #ff7b1f);
    }
    #inventoryBtn {
      background: linear-gradient(180deg, #4e92ff, #2f67d6);
    }
    .sideBtn:active { transform: scale(0.97); }

    #inventoryModal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10, 18, 30, 0.48);
      backdrop-filter: blur(6px);
      pointer-events: auto;
    }
    #inventoryModal.open {
      display: flex;
    }
    #inventoryPanel {
      width: min(92vw, 420px);
      max-height: min(72vh, 560px);
      overflow: auto;
      border-radius: 22px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
      padding: 18px;
      color: #1a2740;
    }
    #inventoryTitle {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 10px;
    }
    #inventoryInfo {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 14px;
      color: #3a4c73;
    }
    #inventoryList {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }
    .inventoryItem {
      padding: 11px 12px;
      border-radius: 14px;
      background: #f3f7ff;
      border: 1px solid rgba(47, 103, 214, 0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 800;
      font-size: 14px;
    }
    .inventoryItemText {
      min-width: 0;
      word-break: break-word;
    }
    .deployBtn {
      border: 0;
      border-radius: 12px;
      background: linear-gradient(180deg, #ff8f4d, #ff6a2c);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      padding: 8px 10px;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .inventoryEmpty {
      padding: 14px;
      border-radius: 14px;
      background: #f3f7ff;
      border: 1px dashed rgba(47, 103, 214, 0.22);
      font-weight: 800;
      font-size: 14px;
      color: #516383;
    }
    #closeInventoryBtn {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, #4e92ff, #2f67d6);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    #toast {
      position: fixed;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      z-index: 70;
      max-width: min(92vw, 520px);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(18, 24, 34, 0.82);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(0,0,0,0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #toast.show {
      opacity: 1;
    }

    #joystick {
      position: fixed;
      left: 18px;
      bottom: 18px;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 10px 30px rgba(0,0,0,0.08);
      backdrop-filter: blur(8px);
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 35;
    }
    #joystick::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.35);
    }
    #joyKnob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 54px;
      height: 54px;
      margin-left: -27px;
      margin-top: -27px;
      border-radius: 50%;
      background: rgba(47, 130, 255, 0.9);
      box-shadow: 0 8px 18px rgba(47, 130, 255, 0.25);
      transform: translate(0, 0);
    }

    #jumpBtn {
      position: fixed;
      right: 18px;
      bottom: 28px;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 0;
      background: linear-gradient(180deg, #ff8f4d, #ff6a2c);
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.03em;
      box-shadow: 0 10px 24px rgba(255, 106, 44, 0.28);
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 35;
    }
    #jumpBtn:active { transform: scale(0.97); }

    @media (max-width: 700px) {
      #ui {
        min-width: 0;
        max-width: calc(100vw - 24px);
      }
      #help { font-size: 11px; }
      #jumpBtn {
        width: 94px;
        height: 94px;
        font-size: 16px;
      }
      #joystick {
        width: 118px;
        height: 118px;
      }
      #joyKnob {
        width: 48px;
        height: 48px;
        margin-left: -24px;
        margin-top: -24px;
      }
      #sideButtons {
        bottom: 138px;
      }
      .sideBtn {
        width: 108px;
        height: 52px;
        font-size: 13px;
      }
      .boarTag {
        min-width: 100px;
      }
      .boarBarWrap {
        width: 100px;
      }
      .inventoryItem {
        font-size: 13px;
      }
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="loading">読み込み中…</div>
  <div id="toast"></div>

  <div id="ui">
    <div id="title">Forest Open World Game</div>

    <div id="playerHud">
      <div class="hudRow">
        <span>プレイヤーHP</span>
        <span id="playerHpText">200 / 200</span>
      </div>
      <div class="barWrap">
        <div id="playerHpFill" class="barFill"></div>
      </div>
    </div>

    <div id="status">待機中</div>
    <div id="buttons">
      <button id="dashBtn" class="modeBtn">ダッシュ</button>
      <button id="attackBtn" class="modeBtn attack">攻撃</button>
    </div>
    <div id="help">
      WASD / 矢印 / スティックで移動<br>
      薬草は1m以内で回収ボタン表示 / タップ回収<br>
      イノシシは攻撃でHPを削って10%以下で捕獲できます
    </div>
  </div>

  <div id="worldUI"></div>

  <div id="sideButtons">
    <button id="herbCollectBtn" class="sideBtn">薬草回収</button>
    <button id="captureBtn" class="sideBtn">捕獲（ゲット）</button>
    <button id="inventoryBtn" class="sideBtn">インベントリ</button>
  </div>

  <div id="inventoryModal" aria-hidden="true">
    <div id="inventoryPanel">
      <div id="inventoryTitle">インベントリ</div>
      <div id="inventoryInfo">0 / 10 体</div>
      <div id="inventoryList"></div>
      <button id="closeInventoryBtn">閉じる</button>
    </div>
  </div>

  <div id="joystick" aria-label="joystick">
    <div id="joyKnob"></div>
  </div>
  <button id="jumpBtn">JUMP</button>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { FBXLoader } from "three/addons/loaders/FBXLoader.js";

    const WORLD_SIZE = 1200;
    const WORLD_HALF = WORLD_SIZE / 2;
    const ACTIVE_RADIUS = 100;
    const ACTIVE_RADIUS_SQ = ACTIVE_RADIUS * ACTIVE_RADIUS;

    const TREE_COUNT = 1000;
    const HERB_COUNT = 1500;
    const BOAR_COUNT = 220;
    const STONE_COUNT = 500;

    const INVENTORY_LIMIT = 10;
    const STORAGE_KEY = "forest_open_world_inventory_v1";

    const TREE_URLS = ["./tree.glb"];
    const BOAR_URLS = ["./boar.glb"];
    const HERB_URLS = ["./herb.glb", "./yakusou.glb"];
    const STONE_URLS = ["./isi.glb", "./iwa.glb"];
    const PLAYER_FBX_URL = "./Meshy_AI_biped_Animation_Walking_withSkin.fbx";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9fd3ff);
    scene.fog = new THREE.Fog(0x9fd3ff, 70, 320);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 800);
    camera.position.set(0, 2.5, 6.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.domElement.style.touchAction = "none";
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xbbe6ff, 0x4d7a3b, 1.9));

    const sun = new THREE.DirectionalLight(0xffffff, 3.2);
    sun.position.set(25, 35, 18);
    sun.castShadow = true;
    sun.shadow.mapSize.set(4096, 4096);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 180;
    sun.shadow.camera.left = -90;
    sun.shadow.camera.right = 90;
    sun.shadow.camera.top = 90;
    sun.shadow.camera.bottom = -90;
    sun.shadow.bias = -0.00015;
    scene.add(sun);

    const fill = new THREE.PointLight(0xffffff, 0.7, 160);
    fill.position.set(-20, 18, -12);
    scene.add(fill);

    const uiStatus = document.getElementById("status");
    const loading = document.getElementById("loading");
    const dashBtn = document.getElementById("dashBtn");
    const attackBtn = document.getElementById("attackBtn");
    const playerHpText = document.getElementById("playerHpText");
    const playerHpFill = document.getElementById("playerHpFill");
    const worldUI = document.getElementById("worldUI");
    const toastEl = document.getElementById("toast");
    const herbCollectBtn = document.getElementById("herbCollectBtn");
    const captureBtn = document.getElementById("captureBtn");
    const inventoryBtn = document.getElementById("inventoryBtn");
    const inventoryModal = document.getElementById("inventoryModal");
    const inventoryList = document.getElementById("inventoryList");
    const inventoryInfo = document.getElementById("inventoryInfo");
    const closeInventoryBtn = document.getElementById("closeInventoryBtn");

    const joystickEl = document.getElementById("joystick");
    const joyKnob = document.getElementById("joyKnob");
    const jumpBtn = document.getElementById("jumpBtn");

    const terrainGeo = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 240, 240);
    terrainGeo.rotateX(-Math.PI / 2);

    function safeNum(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function makeId() {
      return `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function getTerrainHeight(x, z) {
      const px = safeNum(x, 0);
      const pz = safeNum(z, 0);
      let h = 0;
      h += Math.sin(px * 0.0062) * 7.8;
      h += Math.cos(pz * 0.0054) * 6.5;
      h += Math.sin((px + pz) * 0.0031) * 4.7;
      h += Math.cos(Math.hypot(px, pz) * 0.0092) * 3.8;
      h += Math.sin(px * 0.017) * Math.cos(pz * 0.014) * 1.8;
      h = safeNum(h, 0);
      return clamp(h, -28, 32);
    }

    function buildTerrain() {
      const pos = terrainGeo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const z = pos.getZ(i);
        const y = getTerrainHeight(x, z);
        pos.setY(i, y);
      }
      pos.needsUpdate = true;
      terrainGeo.computeVertexNormals();

      const terrainMat = new THREE.MeshStandardMaterial({
        color: 0x4fa84f,
        roughness: 1.0,
        metalness: 0.0
      });

      const terrain = new THREE.Mesh(terrainGeo, terrainMat);
      terrain.receiveShadow = true;
      scene.add(terrain);

      const grid = new THREE.GridHelper(WORLD_SIZE, 120, 0x3e7f3e, 0x6cbf6c);
      grid.material.transparent = true;
      grid.material.opacity = 0.16;
      scene.add(grid);
    }

    buildTerrain();

    const gltfLoader = new GLTFLoader();
    const fbxLoader = new FBXLoader();

    const playerRoot = new THREE.Group();
    scene.add(playerRoot);

    let visualRoot = null;
    let currentActionName = "idle";

    const assets = {
      player: null,
      tree: null,
      boar: null,
      herb: null,
      stone: null
    };

    const data = {
      trees: [],
      herbs: [],
      boars: [],
      stones: [],
      inventory: []
    };

    const active = {
      trees: new Map(),
      herbs: new Map(),
      boars: new Map(),
      stones: new Map()
    };

    const keys = new Set();

    const stick = {
      active: false,
      pointerId: null,
      x: 0,
      y: 0,
      radius: 40
    };

    const state = {
      dashMode: false,
      dashHeld: false,
      attackPlaying: false,
      attackTimer: 0,
      jumpY: 0,
      jumpV: 0,
      onGround: true,
      gameOver: false,
      hp: 200,
      hpMax: 200,
      cameraYaw: Math.PI,
      cameraPitch: 0.22
    };

    const config = {
      walkSpeed: 2.5,
      dashSpeed: 6.0,
      gravity: -22.0,
      jumpVelocity: 8.8,
      cameraHeight: 2.55,
      cameraDistance: 6.9,
      cameraSmooth: 8.5,
      targetHeight: 1.5,
      modelHeight: 2.45,
      turnSpeed: 9.0,

      playerAttackDps: 22,
      playerAttackDuration: 0.55,
      attackRange: 5.2,
      attackFrontDot: -1.0,

      boarBaseHp: 100,
      boarBaseAttack: 4,
      boarLevelMin: 1,
      boarLevelMax: 20,
      lowLevelMax: 10,
      highLevelMin: 11,
      boarMoveSpeed: 1.6,
      boarAggroRange: 18.0,
      boarAttackRange: 2.1,

      herbHealAmount: 30,
      herbCollectRange: 1.0,

      playerCollisionRadius: 0.72,
      cameraYawSensitivity: 0.005,
      cameraPitchSensitivity: 0.004,
      cameraPitchMin: 0.08,
      cameraPitchMax: 0.78
    };

    const tmp = {
      v1: new THREE.Vector3(),
      v2: new THREE.Vector3(),
      v3: new THREE.Vector3(),
      v4: new THREE.Vector3(),
      q: new THREE.Quaternion(),
      m: new THREE.Matrix4()
    };
    const upAxis = new THREE.Vector3(0, 1, 0);
    const herbRaycaster = new THREE.Raycaster();
    const herbPointer = new THREE.Vector2();
    const clock = new THREE.Clock();

    function setStatus(text) {
      uiStatus.textContent = text;
    }

    function showToast(text, duration = 1800) {
      toastEl.textContent = text;
      toastEl.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => toastEl.classList.remove("show"), duration);
    }

    function updatePlayerHud() {
      const pct = (state.hp / state.hpMax) * 100;
      playerHpText.textContent = `${Math.max(0, Math.ceil(state.hp))} / ${state.hpMax}`;
      playerHpFill.style.width = `${clamp(pct, 0, 100)}%`;

      if (pct > 60) playerHpFill.style.background = "linear-gradient(90deg, #4fd06f, #19a54f)";
      else if (pct > 25) playerHpFill.style.background = "linear-gradient(90deg, #ffd24d, #ff9f1a)";
      else playerHpFill.style.background = "linear-gradient(90deg, #ff6b6b, #d91f1f)";
    }

    function safeLoadInventory() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return;
        data.inventory.length = 0;
        for (const item of parsed) {
          if (!item || typeof item !== "object") continue;
          if (typeof item.species !== "string") continue;
          const level = Number(item.level);
          if (!Number.isFinite(level)) continue;
          data.inventory.push({
            id: typeof item.id === "string" ? item.id : makeId(),
            species: item.species,
            level: Math.max(1, Math.floor(level)),
            capturedAt: typeof item.capturedAt === "number" ? item.capturedAt : Date.now()
          });
        }
      } catch (e) {
        console.warn(e);
      }
    }

    function saveInventory() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data.inventory));
      } catch (e) {
        console.warn(e);
      }
    }

    function renderInventory() {
      inventoryInfo.textContent = `${data.inventory.length} / ${INVENTORY_LIMIT} 体`;
      inventoryList.innerHTML = "";
      if (!data.inventory.length) {
        const empty = document.createElement("div");
        empty.className = "inventoryEmpty";

    function disposeObject3D(root) {
      if (!root || !root.userData || !root.userData.ownsResources) return;
      const geometries = new Set();
      const materials = new Set();

      root.traverse((obj) => {
        if (!obj.isMesh) return;
        if (obj.geometry) geometries.add(obj.geometry);
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        for (const mat of mats) {
          if (mat) materials.add(mat);
        }
      });

      for (const geo of geometries) geo.dispose();
      for (const mat of materials) mat.dispose();
    }

    function applyShadows(root) {
      root.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          for (const mat of mats) {
            if (!mat) continue;
            mat.side = THREE.DoubleSide;
            mat.needsUpdate = true;
          }
        }
      });
    }

    function fitAndGround(model, targetHeight = 2.0, groundLift = 0.0) {
      applyShadows(model);
      model.updateWorldMatrix(true, true);

      const box1 = new THREE.Box3().setFromObject(model);
      const size1 = box1.getSize(new THREE.Vector3());
      const scale = targetHeight / Math.max(size1.y, 0.0001);
      model.scale.setScalar(scale);

      model.updateWorldMatrix(true, true);
      const box2 = new THREE.Box3().setFromObject(model);
      const center2 = box2.getCenter(new THREE.Vector3());

      model.position.x -= center2.x;
      model.position.z -= center2.z;
      model.position.y += (-box2.min.y) + groundLift;

      model.updateWorldMatrix(true, true);
      return model;
    }

    function cloneOrCreate(asset) {
      if (asset.useFactory) {
        const obj = asset.factory();
        obj.userData.ownsResources = true;
        return obj;
      }
      const root = asset.template.clone(true);
      root.userData.ownsResources = false;
      return root;
    }

    function loadGLTFOne(url) {
      return new Promise((resolve) => {
        gltfLoader.load(
          url,
          (gltf) => resolve({ ok: true, gltf }),
          undefined,
          () => resolve({ ok: false, gltf: null })
        );
      });
    }

    async function loadGLTFTemplate(urls, fallbackFactory) {
      for (const url of urls) {
        try {
          const res = await loadGLTFOne(url);
          if (res.ok && res.gltf && res.gltf.scene) {
            return {
              useFactory: false,
              template: res.gltf.scene,
              factory: fallbackFactory
            };
          }
        } catch (e) {
          console.warn(`GLTF load failed: ${url}`, e);
        }
      }
      return {
        useFactory: true,
        template: null,
        factory: fallbackFactory
      };
    }

    function loadFBX(url) {

        fbxLoader.load(
          url,
          (fbx) => resolve({ ok: true, fbx }),
          undefined,
          () => resolve({ ok: false, fbx: null })
        );
      });
    }

        z: Math.sin(angle) * dist
      };
    }

    function loadPlayerRig() {
      return new Promise(async (resolve) => {
        const res = await loadFBX(PLAYER_FBX_URL);
        if (res.ok && res.fbx) {
          const model = res.fbx;
          fitAndGround(model, config.modelHeight, 0.03);
          model.rotation.y = Math.PI;
          model.userData.ownsResources = false;
          playerRoot.add(model);

    function syncPlayerGround() {
      const terrainY = getTerrainHeight(playerRoot.position.x, playerRoot.position.z);
      playerRoot.position.y = terrainY + state.jumpY;
    }

    function setPlayerPosition(x, z) {
      playerRoot.position.x = clamp(x, -WORLD_HALF + 2, WORLD_HALF - 2);
      playerRoot.position.z = clamp(z, -WORLD_HALF + 2, WORLD_HALF - 2);
      syncPlayerGround();
    }

    function getCameraBasis() {
      const forward = new THREE.Vector3(
        -Math.sin(state.cameraYaw),
        0,
        -Math.cos(state.cameraYaw)
      ).normalize();
      const right = new THREE.Vector3(
        Math.cos(state.cameraYaw),
        0,
        -Math.sin(state.cameraYaw)
      ).normalize();
      return { forward, right };
    }

    function getCameraRelativeMoveDirection(inputX, inputZ) {
      const { forward, right } = getCameraBasis();
      tmp.v1.copy(right).multiplyScalar(inputX);
      tmp.v2.copy(forward).multiplyScalar(inputZ);
      tmp.v3.copy(tmp.v1).add(tmp.v2);
      if (tmp.v3.lengthSq() < 1e-8) return tmp.v3.set(0, 0, 0);
      return tmp.v3.normalize();
    }

    function getKeyboardMoveVector() {
      const x =
        (keys.has("KeyD") || keys.has("ArrowRight") ? 1 : 0) +
        (keys.has("KeyA") || keys.has("ArrowLeft") ? -1 : 0);
      const z =
        (keys.has("KeyW") || keys.has("ArrowUp") ? 1 : 0) +
        (keys.has("KeyS") || keys.has("ArrowDown") ? -1 : 0);
      return { x, z };
    }

    function getMoveInput() {
      const k = getKeyboardMoveVector();

      let x = clamp(k.x + stick.x, -1, 1);
      let z = clamp(k.z + (-stick.y), -1, 1);

      const len = Math.hypot(x, z);
      if (len > 1) {
        x /= len;
        z /= len;
      }

      return {
        x,
        z,
        magnitude: Math.hypot(x, z),
        jump: keys.has("Space"),
        attack: keys.has("KeyJ") || keys.has("KeyK")
      };
    }

    function currentSpeed() {
      return state.dashMode || state.dashHeld ? config.dashSpeed : config.walkSpeed;
    }

    function requestJump() {
      if (state.gameOver) return;
      if (!state.onGround) return;
      state.jumpV = config.jumpVelocity;
      state.onGround = false;
    }

    function updateJump(delta) {
      if (state.onGround) return;
      state.jumpV += config.gravity * delta;
      state.jumpY += state.jumpV * delta;
      if (state.jumpY <= 0) {
        state.jumpY = 0;
        state.jumpV = 0;
        state.onGround = true;
      }
    }

    function startAttack() {
      if (state.gameOver || state.attackPlaying) return;
      state.attackPlaying = true;
      state.attackTimer = config.playerAttackDuration;
      attackBtn.classList.add("active");
    }

    function finishAttack() {
      state.attackPlaying = false;
      state.attackTimer = 0;
      attackBtn.classList.remove("active");
    }

    function takePlayerDamage(amount) {
      if (state.gameOver) return;
      state.hp = Math.max(0, state.hp - amount);
      updatePlayerHud();
      if (state.hp <= 0) {
        state.hp = 0;
        state.gameOver = true;
        finishAttack();
        setStatus("ゲームオーバー");
      }
    }

    function healPlayer(amount) {
      if (state.gameOver) return 0;
      const before = state.hp;
      state.hp = Math.min(state.hpMax, state.hp + amount);
      updatePlayerHud();
      return state.hp - before;
    }

    function segmentPointDistanceSq(ax, az, bx, bz, cx, cz) {
      const abx = bx - ax;
      const abz = bz - az;
      const acx = cx - ax;
      const acz = cz - az;
      const abLenSq = abx * abx + abz * abz;
      if (abLenSq < 1e-8) {
        return acx * acx + acz * acz;
      }
      const t = clamp((acx * abx + acz * abz) / abLenSq, 0, 1);
      const px = ax + abx * t;
      const pz = az + abz * t;
      const dx = cx - px;
      const dz = cz - pz;
      return dx * dx + dz * dz;
    }

    function getActiveObstacleList() {
      const list = [];
      for (const t of active.trees.values()) list.push({ x: t.activeObject.root.position.x, z: t.activeObject.root.position.z, r: t.collisionRadius || 2.2 });
      for (const s of active.stones.values()) list.push({ x: s.activeObject.root.position.x, z: s.activeObject.root.position.z, r: s.collisionRadius || 0.95 });
      return list;
    }

    function pathBlocked(ax, az, bx, bz, radius) {
      const obstacles = getActiveObstacleList();
      for (const o of obstacles) {
        const sumR = radius + o.r;
        const d2 = segmentPointDistanceSq(ax, az, bx, bz, o.x, o.z);
        if (d2 <= sumR * sumR) return true;
      }
      return false;
    }

    function moveWithCollision(dx, dz) {
      if (Math.abs(dx) < 1e-8 && Math.abs(dz) < 1e-8) return;
      const startX = playerRoot.position.x;
      const startZ = playerRoot.position.z;
      const endX = clamp(startX + dx, -WORLD_HALF + 2, WORLD_HALF - 2);
      const endZ = clamp(startZ + dz, -WORLD_HALF + 2, WORLD_HALF - 2);

      if (!pathBlocked(startX, startZ, endX, endZ, config.playerCollisionRadius)) {
        playerRoot.position.x = endX;
        playerRoot.position.z = endZ;
        syncPlayerGround();
        return;
      }

      let lo = 0;
      let hi = 1;
      for (let i = 0; i < 10; i++) {
        const mid = (lo + hi) * 0.5;
        const mx = startX + (endX - startX) * mid;
        const mz = startZ + (endZ - startZ) * mid;
        if (pathBlocked(startX, startZ, mx, mz, config.playerCollisionRadius)) hi = mid;
        else lo = mid;
      }

      const safeT = lo;
      playerRoot.position.x = startX + (endX - startX) * safeT;
      playerRoot.position.z = startZ + (endZ - startZ) * safeT;
      syncPlayerGround();
    }

    function moveBoarWithCollision(rootObj, dx, dz, radius = 0.7) {
      const startX = rootObj.position.x;
      const startZ = rootObj.position.z;
      const endX = clamp(startX + dx, -WORLD_HALF + 2, WORLD_HALF - 2);
      const endZ = clamp(startZ + dz, -WORLD_HALF + 2, WORLD_HALF - 2);

      if (!pathBlocked(startX, startZ, endX, endZ, radius)) {
        rootObj.position.x = endX;
        rootObj.position.z = endZ;
        rootObj.position.y = getTerrainHeight(endX, endZ);
        return;
      }

      let lo = 0;
      let hi = 1;
      for (let i = 0; i < 10; i++) {
        const mid = (lo + hi) * 0.5;
        const mx = startX + (endX - startX) * mid;
        const mz = startZ + (endZ - startZ) * mid;
        if (pathBlocked(startX, startZ, mx, mz, radius)) hi = mid;
        else lo = mid;
      }

      const safeT = lo;
      rootObj.position.x = startX + (endX - startX) * safeT;
      rootObj.position.z = startZ + (endZ - startZ) * safeT;
      rootObj.position.y = getTerrainHeight(rootObj.position.x, rootObj.position.z);
    }

    function disposeSpawned(root) {
      if (!root) return;
      disposeObject3D(root);
      if (root.parent) root.parent.remove(root);
    }

    function spawnTree(item) {
      if (item.activeObject || item.spawnState !== "idle" || performance.now() < item.spawnLockUntil) return;
      item.spawnState = "spawning";
      const root = cloneOrCreate(assets.tree);
      fitAndGround(root, 9.5 * item.scale, 0.03);
      root.position.set(item.x, getTerrainHeight(item.x, item.z), item.z);
      root.position.y = getTerrainHeight(item.x, item.z) + root.position.y;
      root.rotation.y = item.rotY;
      root.userData.collisionRadius = item.collisionRadius;
      scene.add(root);
      item.activeObject = { root };
      item.spawnState = "active";
      active.trees.set(item.id, item);
    }

    function despawnTree(item, now = performance.now()) {
      if (!item.activeObject || item.spawnState === "despawning") return;
      item.spawnState = "despawning";
      disposeSpawned(item.activeObject.root);
      item.activeObject = null;
      item.spawnState = "idle";
      item.spawnLockUntil = now + 120;
      active.trees.delete(item.id);
    }

    function spawnHerb(item) {
      if (item.activeObject || item.spawnState !== "idle" || performance.now() < item.spawnLockUntil) return;
      item.spawnState = "spawning";
      const root = cloneOrCreate(assets.herb);
      fitAndGround(root, 1.35 * item.scale, 0.03);
      const gy = getTerrainHeight(item.x, item.z);
      root.position.set(item.x, gy + root.position.y, item.z);
      root.rotation.y = item.rotY;
      const herbId = item.id;
      root.userData.herbId = herbId;
      root.traverse((child) => {
        child.userData.herbId = herbId;
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      scene.add(root);
      item.activeObject = { root };
      item.baseY = root.position.y;
      item.spawnState = "active";
      active.herbs.set(item.id, item);
    }

    function despawnHerb(item, now = performance.now()) {
      if (!item.activeObject || item.spawnState === "despawning") return;
      item.spawnState = "despawning";
      disposeSpawned(item.activeObject.root);
      item.activeObject = null;
      item.spawnState = "idle";
      item.spawnLockUntil = now + 120;
      active.herbs.delete(item.id);
    }

    function spawnStone(item) {
      if (item.activeObject || item.spawnState !== "idle" || performance.now() < item.spawnLockUntil) return;
      item.spawnState = "spawning";
      const root = cloneOrCreate(assets.stone);
      fitAndGround(root, 1.2 * item.scale, 0.03);
      const gy = getTerrainHeight(item.x, item.z);
      root.position.set(item.x, gy + root.position.y, item.z);
      root.rotation.y = item.rotY;
      root.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });

      const box = new THREE.Box3().setFromObject(root);
      const size = box.getSize(new THREE.Vector3());
      item.collisionRadius = Math.max(size.x, size.z) * 0.28 + 0.45;

      scene.add(root);
      item.activeObject = { root };
      item.spawnState = "active";
      active.stones.set(item.id, item);
    }

    function despawnStone(item, now = performance.now()) {
      if (!item.activeObject || item.spawnState === "despawning") return;
      item.spawnState = "despawning";
      disposeSpawned(item.activeObject.root);
      item.activeObject = null;
      item.spawnState = "idle";
      item.spawnLockUntil = now + 180;
      active.stones.delete(item.id);
    }

    function spawnBoar(item) {
      if (item.activeObject || item.spawnState !== "idle" || performance.now() < item.spawnLockUntil) return;
      item.spawnState = "spawning";
      const root = cloneOrCreate(assets.boar);
      const scale = 0.95 + (item.level - 1) * 0.11;
      fitAndGround(root, 2.0 * item.scale * scale, 0.05);
      const gy = getTerrainHeight(item.x, item.z);
      root.position.set(item.x, gy + root.position.y, item.z);
      root.rotation.y = item.rotY;
      const box = new THREE.Box3().setFromObject(root);
      const size = box.getSize(new THREE.Vector3());
      item.collisionRadius = Math.max(size.x, size.z) * 0.22 + 0.35;
      item.uiOffset = Math.max(1.6, size.y * 1.15);
      item.activeObject = { root };
      item.spawnState = "active";
      scene.add(root);
      active.boars.set(item.id, item);
      createBoarTag(item);
    }

    function despawnBoar(item, now = performance.now()) {
      if (!item.activeObject || item.spawnState === "despawning") return;
      item.spawnState = "despawning";
      removeBoarTag(item);
      disposeSpawned(item.activeObject.root);
      item.activeObject = null;
      item.spawnState = "idle";
      item.spawnLockUntil = now + 180;
      active.boars.delete(item.id);
    }

    function createBoarTag(item) {
      if (item.tag) return;
      const el = document.createElement("div");
      el.className = "boarTag";
      el.innerHTML = `
        <div class="boarLevel">Lv.${item.level}</div>
        <div class="boarBarWrap"><div class="boarBarFill"></div></div>
        <div class="boarHpText">${Math.ceil(item.hp)} / ${Math.ceil(item.hpMax)}</div>
      `;
      worldUI.appendChild(el);
      item.tag = {
        el,
        fill: el.querySelector(".boarBarFill"),
        text: el.querySelector(".boarHpText")
      };
    }

    function removeBoarTag(item) {
      if (item.tag && item.tag.el && item.tag.el.parentNode) {
        item.tag.el.parentNode.removeChild(item.tag.el);
      }
      item.tag = null;
    }

    function updateBoarTag(item) {
      if (!item.tag || !item.activeObject) return;
      const root = item.activeObject.root;
      const pos = tmp.v1.set(root.position.x, root.position.y + item.uiOffset, root.position.z).project(camera);
      const inFront = pos.z > -1 && pos.z < 1;
      const onScreen = pos.x >= -1.2 && pos.x <= 1.2 && pos.y >= -1.2 && pos.y <= 1.2;
      if (!inFront || !onScreen) {
        item.tag.el.style.opacity = "0";
        return;
      }
      const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
      item.tag.el.style.opacity = "1";
      item.tag.el.style.transform = `translate(-50%, -100%) translate(${x}px, ${y}px)`;
      item.tag.fill.style.width = `${clamp((item.hp / item.hpMax) * 100, 0, 100)}%`;
      item.tag.text.textContent = `HP ${Math.ceil(item.hp)} / ${Math.ceil(item.hpMax)}`;
    }

    function syncStream(array, spawnFn, despawnFn, activeMap) {
      const px = playerRoot.position.x;
      const pz = playerRoot.position.z;
      for (const item of array) {
        if (item.removed || item.dead) {
          if (item.activeObject) despawnFn(item);
          continue;
        }
        const dx = item.x - px;
        const dz = item.z - pz;
        const within = dx * dx + dz * dz <= ACTIVE_RADIUS_SQ;
        if (within) {
          if (!item.activeObject) spawnFn(item);
          else activeMap.set(item.id, item);
        } else {
          if (item.activeObject) despawnFn(item);
        }
      }
    }

    function updateWorldStreaming() {
      syncStream(data.trees, spawnTree, despawnTree, active.trees);
      syncStream(data.herbs, spawnHerb, despawnHerb, active.herbs);
      syncStream(data.boars, spawnBoar, despawnBoar, active.boars);
      syncStream(data.stones, spawnStone, despawnStone, active.stones);
    }

    function forceGroundAllActiveEntities() {
      for (const item of active.trees.values()) {
        if (!item.activeObject) continue;
        const root = item.activeObject.root;
        root.position.y = getTerrainHeight(root.position.x, root.position.z) + (root.position.y - Math.floor(root.position.y));
      }
      for (const item of active.herbs.values()) {
        if (!item.activeObject) continue;
        const root = item.activeObject.root;
        root.position.y = getTerrainHeight(root.position.x, root.position.z) + (root.position.y - Math.floor(root.position.y));
        item.baseY = root.position.y;
      }
      for (const item of active.boars.values()) {
        if (!item.activeObject) continue;
        const root = item.activeObject.root;
        root.position.y = getTerrainHeight(root.position.x, root.position.z);
      }
      for (const item of active.stones.values()) {
        if (!item.activeObject) continue;
        const root = item.activeObject.root;
        root.position.y = getTerrainHeight(root.position.x, root.position.z) + (root.position.y - Math.floor(root.position.y));
      }
    }

    function updateHerbs(delta) {
      for (const item of active.herbs.values()) {
        if (!item.activeObject) continue;
        const root = item.activeObject.root;
        item.animT += delta;
        root.position.y = item.baseY + Math.sin(item.animT * 3.8) * 0.03;
        root.rotation.y += delta * 0.2;
      }
    }

    function updateTrees(delta) {
      for (const item of active.trees.values()) {
        if (!item.activeObject) continue;
        const root = item.activeObject.root;
        root.rotation.y += Math.sin(performance.now() * 0.0002) * 0.00001;
        root.position.y = getTerrainHeight(root.position.x, root.position.z) + (root.position.y - Math.floor(root.position.y));
      }
    }

    function updateBoars(delta, now) {
      const playerPos = playerRoot.position;
      for (const item of active.boars.values()) {
        if (!item.activeObject) continue;
        const root = item.activeObject.root;
        const pos = root.position;
        const dist = Math.hypot(playerPos.x - pos.x, playerPos.z - pos.z);

        if (dist <= item.aggroRange) {
          item.state = "chase";
          item.hostileUntil = now + 4500;
        } else {
          item.state = "move";
        }

        if (item.state === "chase") {
          const dir = tmp.v1.set(playerPos.x - pos.x, 0, playerPos.z - pos.z);
          if (dir.lengthSq() > 1e-8) dir.normalize();

          if (dist > item.attackRange * 0.95) {
            moveBoarWithCollision(root, dir.x * item.moveSpeed * 1.4 * delta, dir.z * item.moveSpeed * 1.4 * delta, item.collisionRadius || 0.7);
          }

          const targetYaw = Math.atan2(dir.x, dir.z);
          root.rotation.y = THREE.MathUtils.lerp(root.rotation.y, targetYaw, 1 - Math.exp(-8 * delta));

          if (dist <= item.attackRange) {
            takePlayerDamage(item.atkDps * delta);
          }
        } else {
          item.wanderTimer -= delta;
          if (item.wanderTimer <= 0) {
            item.wanderYaw += rand(-1.0, 1.0);
            item.wanderTimer = rand(1.2, 3.2);
          }

          const dir = new THREE.Vector3(Math.cos(item.wanderYaw), 0, Math.sin(item.wanderYaw));
          moveBoarWithCollision(root, dir.x * item.moveSpeed * 0.35 * delta, dir.z * item.moveSpeed * 0.35 * delta, item.collisionRadius || 0.7);
          const targetYaw = Math.atan2(dir.x, dir.z);
          root.rotation.y = THREE.MathUtils.lerp(root.rotation.y, targetYaw, 1 - Math.exp(-2.5 * delta));
        }

        root.position.y = getTerrainHeight(root.position.x, root.position.z);
        updateBoarTag(item);
      }
    }

    function collectHerb(item) {
      if (state.gameOver || !item || item.removed || !item.activeObject) return;
      if (state.hp >= state.hpMax) {
        showToast("体力は満タン！");
        setStatus("体力は満タン");
        return;
      }
      const healed = healPlayer(config.herbHealAmount);
      if (healed <= 0) {
        showToast("体力は満タン！");
        setStatus("体力は満タン");
        return;
      }
      showToast(`薬草を回収！ 体力 +${healed}`);
      setStatus(`薬草を回収 / 体力 +${healed}`);
      item.removed = true;
      despawnHerb(item);
      const idx = data.herbs.findIndex((h) => h.id === item.id);
      if (idx >= 0) data.herbs.splice(idx, 1);
    }

    function findNearestHerb(maxDist = config.herbCollectRange) {
      let best = null;
      let bestDist = Infinity;
      for (const item of active.herbs.values()) {
        if (!item.activeObject || item.removed) continue;
        const root = item.activeObject.root;
        const d = Math.hypot(root.position.x - playerRoot.position.x, root.position.z - playerRoot.position.z);
        if (d < maxDist && d < bestDist) {
          best = item;
          bestDist = d;
        }
      }
      return best;
    }

    function updateHerbCollectButton() {
      const herb = findNearestHerb(1.0);
      herbCollectBtn.style.display = herb ? "block" : "none";
    }

    function collectNearestHerb() {
      const herb = findNearestHerb(1.0);
      if (!herb) {
        showToast("近くに薬草がない！");
        setStatus("近くに薬草がない");
        return;
      }
      collectHerb(herb);
    }

    function findNearestBoar(maxDist = 4.5) {
      let best = null;
      let bestDist = Infinity;
      for (const item of active.boars.values()) {
        if (!item.activeObject || item.dead) continue;
        const root = item.activeObject.root;
        const d = Math.hypot(root.position.x - playerRoot.position.x, root.position.z - playerRoot.position.z);
        if (d < maxDist && d < bestDist) {
          best = item;
          bestDist = d;
        }
      }
      return best;
    }

    function addInventoryCreature(species, level) {
      if (data.inventory.length >= INVENTORY_LIMIT) return false;
      data.inventory.push({
        id: makeId(),
        species,
        level: Math.max(1, Math.floor(level)),
        capturedAt: Date.now()
      });
      saveInventory();
      renderInventory();
      return true;
    }

    function scheduleBoarRespawn(item) {
      const token = (item.respawnToken || 0) + 1;
      item.respawnToken = token;
      const delay = rand(2200, 4200);
      setTimeout(() => {
        if (state.gameOver) return;
        if (item.respawnToken !== token) return;
        item.dead = false;
        const p = randomWorldPoint(20);
        const d = Math.hypot(p.x, p.z);
        const level = getBoarLevelForDistance(d);
        const stats = getBaseStatsByLevel(level);
        item.x = p.x;
        item.z = p.z;
        item.rotY = Math.random() * Math.PI * 2;
        item.scale = 0.85 + Math.random() * 0.45;
        item.level = level;
        item.hpMax = stats.hpMax;
        item.hp = stats.hpMax;
        item.atkDps = stats.atkDps;
        item.attackRange = config.boarAttackRange + (level - 1) * 0.08;
        item.aggroRange = config.boarAggroRange + (level - 1) * 0.8;
        item.moveSpeed = config.boarMoveSpeed * (1 + (level - 1) * 0.08);
        item.activeObject = null;
        item.spawnState = "idle";
        item.spawnLockUntil = 0;
      }, delay);
    }

    function collectNearestBoar() {
      if (state.gameOver) return;
      if (data.inventory.length >= INVENTORY_LIMIT) {
        showToast("かばんがいっぱい！");
        setStatus("かばんがいっぱい");
        return;
      }

      const boar = findNearestBoar(4.5);
      if (!boar) {
        showToast("近くにイノシシがいない！");
        setStatus("近くにイノシシがいない");
        return;
      }

      if (boar.hp > boar.hpMax * 0.1) {
        showToast("体力が多すぎて捕まえられない！");
        setStatus("体力が多すぎて捕まえられない");
        return;
      }

      if (!addInventoryCreature("イノシシ", boar.level)) {
        showToast("かばんがいっぱい！");
        setStatus("かばんがいっぱい");
        return;
      }

      showToast(`イノシシ Lv.${boar.level} を捕獲！`);
      setStatus(`イノシシ Lv.${boar.level} を捕獲`);
      boar.dead = true;
      despawnBoar(boar);
      scheduleBoarRespawn(boar);
    }

    function applyPlayerAttackDamage(delta) {
      const damage = config.playerAttackDps * delta;
      for (const item of active.boars.values()) {
        if (!item.activeObject || item.dead) continue;
        const root = item.activeObject.root;
        const dx = root.position.x - playerRoot.position.x;
        const dz = root.position.z - playerRoot.position.z;
        const d = Math.hypot(dx, dz);
        if (d <= config.attackRange) {
          item.hp -= damage;
          item.hostileUntil = performance.now() + 4500;
          if (item.hp <= 0) {
            item.hp = 0;
            item.dead = true;
            despawnBoar(item);
            scheduleBoarRespawn(item);
          }
        }
      }
    }

    function updateMovement(delta) {
      if (state.gameOver) {
        setStatus("ゲームオーバー");
        return;
      }

      const input = getMoveInput();

      if (input.jump) requestJump();
      if (input.attack) startAttack();

      const moving = input.magnitude > 0.001;

      if (moving) {
        const moveDir = getCameraRelativeMoveDirection(input.x, input.z);
        if (moveDir.lengthSq() > 1e-8) {
          tmp.m.lookAt(new THREE.Vector3(0, 0, 0), moveDir, upAxis);
          tmp.q.setFromRotationMatrix(tmp.m);
          playerRoot.quaternion.rotateTowards(tmp.q, config.turnSpeed * delta);

          const currentForward = new THREE.Vector3(0, 0, -1).applyQuaternion(playerRoot.quaternion).normalize();
          const align = clamp(currentForward.dot(moveDir), 0, 1);
          const moveScale = align * align;
          const speed = currentSpeed() * input.magnitude * moveScale;
          const dx = currentForward.x * speed * delta;
          const dz = currentForward.z * speed * delta;
          moveWithCollision(dx, dz);
        }
      }

      updateJump(delta);
      syncPlayerGround();

      setStatus(
        state.attackPlaying
          ? "攻撃中"
          : state.onGround
            ? (moving ? (state.dashMode || state.dashHeld ? "ダッシュ中" : "移動中") : "待機中")
            : (moving ? "移動中 / ジャンプ中" : "ジャンプ中")
      );
    }

    function updateCamera(delta) {
      const cosPitch = Math.cos(state.cameraPitch);
      const sinPitch = Math.sin(state.cameraPitch);

      const offset = new THREE.Vector3(
        Math.sin(state.cameraYaw) * cosPitch,
        sinPitch,
        Math.cos(state.cameraYaw) * cosPitch
      ).multiplyScalar(config.cameraDistance);

      const targetY = getTerrainHeight(playerRoot.position.x, playerRoot.position.z) + state.jumpY + config.targetHeight;
      const target = new THREE.Vector3(playerRoot.position.x, targetY, playerRoot.position.z);

      const desiredCameraPos = new THREE.Vector3().copy(target).add(offset);
      const lerpAlpha = 1 - Math.exp(-config.cameraSmooth * delta);
      camera.position.lerp(desiredCameraPos, lerpAlpha);
      camera.lookAt(target);
    }

    function updateButtons() {
      dashBtn.classList.toggle("active", state.dashMode);
      attackBtn.classList.toggle("active", state.attackPlaying);
    }

    function updateHerbButtonAndCollection() {
      updateHerbCollectButton();
    }

    function updateCombat(delta, now) {
      if (!state.gameOver) {
        if (state.attackPlaying) {
          state.attackTimer -= delta;
          applyPlayerAttackDamage(delta);
          if (state.attackTimer <= 0) finishAttack();
        }
      }
      updatePlayerHud();
      updateBoars(delta, now);
      updateHerbs(delta);
      updateTrees(delta);
      updateHerbButtonAndCollection();
    }

    function updatePlayerRootGround() {
      syncPlayerGround();
    }

    function renderBoarTags() {
      for (const item of active.boars.values()) updateBoarTag(item);
    }

    function updateHudStatus() {
      if (state.gameOver) setStatus("ゲームオーバー");
    }

    function getInteractHerbAtScreen(clientX, clientY) {
      herbPointer.x = (clientX / window.innerWidth) * 2 - 1;
      herbPointer.y = -(clientY / window.innerHeight) * 2 + 1;
      herbRaycaster.setFromCamera(herbPointer, camera);

      const targets = [];
      for (const item of active.herbs.values()) {
        if (!item.activeObject || item.removed) continue;
        targets.push(item.activeObject.root);
      }

      const hits = herbRaycaster.intersectObjects(targets, true);
      if (!hits.length) return null;
      const herbId = hits[0].object.userData.herbId;
      return active.herbs.get(herbId) || null;
    }

    function tryInteractHerbAtScreen(clientX, clientY) {
      if (state.gameOver) return false;
      const herb = getInteractHerbAtScreen(clientX, clientY);
      if (!herb) return false;

      const root = herb.activeObject.root;
      const d = Math.hypot(root.position.x - playerRoot.position.x, root.position.z - playerRoot.position.z);
      if (d > config.herbCollectRange) {
        showToast("薬草に近づいてから回収！");
        setStatus("薬草が遠い");
        return true;
      }
      collectHerb(herb);
      return true;
    }

    const cameraDrag = {
      active: false,
      pointerId: null,
      lastX: 0,
      lastY: 0
    };

    function shouldIgnoreCameraDragTarget(target) {
      if (!(target instanceof Element)) return false;
      return !!target.closest("#ui, #sideButtons, #inventoryModal, #joystick, #jumpBtn");
    }

    function startCameraDrag(e) {
      if (e.pointerType === "mouse" && e.button !== 0) return;
      if (shouldIgnoreCameraDragTarget(e.target)) return;
      if (e.target !== renderer.domElement) return;
      cameraDrag.active = true;
      cameraDrag.pointerId = e.pointerId;
      cameraDrag.lastX = e.clientX;
      cameraDrag.lastY = e.clientY;
      renderer.domElement.setPointerCapture(e.pointerId);
    }

    function moveCameraDrag(e) {
      if (!cameraDrag.active || e.pointerId !== cameraDrag.pointerId) return;
      const dx = e.clientX - cameraDrag.lastX;
      const dy = e.clientY - cameraDrag.lastY;
      state.cameraYaw -= dx * config.cameraYawSensitivity;
      state.cameraPitch = clamp(
        state.cameraPitch - dy * config.cameraPitchSensitivity,
        config.cameraPitchMin,
        config.cameraPitchMax
      );
      cameraDrag.lastX = e.clientX;
      cameraDrag.lastY = e.clientY;
    }

    function endCameraDrag(e) {
      if (e.pointerId !== cameraDrag.pointerId) return;
      cameraDrag.active = false;
      cameraDrag.pointerId = null;
    }

    function updateJoystickVisual() {
      joyKnob.style.transform = `translate(${stick.x * stick.radius}px, ${stick.y * stick.radius}px)`;
    }

    function resetJoystick() {
      stick.active = false;
      stick.pointerId = null;
      stick.x = 0;
      stick.y = 0;
      updateJoystickVisual();
    }

    joystickEl.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      stick.active = true;
      stick.pointerId = e.pointerId;
      joystickEl.setPointerCapture(e.pointerId);

      const rect = joystickEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const len = Math.hypot(dx, dy);
      const maxLen = stick.radius;

      let nx = dx / maxLen;
      let ny = dy / maxLen;

      if (len > maxLen) {
        nx = dx / len;
        ny = dy / len;
      }

      stick.x = clamp(nx, -1, 1);
      stick.y = clamp(ny, -1, 1);
      updateJoystickVisual();
    });

    joystickEl.addEventListener("pointermove", (e) => {
      if (!stick.active || e.pointerId !== stick.pointerId) return;
      e.preventDefault();

      const rect = joystickEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const len = Math.hypot(dx, dy);
      const maxLen = stick.radius;

      let nx = dx / maxLen;
      let ny = dy / maxLen;

      if (len > maxLen) {
        nx = dx / len;
        ny = dy / len;
      }

      stick.x = clamp(nx, -1, 1);
      stick.y = clamp(ny, -1, 1);
      updateJoystickVisual();
    });

    function endJoystick(e) {
      if (e.pointerId !== stick.pointerId) return;
      resetJoystick();
    }

    joystickEl.addEventListener("pointerup", endJoystick);
    joystickEl.addEventListener("pointercancel", endJoystick);
    joystickEl.addEventListener("lostpointercapture", () => resetJoystick());

    jumpBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      requestJump();
    });

    dashBtn.addEventListener("click", () => {
      state.dashMode = !state.dashMode;
      updateButtons();
    });

    attackBtn.addEventListener("click", () => {
      startAttack();
      updateButtons();
    });

    herbCollectBtn.addEventListener("click", collectNearestHerb);
    captureBtn.addEventListener("click", collectNearestBoar);
    inventoryBtn.addEventListener("click", openInventory);
    closeInventoryBtn.addEventListener("click", closeInventory);
    inventoryModal.addEventListener("click", (e) => {
      if (e.target === inventoryModal) closeInventory();
    });

    window.addEventListener("keydown", (e) => {
      if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "KeyW", "KeyA", "KeyS", "KeyD", "ShiftLeft", "ShiftRight", "KeyJ", "KeyK"].includes(e.code)) {
        e.preventDefault();
      }
      keys.add(e.code);
      if (e.code === "Space") requestJump();
      if (e.code === "ShiftLeft" || e.code === "ShiftRight") state.dashHeld = true;
      if (e.code === "KeyJ" || e.code === "KeyK") startAttack();
      updateButtons();
    }, { passive: false });

    window.addEventListener("keyup", (e) => {
      keys.delete(e.code);
      if (e.code === "ShiftLeft" || e.code === "ShiftRight") state.dashHeld = false;
      updateButtons();
    });

    renderer.domElement.addEventListener("pointerdown", startCameraDrag);
    renderer.domElement.addEventListener("pointermove", moveCameraDrag);
    renderer.domElement.addEventListener("pointerup", endCameraDrag);
    renderer.domElement.addEventListener("pointercancel", endCameraDrag);
    renderer.domElement.addEventListener("lostpointercapture", () => {
      cameraDrag.active = false;
      cameraDrag.pointerId = null;
    });

    renderer.domElement.addEventListener("click", (e) => {
      if (shouldIgnoreCameraDragTarget(e.target)) return;
      tryInteractHerbAtScreen(e.clientX, e.clientY);
    });

    function generateAllWorldData() {
      generateTreeData();
      generateHerbData();
      generateBoarData();
      generateStoneData();
    }

    async function bootstrap() {
      try {
        safeLoadInventory();
        updatePlayerHud();
        setStatus("モデルを読み込み中…");

        assets.tree = await loadGLTFTemplate(TREE_URLS, createFallbackTree);
        assets.boar = await loadGLTFTemplate(BOAR_URLS, createFallbackBoar);
        assets.herb = await loadGLTFTemplate(HERB_URLS, createFallbackHerb);
        assets.stone = await loadGLTFTemplate(STONE_URLS, createFallbackStone);
        await loadPlayerRig();

        generateAllWorldData();
        updateWorldStreaming();
        forceGroundAllActiveEntities();
        updatePlayerRootGround();

        loading.classList.add("hidden");
        setStatus("待機中");
      } catch (err) {
        console.error(err);
        loading.classList.add("hidden");
        setStatus("読み込み失敗");
      }
    }

    function updateFrame() {
      const delta = Math.min(clock.getDelta(), 0.033);
      const now = performance.now();

      updateWorldStreaming();
      updateMovement(delta);
      updateCombat(delta, now);
      updateWorldStreaming();
      updateCamera(delta);
      renderBoarTags();
      updateButtons();
      updateHudStatus();
      renderer.render(scene, camera);
      requestAnimationFrame(updateFrame);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    playerRoot.position.set(0, getTerrainHeight(0, 0), 0);
    updateButtons();
    bootstrap();
    requestAnimationFrame(updateFrame);
  </script>
</body>
</html>
