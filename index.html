<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>Forest TPS Open World</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #9fd3ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }
    canvas { display: block; }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(238, 242, 247, 0.78);
      backdrop-filter: blur(8px);
      color: #222;
      font-size: 16px;
      font-weight: 800;
      transition: opacity 0.25s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #ui {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 30;
      min-width: 280px;
      max-width: min(92vw, 500px);
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.84);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      color: #222;
      line-height: 1.5;
      font-size: 14px;
      user-select: none;
    }
    #title { font-weight: 800; font-size: 15px; margin-bottom: 4px; }
    #status { margin-top: 8px; font-size: 13px; font-weight: 800; color: #1d3f7a; }
    #buttons { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .modeBtn {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      background: #2f82ff;
      box-shadow: 0 8px 18px rgba(47,130,255,0.22);
    }
    .modeBtn.active { background: #1d5fc0; }
    .modeBtn.attack { background: #ff6a2c; box-shadow: 0 8px 18px rgba(255,106,44,0.22); }
    .modeBtn.attack.active { background: #cc4e1d; }

    #help {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.82;
      line-height: 1.5;
    }

    #playerHud {
      margin-top: 10px;
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
    }
    .hudRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #1c3359;
    }
    .barWrap {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(28,51,89,0.12);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.12);
    }
    .barFill {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #4fd06f, #19a54f);
      transition: width 0.08s linear;
    }

    #worldUI {
      position: fixed;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      overflow: hidden;
    }

    .boarTag {
      position: absolute;
      min-width: 120px;
      transform: translate(-50%, -100%);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
      opacity: 1;
      transition: opacity 0.1s linear;
      will-change: transform, opacity;
    }
    .boarLevel {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(0,0,0,0.50);
      margin-bottom: 5px;
    }
    .boarHpText { margin-top: 4px; font-size: 11px; opacity: 0.95; }
    .boarBarWrap {
      width: 120px;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.25);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.28);
    }
    .boarBarFill {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff5b5b, #e61d1d);
      transition: width 0.08s linear;
    }

    #secretWarning {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 65;
      transform: translateX(-50%);
      display: none;
      max-width: min(92vw, 760px);
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(20, 0, 0, 0.82);
      color: #ff3030;
      font-size: 16px;
      font-weight: 1000;
      text-align: center;
      text-shadow: 0 0 10px rgba(255,0,0,0.55);
      box-shadow: 0 14px 34px rgba(0,0,0,0.30);
      pointer-events: none;
    }
    #secretWarning.show { display: block; }
    #secretMarker {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 66;
      display: none;
      width: 22px;
      height: 22px;
      margin-left: -11px;
      margin-top: -11px;
      border-radius: 50%;
      background: #208cff;
      border: 3px solid rgba(255,255,255,0.96);
      box-shadow: 0 0 18px rgba(32,140,255,0.95), 0 0 36px rgba(32,140,255,0.45);
      pointer-events: none;
    }
    #secretMarker.show { display: block; }
    
    #miniMapWrap {
      position: fixed;
      right: 14px;
      top: 14px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(15,24,32,0.72);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
      z-index: 45;
      pointer-events: auto;
      touch-action: none;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    #miniMapCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #fullMapModal {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10,18,30,0.60);
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }
    #fullMapModal.open { display: flex; }
    #fullMapPanel {
      position: relative;
      width: min(92vw, 720px);
      max-height: min(92vh, 760px);
      border-radius: 22px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 24px 70px rgba(0,0,0,0.30);
      padding: 16px;
      color: #1a2740;
    }
    #fullMapTitle { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
    #fullMapInfo { font-size: 13px; font-weight: 800; color: #4a5c80; margin-bottom: 12px; }
    #fullMapCanvas {
      width: min(88vw, 660px);
      height: min(88vw, 660px);
      max-width: 660px;
      max-height: 660px;
      display: block;
      margin: 0 auto;
      border-radius: 18px;
      background: #17212c;
    }
    #fullMapClose {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 50%;
      background: linear-gradient(180deg, #ff6c6c, #d92c2c);
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0,0,0,0.18);
    }

    #joystick {
      position: fixed;
      left: 18px;
      bottom: 18px;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.45);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 10px 30px rgba(0,0,0,0.08);
      backdrop-filter: blur(8px);
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 35;
    }
    #joystick::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.35);
    }
    #joyKnob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 54px;
      height: 54px;
      margin-left: -27px;
      margin-top: -27px;
      border-radius: 50%;
      background: rgba(47,130,255,0.9);
      box-shadow: 0 8px 18px rgba(47,130,255,0.25);
      transform: translate(0,0);
    }

    #jumpBtn {
      position: fixed;
      right: 18px;
      bottom: 28px;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 0;
      background: linear-gradient(180deg, #ff8f4d, #ff6a2c);
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.03em;
      box-shadow: 0 10px 24px rgba(255,106,44,0.28);
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 35;
    }
    #jumpBtn:active { transform: scale(0.97); }

    #sideButtons {
      position: fixed;
      right: 18px;
      bottom: 150px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 35;
      pointer-events: auto;
    }
    .sideBtn {
      width: 120px;
      height: 60px;
      border: 0;
      border-radius: 18px;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(0,0,0,0.16);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #herbCollectBtn {
      background: linear-gradient(180deg, #69d66f, #239b3a);
      display: none;
    }
    #recall-btn {
      background: linear-gradient(180deg, #34d27b, #15964c);
      display: none;
    }
    #captureBtn { background: linear-gradient(180deg, #ffb14d, #ff7b1f); }
    #inventoryBtn { background: linear-gradient(180deg, #4e92ff, #2f67d6); }
    .sideBtn:active { transform: scale(0.97); }

    #inventoryModal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10,18,30,0.48);
      backdrop-filter: blur(6px);
      pointer-events: auto;
    }
    #inventoryModal.open { display: flex; }
    #inventoryPanel {
      width: min(92vw, 420px);
      max-height: min(72vh, 560px);
      overflow: auto;
      border-radius: 22px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
      padding: 18px;
      color: #1a2740;
    }
    #inventoryTitle { font-size: 18px; font-weight: 900; margin-bottom: 10px; }
    #inventoryInfo { font-size: 13px; font-weight: 800; margin-bottom: 14px; color: #3a4c73; }
    #inventoryList { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .inventoryItem {
      padding: 11px 12px;
      border-radius: 14px;
      background: #f3f7ff;
      border: 1px solid rgba(47,103,214,0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 800;
      font-size: 14px;
    }
    .inventoryItemText { min-width: 0; word-break: break-word; }
    .deployBtn {
      border: 0;
      border-radius: 12px;
      background: linear-gradient(180deg, #ff8f4d, #ff6a2c);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      padding: 8px 10px;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .inventoryEmpty {
      padding: 14px;
      border-radius: 14px;
      background: #f3f7ff;
      border: 1px dashed rgba(47,103,214,0.22);
      font-weight: 800;
      font-size: 14px;
      color: #516383;
    }
    #closeInventoryBtn {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, #4e92ff, #2f67d6);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    #toast {
      position: fixed;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      z-index: 60;
      max-width: min(92vw, 520px);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(18,24,34,0.82);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(0,0,0,0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #toast.show { opacity: 1; }

    @media (max-width: 700px) {
      #ui {
        min-width: 0;
        max-width: calc(100vw - 24px);
      }
      #help { font-size: 11px; }
      #jumpBtn {
        width: 94px;
        height: 94px;
        font-size: 16px;
      }
      #joystick {
        width: 118px;
        height: 118px;
      }
      #joyKnob {
        width: 48px;
        height: 48px;
        margin-left: -24px;
        margin-top: -24px;
      }
      #sideButtons { bottom: 138px; }
      .sideBtn {
        width: 108px;
        height: 52px;
        font-size: 13px;
      }
      .boarTag { min-width: 100px; }
      .boarBarWrap { width: 100px; }
      .inventoryItem { font-size: 13px; }
      #miniMapWrap {
        width: 132px;
        height: 132px;
      }
      #fullMapCanvas {
        width: min(84vw, 560px);
        height: min(84vw, 560px);
      }
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="loading">読み込み中…</div>
  <div id="toast"></div>
  <div id="secretWarning">【警告】伝説のシークレットモンスターが近くに出現しました！</div>
  <div id="secretMarker" aria-hidden="true"></div>
  
  <div id="ui">
    <div id="title">Forest TPS Open World</div>

    <div id="playerHud">
      <div class="hudRow">
        <span>プレイヤーHP</span>
        <span id="playerHpText">200 / 200</span>
      </div>
      <div class="barWrap">
        <div id="playerHpFill" class="barFill"></div>
      </div>
    </div>

    <div id="status">待機中</div>
    <div id="buttons">
      <button id="dashBtn" class="modeBtn">ダッシュ</button>
      <button id="attackBtn" class="modeBtn attack">攻撃</button>
    </div>
    <div id="help">
      WASD / 矢印 / 画面スティック / ジャンプ / 攻撃 / ダッシュ<br>
      薬草は1m以内で「薬草回収」ボタンが表示されます。ミニマップをタップすると全体マップを開けます。
    </div>
  </div>

  <div id="worldUI"></div>

  <div id="miniMapWrap" title="タップで全体マップ">
    <canvas id="miniMapCanvas"></canvas>
  </div>

  <div id="fullMapModal" aria-hidden="true">
    <div id="fullMapPanel">
      <button id="fullMapClose">×</button>
      <div id="fullMapTitle">全体マップ</div>
      <div id="fullMapInfo">緑＝プレイヤー / 赤＝モンスター</div>
      <canvas id="fullMapCanvas"></canvas>
    </div>
  </div>

  <div id="sideButtons">
    <button id="herbCollectBtn" class="sideBtn">薬草回収</button>
    <button id="recall-btn" class="sideBtn">モンスターを回収</button>
    <button id="captureBtn" class="sideBtn">捕獲（ゲット）</button>
    <button id="inventoryBtn" class="sideBtn">インベントリ</button>
  </div>

  <div id="inventoryModal" aria-hidden="true">
    <div id="inventoryPanel">
      <div id="inventoryTitle">インベントリ</div>
      <div id="inventoryInfo">0 / 10 体</div>
      <div id="inventoryList"></div>
      <button id="closeInventoryBtn">閉じる</button>
    </div>
  </div>

  <div id="joystick" aria-label="joystick">
    <div id="joyKnob"></div>
  </div>
  <button id="jumpBtn">JUMP</button>

  <script type="module">
    import * as THREE from "three";
    import { FBXLoader } from "three/addons/loaders/FBXLoader.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
　　 import * as SkeletonUtils from "three/addons/utils/SkeletonUtils.js";
    
    const WALK_FBX_URL = "./Meshy_AI_biped_Animation_Walking_withSkin.fbx";
    const ATTACK_FBX_URL = "./Meshy_AI_biped_Animation_Attack_withSkin.fbx";
    const RUN_FBX_URL = "./Meshy_AI_biped_Animation_Running_withSkin.fbx";

    const TREE_URLS = ["./tree.glb"];
    const BOAR_URLS = ["./boar.glb"];
    const GORILLA_URLS = ["./gorira.glb"];
    const SECRET_URLS = ["./seacret.glb"];
    const MONSTER_SPECIES = {
      boar: { key: "boar", name: "猪", urls: BOAR_URLS, baseHp: 100, baseAttack: 15, probability: 0.6, fallbackFactory: createFallbackBoarTemplate },
      gorilla: { key: "gorilla", name: "ゴリラ", urls: GORILLA_URLS, baseHp: 200, baseAttack: 10, probability: 0.399999, fallbackFactory: createFallbackGorillaTemplate },
      secret: { key: "secret", name: "シークレット", urls: SECRET_URLS, baseHp: 1000, baseAttack: 50, probability: 0.000001, fallbackFactory: createFallbackSecretTemplate }
    };
    const MONSTER_SPECIES_LIST = [MONSTER_SPECIES.boar, MONSTER_SPECIES.gorilla, MONSTER_SPECIES.secret];
    const HERB_URLS = ["./herb.glb", "./yakusou.glb"];
    const ROCK_URLS = ["./isi.glb", "./iwa.glb"];
    const RIVER_URLS = ["./river.glb"];

    const STORAGE_KEY = "forest_tps_inventory_v3";
    const INVENTORY_LIMIT = 10;

    const WORLD_SIZE = 1500;
    const WORLD_HALF = WORLD_SIZE / 2;
    const ACTIVE_RADIUS = 100;
    const ACTIVE_RADIUS_SQ = ACTIVE_RADIUS * ACTIVE_RADIUS;
    const GRID_CELL_SIZE = 100;
    
    const TREE_COUNT = 1000;
    const HERB_COUNT = 1500;
    const ROCK_COUNT = 500;
    const RIVER_COUNT = 10;
    const BOAR_SPAWN_CANDIDATE_COUNT = 1000;
    const MAX_ACTIVE_BOARS = 100;
   
    const PLAYER_SAFE_RADIUS = 18;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9fd3ff);
    scene.fog = new THREE.Fog(0x9fd3ff, 70, 320);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 700);
    camera.position.set(0, 2.5, 6.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.25;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.domElement.style.touchAction = "none";
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xbbe6ff, 0x4d7a3b, 1.9));

    const sun = new THREE.DirectionalLight(0xffffff, 3.2);
    sun.position.set(25, 35, 18);
    sun.castShadow = true;
    sun.shadow.mapSize.set(4096, 4096);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 180;
    sun.shadow.camera.left = -90;
    sun.shadow.camera.right = 90;
    sun.shadow.camera.top = 90;
    sun.shadow.camera.bottom = -90;
    sun.shadow.bias = -0.00015;
    scene.add(sun);

    const fill = new THREE.PointLight(0xffffff, 0.7, 160);
    fill.position.set(-20, 18, -12);
    scene.add(fill);

    function safeNum(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    const MOUNTAIN_PEAKS = [
      { x: -420, z: -360, height: 26, radius: 50 },
      { x: -120, z: 310, height: 30, radius: 50 },
      { x: 220, z: -260, height: 24, radius: 50 },
      { x: 410, z: 180, height: 28, radius: 50 },
      { x: 60, z: 470, height: 22, radius: 50 }
    ];

    function getTerrainHeight(x, z) {
      x = safeNum(x, 0);
      z = safeNum(z, 0);

      const r = Math.hypot(x, z);
      let h =
        Math.sin(x * 0.010) * 10.5 +
        Math.cos(z * 0.011) * 9.2 +
        Math.sin((x + z) * 0.006) * 7.4 +
        Math.cos(r * 0.012) * 5.8 +
        Math.sin(x * 0.024) * Math.cos(z * 0.021) * 4.5 +
        Math.sin((x - z) * 0.034) * 2.1;

      for (const peak of MOUNTAIN_PEAKS) {
        const dx = x - peak.x;
        const dz = z - peak.z;
        const dist = Math.hypot(dx, dz);
        const gaussian = peak.height * Math.exp(-(dist * dist) / (2 * peak.radius * peak.radius * 0.42));
        const cone = Math.max(0, 1 - dist / peak.radius) * peak.height * 0.65;
        h += Math.max(gaussian, cone);
      }

      if (!Number.isFinite(h)) h = 0;
      return h;
    }

    const terrainGeometry = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 240, 240);
    terrainGeometry.rotateX(-Math.PI / 2);
    {
      const pos = terrainGeometry.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const z = pos.getZ(i);
        pos.setY(i, getTerrainHeight(x, z));
      }
      pos.needsUpdate = true;
      terrainGeometry.computeVertexNormals();
    }

    const ground = new THREE.Mesh(
      terrainGeometry,

    function applyShadowsAndFixMaterials(object3D) {
      object3D.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          for (const mat of mats) {
            if (!mat) continue;
            mat.side = THREE.DoubleSide;
            mat.needsUpdate = true;
          }
        }
      });
    }

    function fitAndGround(model, targetHeight = config.modelHeight, groundLift = 0.0) {
      applyShadowsAndFixMaterials(model);
      model.updateWorldMatrix(true, true);

      const box1 = new THREE.Box3().setFromObject(model);
      const size1 = box1.getSize(new THREE.Vector3());
      const scale = targetHeight / Math.max(size1.y, 0.0001);
      model.scale.setScalar(scale);

      model.updateWorldMatrix(true, true);

      const box2 = new THREE.Box3().setFromObject(model);
      const center2 = box2.getCenter(new THREE.Vector3());

      model.position.x -= center2.x;
      model.position.z -= center2.z;
      model.position.y += (-box2.min.y) + groundLift;

      model.updateWorldMatrix(true, true);
      return model;
    }

    function cloneMaterialDeep(material) {
      if (!material) return material;
      if (Array.isArray(material)) return material.map(cloneMaterialDeep);
      const cloned = material.clone();
      for (const key of Object.keys(cloned)) {
        const value = cloned[key];
        if (value && value.isTexture) {
          cloned[key] = value.clone();
        }
      }
      return cloned;
    }

    function deepCloneUnique(root) {
      if (!root) return new THREE.Group();
      const clone = SkeletonUtils?.clone ? SkeletonUtils.clone(root) : root.clone(true);
      clone.traverse((obj) => {
        if (obj.isMesh) {
          if (obj.geometry) obj.geometry = obj.geometry.clone();
          obj.material = cloneMaterialDeep(obj.material);
        }
      });
      return clone;
    }

    function disposeMaterial(material) {
      if (!material) return;
      const materials = Array.isArray(material) ? material : [material];
      for (const mat of materials) {
        if (!mat) continue;
        const seen = new Set();
        for (const key of Object.keys(mat)) {
          const value = mat[key];
          if (value && value.isTexture && !seen.has(value)) {
            seen.add(value);
            value.dispose();
          }
        }
        mat.dispose?.();
      }
    }

    function disposeObject3D(root) {
      if (!root) return;
      root.traverse((obj) => {
        if (obj.isMesh) {
          obj.geometry?.dispose?.();
          disposeMaterial(obj.material);
        }
      });
    }

    function collectRootNames(root) {
      const names = new Set();
      root.traverse((obj) => {
        if (!obj?.name) return;
        if (/^Armature$/i.test(obj.name) || /^RootNode$/i.test(obj.name) || /^Scene$/i.test(obj.name)) {
          names.add(obj.name);
        }
        if ((obj.isBone || obj.type === "Bone") && (!obj.parent || !obj.parent.isBone)) {
          names.add(obj.name);
        }
      });
      return [...names];
    }

    function stripRootMotionTracks(clip, rootNames) {
      if (!clip) return null;
      const c = clip.clone();
      c.tracks = c.tracks.filter((track) => {
        const name = track.name || "";
        const dot = name.lastIndexOf(".");
        if (dot === -1) return true;
        const target = name.slice(0, dot);
        const prop = name.slice(dot + 1);
        if (rootNames.some((r) => target === r || target.startsWith(r + ".") || target.startsWith(r + "_"))) {
          if (prop === "position" || prop === "quaternion" || prop === "scale") return false;
        }
        if (/Hips|hips|mixamorigHips|Pelvis|pelvis/i.test(target) && prop === "position") return false;
        return true;
      });
      return c;
    }

    function loadGLTFWithFallback(urls, fallbackFactory) {
      const makeSafeFallback = () => {
        try {
          return fallbackFactory();
        } catch (e) {
          console.warn("fallback mesh creation failed", e);
          const g = new THREE.Group();
          const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshStandardMaterial({ color: 0xff66aa, roughness: 1 })
          );
          mesh.position.y = 0.5;
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          g.add(mesh);
          return g;
        }
      };
      return new Promise((resolve) => {
        const tryAt = (index) => {
          if (index >= urls.length) {
            resolve({ scene: makeSafeFallback(), fallback: true, url: null });
            return;
          }
        try {
            gltfLoader.load(
              urls[index],
              (gltf) => resolve({ scene: gltf?.scene || makeSafeFallback(), fallback: !gltf?.scene, url: urls[index] }),
              undefined,
              () => tryAt(index + 1)
            );
          } catch (e) {
            console.warn("GLTF load failed", urls[index], e);
            tryAt(index + 1);
          }
        };
        tryAt(0);
      });
    }

    function loadFBXWithFallback(urls) {
      return new Promise((resolve) => {
        const tryAt = (index) => {
          if (index >= urls.length) {
            resolve(null);
            return;
          }
          fbxLoader.load(
            urls[index],
            (fbx) => resolve(fbx),
            undefined,
            () => tryAt(index + 1)
          );
        };
        tryAt(0);
      });
    }

    function getCameraBasis() {
      const forward = new THREE.Vector3(-Math.sin(cameraYaw), 0, -Math.cos(cameraYaw)).normalize();
      const right = new THREE.Vector3(Math.cos(cameraYaw), 0, -Math.sin(cameraYaw)).normalize();
      return { forward, right };
    }

    function getCameraRelativeMoveDirection(inputX, inputZ) {
      const { forward, right } = getCameraBasis();
      tmp.v1.copy(right).multiplyScalar(inputX);
      tmp.v2.copy(forward).multiplyScalar(inputZ);
      tmp.v3.copy(tmp.v1).add(tmp.v2);
      if (tmp.v3.lengthSq() < 1e-8) return tmp.v3.set(0, 0, 0);
      return tmp.v3.normalize();
    }

      if (len > 1) {

        z /= len;

      return {
        x, z,
        magnitude: Math.hypot(x, z),
        jump: keys.has("Space"),
        attack: keys.has("KeyJ") || keys.has("KeyK")
      };
    }

    function getStatsByLevel(level, speciesOrKey = "boar") {
      const def = getMonsterDefinition(speciesOrKey);

      const scale = Math.pow(1.2, lv - 1);

      };

    function getBoarLevelRangeForPosition(x, z) {
      const col = x < -250 ? 0 : (x < 250 ? 1 : 2);
      const row = z < -250 ? 0 : (z < 250 ? 1 : 2);
      const ranges = [
        [[50, 80], [20, 40], [70, 95]],
        [[25, 50], [1, 10], [15, 30]],
        [[100, 999], [10, 20], [80, 125]]
      ];
      const range = ranges[row][col];
      return { min: range[0], max: range[1], row, col };
    }

    function getBoarLevelForPosition(x, z) {
      const range = getBoarLevelRangeForPosition(x, z);
      return range.min + Math.floor(Math.random() * (range.max - range.min + 1));
    }
    
    function randomWorldPoint(margin = 18) {
      return {
        x: rand(-WORLD_HALF + margin, WORLD_HALF - margin),
        z: rand(-WORLD_HALF + margin, WORLD_HALF - margin)
      };
    }

    function gridCoord(v) {
      return Math.floor((safeNum(v, 0) + WORLD_HALF) / GRID_CELL_SIZE);
    }

    function gridKeyForXZ(x, z) {
      return `${gridCoord(x)},${gridCoord(z)}`;
    }

    function clearSpatialGrids() {
      for (const grid of Object.values(spatialGrids)) grid.clear();
    }

    function addToSpatialGrid(type, data) {
      const grid = spatialGrids[type];
      if (!grid || !data) return;
      const key = gridKeyForXZ(data.x, data.z);
      if (!grid.has(key)) grid.set(key, []);
      grid.get(key).push(data);
      data.gridKey = key;
    }

    function removeFromSpatialGrid(type, data) {
      const grid = spatialGrids[type];
      if (!grid || !data?.gridKey) return;
      const bucket = grid.get(data.gridKey);
      if (bucket) {
        const index = bucket.indexOf(data);
        if (index >= 0) bucket.splice(index, 1);
        if (!bucket.length) grid.delete(data.gridKey);
      }
      data.gridKey = null;
    }

    function updateSpatialGridItem(type, data) {
      if (!data) return;
      const nextKey = gridKeyForXZ(data.x, data.z);
      if (data.gridKey === nextKey) return;
      removeFromSpatialGrid(type, data);
      addToSpatialGrid(type, data);
    }

    function rebuildSpatialGrids() {
      clearSpatialGrids();
      for (const data of treeData) addToSpatialGrid("tree", data);
      for (const data of herbData) addToSpatialGrid("herb", data);
      for (const data of rockData) addToSpatialGrid("rock", data);
      for (const data of riverData) addToSpatialGrid("river", data);
      for (const data of boarData) addToSpatialGrid("boar", data);
    }

    function getNearbyGridItems(type, x = playerRoot.position.x, z = playerRoot.position.z) {
      const grid = spatialGrids[type];
      if (!grid) return [];
      const cx = gridCoord(x);
      const cz = gridCoord(z);
      const result = [];
      for (let gz = cz - 1; gz <= cz + 1; gz++) {
        for (let gx = cx - 1; gx <= cx + 1; gx++) {
          const bucket = grid.get(`${gx},${gz}`);
          if (bucket?.length) result.push(...bucket);
        }
      }
      return result;
    }

    function placeOnTerrain(root, x, z, terrainLift = 0) {
      root.position.set(x, getTerrainHeight(x, z) + terrainLift, z);
    }

    function refreshCollisionCircles() {
      collisionCircles.length = 0;
      collisionRects.length = 0;
      for (const data of activeTrees.values()) {
        if (!data.activeObject?.root) continue;
        const p = data.activeObject.root.position;
        collisionCircles.push({ x: p.x, z: p.z, r: data.collisionRadius || 1.5 });
      }
      for (const data of activeRocks.values()) {
        if (!data.activeObject?.root) continue;
        const p = data.activeObject.root.position;
        collisionCircles.push({ x: p.x, z: p.z, r: data.collisionRadius || ROCK_COLLISION_RADIUS });
      }
      for (const data of activeRivers.values()) {
        collisionRects.push(getRiverCollisionRect(data));
      }
    }

    function getMutablePosition(target) {
      return target?.isObject3D ? target.position : target;
    }

    function getRiverCollisionRect(data) {
      return {
        x: data.x,
        z: data.z,
        halfLength: (data.length || RIVER_LENGTH) * 0.5,
        halfWidth: (data.width || RIVER_WIDTH) * 0.5,
        yaw: data.rotY || 0
      };
    }

    function pointInRiverRect(x, z, radius, rect) {
      const c = Math.cos(-rect.yaw);
      const s = Math.sin(-rect.yaw);
      const dx = x - rect.x;
      const dz = z - rect.z;
      const lx = dx * c - dz * s;
      const lz = dx * s + dz * c;
      return Math.abs(lx) <= rect.halfLength + radius && Math.abs(lz) <= rect.halfWidth + radius;
    }

    function collidesWithRiverRects(x, z, radius, rects = collisionRects) {
      for (const rect of rects) {
        if (pointInRiverRect(x, z, radius, rect)) return true;
      }
      return false;
    }

    function collidesAtXZ(x, z, radius) {
      for (const circle of collisionCircles) {
        const rr = radius + circle.r;
        if ((x - circle.x) ** 2 + (z - circle.z) ** 2 <= rr * rr) return true;
      }
      return collidesWithRiverRects(x, z, radius);
    }

    function segmentCircleHitT(startX, startZ, endX, endZ, cx, cz, radius) {
      const dx = endX - startX;
      const dz = endZ - startZ;
      const fx = startX - cx;
      const fz = startZ - cz;
      const a = dx * dx + dz * dz;
      if (a < 1e-10) {
        const inside = (fx * fx + fz * fz) <= radius * radius;
        return inside ? 0 : null;
      }
      const b = 2 * (fx * dx + fz * dz);
      const c = fx * fx + fz * fz - radius * radius;
      if (c <= 0) return 0;
      const disc = b * b - 4 * a * c;
      if (disc < 0) return null;
      const s = Math.sqrt(disc);
      const t1 = (-b - s) / (2 * a);
      const t2 = (-b + s) / (2 * a);
      if (t1 >= 0 && t1 <= 1) return t1;
      if (t2 >= 0 && t2 <= 1) return t2;
      return null;
    }

    function moveWithStrictCollision(obj3D, dx, dz, radius) {
      const pos = getMutablePosition(obj3D);
      if (!pos) return false;

      const sx = pos.x;
      const sz = pos.z;
      const ex = sx + dx;
      const ez = sz + dz;

      let bestT = 1;
      let hit = false;

      for (const circle of collisionCircles) {
        const t = segmentCircleHitT(sx, sz, ex, ez, circle.x, circle.z, radius + circle.r);
        if (t !== null && t < bestT) {
          bestT = t;
          hit = true;
        }
      }

      if (collidesWithRiverRects(ex, ez, radius)) {
        hit = true;
      }

      if (hit) {
        const safeT = Math.max(0, bestT - 0.02);
        const safeX = sx + dx * safeT;
        const safeZ = sz + dz * safeT;
        if (!collidesWithRiverRects(safeX, safeZ, radius)) {
          pos.x = safeX;
          pos.z = safeZ;
        } else {
          pos.x = sx;
          pos.z = sz;
        }
        return false;
      }

      pos.x = ex;
      pos.z = ez;
      return true;
    }

    function randomizeBoarAvoidance(data, reverse = true) {
      const base = reverse ? (data.wanderYaw || 0) + Math.PI : Math.random() * Math.PI * 2;
      data.wanderYaw = base + rand(-0.9, 0.9);
      data.wanderTimer = rand(0.8, 1.8);
      data.state = "move";
    }

    function updatePlayerTerrainAndJump(delta) {
      const groundY = getTerrainHeight(playerRoot.position.x, playerRoot.position.z);

      if (physics.onGround) {
        physics.jumpOffset = 0;
        physics.vy = 0;
        playerRoot.position.y = groundY;
      } else {
        physics.vy += config.gravity * delta;
        physics.jumpOffset += physics.vy * delta;
        if (physics.jumpOffset <= 0) {
          physics.jumpOffset = 0;
          physics.vy = 0;
          physics.onGround = true;
        }
        playerRoot.position.y = groundY + physics.jumpOffset;
      }
    }

    function updateMovement(delta) {
      if (gameOver) {
        setStatus("ゲームオーバー");
        return;
      }

      const input = getMoveInput();

      if (input.jump) requestJump();
      if (input.attack) startAttack();

      const moving = input.magnitude > 0.001;

      if (moving) {
        const moveDir = getCameraRelativeMoveDirection(input.x, input.z);
        if (moveDir.lengthSq() > 1e-8) {
          tmp.m.lookAt(new THREE.Vector3(0,0,0), moveDir, upAxis);
          tmp.q.setFromRotationMatrix(tmp.m);
          playerRoot.quaternion.rotateTowards(tmp.q, config.turnSpeed * delta);

          const currentForward = new THREE.Vector3(0,0,-1).applyQuaternion(playerRoot.quaternion).normalize();
          const align = clamp(currentForward.dot(moveDir), 0, 1);
          const moveScale = align * align;
          const speed = currentSpeed() * input.magnitude * moveScale;
          const dx = currentForward.x * speed * delta;
          const dz = currentForward.z * speed * delta;
          const prevX = playerRoot.position.x;
          const prevZ = playerRoot.position.z;

          const moved = moveWithStrictCollision(playerRoot.position, dx, dz, config.playerCollisionRadius);
          playerRoot.position.x = clamp(playerRoot.position.x, -WORLD_HALF + 2, WORLD_HALF - 2);
          playerRoot.position.z = clamp(playerRoot.position.z, -WORLD_HALF + 2, WORLD_HALF - 2);

    function fitRiverModel(root, length = RIVER_LENGTH, width = RIVER_WIDTH, thickness = RIVER_THICKNESS) {
      applyShadowsAndFixMaterials(root);
      root.updateWorldMatrix(true, true);
      const box1 = new THREE.Box3().setFromObject(root);
      const size1 = box1.getSize(new THREE.Vector3());
      const scaleX = length / Math.max(size1.x, 0.0001);
      const scaleY = thickness / Math.max(size1.y, 0.0001);
      const scaleZ = width / Math.max(size1.z, 0.0001);
      root.scale.set(root.scale.x * scaleX, root.scale.y * scaleY, root.scale.z * scaleZ);
      root.updateWorldMatrix(true, true);
      const box2 = new THREE.Box3().setFromObject(root);
      const center2 = box2.getCenter(new THREE.Vector3());
      root.position.x -= center2.x;
      root.position.z -= center2.z;
      root.position.y += (-box2.min.y) + RIVER_GROUND_LIFT;
      return root;
    }

    function findNearestBoar(maxDist = 4.5) {
      const playerPos = playerRoot.position;
      let best = null;
      let bestDist = Infinity;

      for (const data of activeBoars.values()) {
        if (data.dead || !data.activeObject) continue;
        const pos = data.activeObject.root.position;
        const d = Math.hypot(pos.x - playerPos.x, pos.z - playerPos.z);
        if (d < maxDist && d < bestDist) {
          best = data;
          bestDist = d;
        }
      }

      return best ? { boar: best, dist: bestDist } : null;
    }

    function collectHerb(data) {
      if (gameOver || !data || data.removed) return;

      if (playerHp >= config.playerHpMax) {
        showToast("体力は満タン！");
        setStatus("体力は満タン");
        return;
      }

      const healed = healPlayer(config.herbHealAmount);
      if (healed <= 0) {
        showToast("体力は満タン！");
        setStatus("体力は満タン");
        return;
      }

      showToast(`薬草を回収！ 体力 +${healed}`);
      setStatus(`薬草を回収 / 体力 +${healed}`);

      const index = herbData.findIndex((h) => h.id === data.id);
      if (index >= 0) herbData.splice(index, 1);
      if (data.activeObject?.root?.parent) data.activeObject.root.parent.remove(data.activeObject.root);
      if (data.activeObject?.root) disposeObject3D(data.activeObject.root);
      data.activeObject = null;
      data.removed = true;
      activeHerbs.delete(data.id);

    function collectNearestHerb() {
      if (gameOver) return;
      const found = findNearestHerb(1.0);
      if (!found) {
        showToast("近くに薬草がない！");
        setStatus("近くに薬草がない");
        return;
      }
      collectHerb(found.herb);

    function tryInteractHerbAtScreen(clientX, clientY) {
      if (gameOver) return false;

      herbPointer.x = (clientX / window.innerWidth) * 2 - 1;
      herbPointer.y = -(clientY / window.innerHeight) * 2 + 1;
      herbRaycaster.setFromCamera(herbPointer, camera);

      const targets = [];
      for (const data of activeHerbs.values()) {
        if (!data.activeObject || data.removed) continue;
        targets.push(data.activeObject.root);
      }

      const hits = herbRaycaster.intersectObjects(targets, true);
      if (hits.length) {
        const herbId = hits[0].object.userData.herbId;
        const data = activeHerbs.get(herbId);
        if (!data) return false;
        const pos = data.activeObject.root.position;
        const d = Math.hypot(pos.x - playerRoot.position.x, pos.z - playerRoot.position.z);
        if (d <= config.herbCollectRange) {
          collectHerb(data);
          return true;
        }
        showToast("薬草に近づいてから回収！");
        setStatus("薬草が遠い");
        return true;
      }

      const near = findNearestHerb(1.0);
      if (near) {
        collectHerb(near.herb);
        return true;
      }

      return false;
    }

    function updateWildBoarAnimation(data, delta) {
      if (data.dead || !data.activeObject) return;

      const o = data.activeObject;
      data.stateTime += delta;
      const t = data.stateTime;
      const isCombat = data.state === "chase";

      const baseY = getTerrainHeight(o.root.position.x, o.root.position.z) + (data.terrainLift || 0);
      const bobAmp = isCombat ? 0.08 : 0.04;
      const bobFreq = isCombat ? 12.0 : 7.0;
      o.root.position.y = baseY + Math.sin(t * bobFreq) * bobAmp;

      if (o.parts) {
        const sway = Math.sin(t * (isCombat ? 18 : 10)) * (isCombat ? 0.05 : 0.025);
        o.parts.body.rotation.z = sway;
        o.parts.head.rotation.x = isCombat ? 0.22 : 0.05;
        o.parts.head.rotation.z = -sway * 0.7;
        o.parts.snout.rotation.z = -sway * 0.55;
        o.parts.ears[0].rotation.z = Math.PI / 2 + sway * 0.4;
        o.parts.ears[1].rotation.z = Math.PI / 2 - sway * 0.4;

        const legSwing = Math.sin(t * (isCombat ? 16 : 8)) * (isCombat ? 0.75 : 0.55);
        o.parts.legs[0].rotation.x = legSwing;
        o.parts.legs[3].rotation.x = legSwing;
        o.parts.legs[1].rotation.x = -legSwing;
        o.parts.legs[2].rotation.x = -legSwing;
      } else {
        o.root.rotation.z = Math.sin(t * (isCombat ? 14 : 8)) * (isCombat ? 0.06 : 0.03);
      }
    }

    function getBoarTarget(data) {

        return { type: "player", position: playerRoot.position, entity: null };
      }
      if (data.targetType === "companion") {
        const c = companions.find((item) => item.id === data.targetId && !item.dead && item.root);
        if (!c) return null;
        return { type: "companion", position: c.root.position, entity: c };
      }
      return null;
    }

    function damageCompanion(companion, amount) {
      if (!companion || companion.dead || !companion.root) return;
      companion.hp = Math.max(0, companion.hp - amount);
      if (companion.hp <= 0) {
        killCompanion(companion);
      }
    }

    function removeCompanionTag(companion) {
      if (companion?.tag?.el?.parentNode) companion.tag.el.parentNode.removeChild(companion.tag.el);
      if (companion) companion.tag = null;
    }
    
    function killCompanion(companion) {
      if (!companion || companion.dead) return;
      companion.dead = true;
      removeCompanionTag(companion);
      const root = companion.root;
      if (root?.parent) root.parent.remove(root);
      disposeObject3D(root);
      companion.root = null;
      for (const data of activeBoars.values()) {
        if (data.targetType === "companion" && data.targetId === companion.id) clearBoarHateTarget(data);
      }
      showToast(`${companion.species} Lv.${companion.level} は倒れました`);
    }
    
function findNearestRecallableCompanion(maxDist = 3.0) {
      let best = null;
      let bestDist = Infinity;
      const playerPos = playerRoot.position;
      for (const c of companions) {
        if (!c || c.dead || !c.root) continue;
        const d = Math.hypot(c.root.position.x - playerPos.x, c.root.position.z - playerPos.z);
        if (d <= maxDist && d < bestDist) {
          best = c;
          bestDist = d;
        }
      }
      return best ? { companion: best, dist: bestDist } : null;
    }

    function recallNearestCompanion() {
      const found = findNearestRecallableCompanion(3.0);
      if (!found) {
        showToast("回収できる味方が近くにいません");
        return;
      }
      const c = found.companion;
      let ok = addInventoryCreature(c.species || "イノシシ", c.level || 1);
      if (!ok) {
        inventory.push({
          id: makeId(),
          species: c.species || "イノシシ",
          level: Math.max(1, Math.floor(c.level || 1)),
          capturedAt: Date.now()
        });
        saveInventory();
        renderInventoryModal();
        ok = true;
      }
      c.dead = true;
      removeCompanionTag(c);
      if (c.root?.parent) c.root.parent.remove(c.root);
      disposeObject3D(c.root);
      c.root = null;
      for (const data of activeBoars.values()) {
        if (data.targetType === "companion" && data.targetId === c.id) clearBoarHateTarget(data);
      }
      const index = companions.findIndex((item) => item.id === c.id);
      if (index >= 0) companions.splice(index, 1);
      showToast(`${c.species} Lv.${c.level} を回収しました`);
      setStatus(`${c.species} Lv.${c.level} を回収`);
      updateRecallActionUI();
    }

    function findHostileBoarTarget(now, companion = null) {
      if (companion?.targetBoarId) {
        const locked = findBoarById(companion.targetBoarId);
        if (locked && !locked.dead && locked.activeObject?.root) return locked;
        companion.targetBoarId = null;
      }

      const playerPos = companion?.root?.position || playerRoot.position;
      let best = null;
      let bestDist = Infinity;

      for (const data of activeBoars.values()) {
        if (!data || data.dead || !data.activeObject?.root) continue;
        const lockedOnCompanion = companion && data.targetType === "companion" && data.targetId === companion.id;
        const hostileToPlayer = data.targetType === "player";
        const generallyHostile = !companion && data.targetType === "companion";
        if (!lockedOnCompanion && !hostileToPlayer && !generallyHostile) continue;
        const pos = data.activeObject.root.position;
        const d = Math.hypot(pos.x - playerPos.x, pos.z - playerPos.z);
        if (d < bestDist) {
          bestDist = d;
          best = data;
        }
      }
      if (companion && best) companion.targetBoarId = best.id;
      return best;
    }

    function findBoarById(id) {
      return activeBoars.get(id) || null;
    }

    function updateCompanionAnimation(companion, delta) {
      const t = companion.animT;

      if (companion.state === "attack") {
        const progress = 1 - (companion.attackTimer / companion.attackDuration);
        const kick = Math.sin(progress * Math.PI);
        companion.root.rotation.z = Math.sin(progress * Math.PI) * 0.08;

        if (companion.parts) {
          companion.parts.body.rotation.z = 0.14 * kick;
          companion.parts.head.rotation.x = 0.42 + 0.14 * kick;
          companion.parts.head.rotation.z = -0.08 * kick;
          companion.parts.snout.rotation.z = -0.2 * kick;
          companion.parts.ears[0].rotation.z = Math.PI / 2 + 0.45 * kick;
          companion.parts.ears[1].rotation.z = Math.PI / 2 - 0.45 * kick;

          const legSwing = Math.sin(progress * Math.PI * 2) * 0.95;
          companion.parts.legs[0].rotation.x = legSwing;
          companion.parts.legs[3].rotation.x = legSwing;
          companion.parts.legs[1].rotation.x = -legSwing;
          companion.parts.legs[2].rotation.x = -legSwing;
        }
      } else {
        companion.root.rotation.z = Math.sin(t * 10.0) * 0.02;
        if (companion.parts) {
          const sway = Math.sin(t * 10.0) * 0.02;
          companion.parts.body.rotation.z = sway;
          companion.parts.head.rotation.x = 0.04;
          companion.parts.head.rotation.z = -sway * 0.7;
          companion.parts.snout.rotation.z = -sway * 0.4;
          companion.parts.ears[0].rotation.z = Math.PI / 2 + sway * 0.35;
          companion.parts.ears[1].rotation.z = Math.PI / 2 - sway * 0.35;
          const legSwing = Math.sin(t * 8.0) * 0.5;
          companion.parts.legs[0].rotation.x = legSwing;
          companion.parts.legs[3].rotation.x = legSwing;
          companion.parts.legs[1].rotation.x = -legSwing;
          companion.parts.legs[2].rotation.x = -legSwing;
        }
      }
    }

    function startCompanionAttack(companion, target, now) {
      companion.state = "attack";
      companion.attackTimer = companion.attackDuration;
      companion.attackHitDone = false;
      companion.attackTargetId = target.id;
      companion.attackStartPos.copy(companion.root.position);

      const targetPos = target.activeObject.root.position;
      const dir = new THREE.Vector3(targetPos.x - companion.root.position.x, 0, targetPos.z - companion.root.position.z);
      if (dir.lengthSq() < 1e-8) dir.set(0, 0, 1);
      else dir.normalize();

      companion.attackDir.copy(dir);
      companion.root.rotation.y = Math.atan2(dir.x, dir.z);
      companion.attackCooldown = config.combatInterval;
      companion.nextAttackAt = now + config.combatInterval * 1000;
      companion.animT = now * 0.001;
    }

    function applyCompanionHit(companion, target) {
      if (!target || target.dead) return;
      setBoarHateTarget(target, "companion", companion.id, performance.now());
      target.hp -= companion.atkDps;
      if (target.hp <= 0) {
        target.hp = 0;
        removeBoarAfterDeath(target, true);
      }
    }

    function updateCompanions(delta, now) {
      if (!companions.length) return;

      const playerPos = playerRoot.position;
      const forward = getCharacterForwardVector();
      const right = tmp.v5.set(forward.z, 0, -forward.x).normalize();


      for (let i = companions.length - 1; i >= 0; i--) {
        const c = companions[i];
        if (c.dead || !c.root) {
          companions.splice(i, 1);
          continue;
        }

        c.stateTime += delta;
        c.animT += delta;
        c.attackCooldown = Math.max(0, c.attackCooldown - delta);

        if (c.state === "attack") {
          c.attackTimer -= delta;
          const progress = 1 - (c.attackTimer / c.attackDuration);
          const lunge = Math.sin(progress * Math.PI);

          const target = findBoarById(c.attackTargetId);
                    let dir = c.attackDir;

          if (target && !target.dead && target.activeObject?.root) {
            const targetPos = target.activeObject.root.position;
            const nowDir = tmp.v1.set(targetPos.x - c.attackStartPos.x, 0, targetPos.z - c.attackStartPos.z);
            if (nowDir.lengthSq() > 1e-8) {
              nowDir.normalize();
              dir = nowDir;
            }
          }

          c.root.position.copy(c.attackStartPos).add(tmp.v2.copy(dir).multiplyScalar(lunge * c.attackLunge));
          c.root.position.y = getTerrainHeight(c.root.position.x, c.root.position.z) + c.terrainLift + Math.sin(progress * Math.PI) * 0.15;
          c.root.rotation.y = Math.atan2(dir.x, dir.z);

          if (!c.attackHitDone && progress >= c.attackHitTime) {
            c.attackHitDone = true;
            applyCompanionHit(c, target);
          }

          if (c.attackTimer <= 0) {
            c.state = "follow";
            c.attackTargetId = null;
            c.attackHitDone = false;
          }

          updateCompanionAnimation(c, delta);
          continue;
        }

        let target = findHostileBoarTarget(now, c);
        if (target && (target.dead || !target.activeObject?.root)) target = null;

        if (target) {
          const targetPos = target.activeObject.root.position;
          const toTarget = tmp.v1.set(targetPos.x - c.root.position.x, 0, targetPos.z - c.root.position.z);
          const dist = toTarget.length();

          if (dist > 0.001) {
            const dir = tmp.v2.copy(toTarget).normalize();
            const yaw = Math.atan2(dir.x, dir.z);
            c.root.rotation.y = THREE.MathUtils.lerp(c.root.rotation.y, yaw, 1 - Math.exp(-7.5 * delta));

            const desiredStop = config.combatStopDistance;
            if (dist < desiredStop * 0.95) {
              const push = Math.min(c.followSpeed * delta, desiredStop - dist);
              moveWithStrictCollision(c.root.position, -dir.x * push, -dir.z * push, 0.62);
              c.root.position.y = getTerrainHeight(c.root.position.x, c.root.position.z) + c.terrainLift;
            } else if (dist <= c.attackRange && c.attackCooldown <= 0) {
              startCompanionAttack(c, target, now);
                        } else if (dist > desiredStop) {
              const step = Math.min(c.followSpeed * 1.65 * delta, Math.max(0, dist - desiredStop));
              moveWithStrictCollision(c.root.position, dir.x * step, dir.z * step, 0.62);
              c.root.position.y = getTerrainHeight(c.root.position.x, c.root.position.z) + c.terrainLift;
            } else {
              c.root.position.y = getTerrainHeight(c.root.position.x, c.root.position.z) + c.terrainLift;
            }
          }
        } else {
          const slotIndex = i;
          const lane = Math.floor(slotIndex / 2);
          const side = slotIndex % 2 === 0 ? -1 : 1;

          const desired = tmp.v1.copy(playerPos)
            .add(tmp.v2.copy(forward).multiplyScalar(-(2.5 + lane * 0.45)))
            .add(tmp.v3.copy(right).multiplyScalar(side * (1.25 + lane * 0.72)));

          const toSlot = tmp.v4.copy(desired).sub(c.root.position);
          toSlot.y = 0;
          const dist = toSlot.length();

          if (dist > 0.12) {
            const dir = tmp.v2.copy(toSlot).normalize();
            const yaw = Math.atan2(dir.x, dir.z);
            c.root.rotation.y = THREE.MathUtils.lerp(c.root.rotation.y, yaw, 1 - Math.exp(-7.0 * delta));

            const speed = c.followSpeed * clamp(dist / 2.0, 0.4, 1.8);
            moveWithStrictCollision(c.root.position, dir.x * speed * delta, dir.z * speed * delta, 0.62);
          }

          c.root.position.y = getTerrainHeight(c.root.position.x, c.root.position.z) + c.terrainLift;
        }

        updateCompanionAnimation(c, delta);
      }
    }

    function updateInactiveBoarWander(delta) {
      if (!boarData.length) return;
      const state = streamState.inactiveBoar;
      const budget = Math.max(1, Math.ceil(boarData.length / 20));
      for (let i = 0; i < budget; i++) {
        const data = boarData[state.cursor % boarData.length];
        state.cursor = (state.cursor + 1) % boarData.length;
        if (!data || data.dead || data.activeObject) continue;
        data.wanderTimer -= delta;
        if (data.wanderTimer <= 0) {
          data.wanderYaw = Math.random() * Math.PI * 2;
          data.wanderTimer = rand(1.2, 3.2);
        }

        const dx = Math.cos(data.wanderYaw) * data.moveSpeed * delta;
        const dz = Math.sin(data.wanderYaw) * data.moveSpeed * delta;
        data.x = clamp(data.x + dx, -WORLD_HALF + 4, WORLD_HALF - 4);
        data.z = clamp(data.z + dz, -WORLD_HALF + 4, WORLD_HALF - 4);
        data.rotY = data.wanderYaw;
      }
    }

    function updateWildBoars(delta, now) {
      for (const data of activeBoars.values()) {
        if (data.dead || !data.activeObject) continue;
        const o = data.activeObject;
        if (!o.root) continue;
        const pos = o.root.position;
        pos.y = getTerrainHeight(pos.x, pos.z) + (data.terrainLift || 0);

        let targetInfo = getBoarTarget(data);
        if (!targetInfo || (data.hostileUntil || 0) <= now) {
          clearBoarHateTarget(data);
          targetInfo = null;
        }

        if (targetInfo) {
          data.state = "chase";
          const targetPos = targetInfo.position;
          const dx = targetPos.x - pos.x;
          const dz = targetPos.z - pos.z;
          const distSq = dx * dx + dz * dz;
          const dist = Math.sqrt(distSq);
          const dir = tmp.v1.set(dx, 0, dz);
          if (dir.lengthSq() > 1e-8) dir.normalize();

          const desiredStop = config.combatStopDistance;
          if (dist < desiredStop * 0.95) {
            const push = Math.min(data.moveSpeed * delta, desiredStop - dist);
            moveWithStrictCollision(o.root, -dir.x * push, -dir.z * push, data.collisionRadius || 0.7);
          } else if (dist > desiredStop) {  
            const speed = data.moveSpeed * 1.25;
            const step = Math.min(speed * delta, Math.max(0, dist - desiredStop));
            const moved = moveWithStrictCollision(o.root, dir.x * step, dir.z * step, data.collisionRadius || 0.7);
            if (!moved) randomizeBoarAvoidance(data, true);
          }

          const targetYaw = Math.atan2(dir.x, dir.z);
          o.root.rotation.y = THREE.MathUtils.lerp(o.root.rotation.y, targetYaw, 1 - Math.exp(-8 * delta));

          if (dist <= data.attackRange && now >= (data.nextAttackAt || 0)) {
            data.nextAttackAt = now + config.combatInterval * 1000;
            data.hostileUntil = Infinity;
            if (targetInfo.type === "player") {
              takePlayerDamage(data.atkDps);
            } else if (targetInfo.type === "companion") {
              damageCompanion(targetInfo.entity, data.atkDps);
            }
          }
        } else {
          data.wanderTimer -= delta;
          if (data.wanderTimer <= 0) {
            data.wanderYaw = Math.random() * Math.PI * 2;
            data.wanderTimer = rand(1.2, 3.2);
          }

          const dir = tmp.v1.set(Math.cos(data.wanderYaw), 0, Math.sin(data.wanderYaw));
          const moved = moveWithStrictCollision(o.root, dir.x * data.moveSpeed * delta, dir.z * data.moveSpeed * delta, data.collisionRadius || 0.7);
          if (!moved) randomizeBoarAvoidance(data, true);

          const targetYaw = Math.atan2(dir.x, dir.z);
          o.root.rotation.y = THREE.MathUtils.lerp(o.root.rotation.y, targetYaw, 1 - Math.exp(-3.2 * delta));
        }

        o.root.position.x = clamp(o.root.position.x, -WORLD_HALF + 4, WORLD_HALF - 4);
        o.root.position.z = clamp(o.root.position.z, -WORLD_HALF + 4, WORLD_HALF - 4);
        o.root.position.y = getTerrainHeight(o.root.position.x, o.root.position.z) + (data.terrainLift || 0);
        updateWildBoarAnimation(data, delta);
        data.x = o.root.position.x;
        data.z = o.root.position.z;
        data.rotY = o.root.rotation.y;
      }
    }

    function applyPlayerAttackDamage(delta) {
      if (!activeBoars.size) return;

      const playerPos = playerRoot.position;
      const forward = getCharacterForwardVector();
      const damage = config.playerAttackDps * delta;
      const now = performance.now();

      for (const data of activeBoars.values()) {
        if (data.dead || !data.activeObject) continue;
        const root = data.activeObject.root;
        if (!root) continue;
        const pos = root.position;
        tmp.v2.set(pos.x, pos.y, pos.z);
        tmp.v3.copy(tmp.v2).sub(playerPos);
        tmp.v3.y = 0;

        const dist = tmp.v3.length();
        if (dist > config.attackRange) continue;

        tmp.v4.copy(tmp.v3);
        if (tmp.v4.lengthSq() > 1e-8) tmp.v4.normalize();
        if (forward.dot(tmp.v4) < config.attackConeDot) continue;

        data.hp -= damage;
        setBoarHateTarget(data, "player", null, now);
        if (data.hp <= 0) {
          data.hp = 0;
          removeBoarAfterDeath(data, true);
        }
      }
    }

    function applyBoarDamageToPlayer(delta, now) {
      // 野生モンスターの単体反撃は updateWildBoars() で1.5秒間隔に集約し、二重ダメージを防ぐ。
    }

    function startAttack() {
      if (gameOver || attackPlaying) return;
      attackPlaying = true;
      attackTimer = config.playerAttackDuration;
      attackBtn.classList.add("active");
      stopAllActions(0.05);

      const a = actions.attack;
      if (a) {
        a.reset();
        a.enabled = true;
        a.paused = false;
        a.clampWhenFinished = true;
        a.setLoop(THREE.LoopOnce, 1);
        const clipDuration = a.getClip()?.duration || 1.0;
        a.timeScale = clipDuration / config.playerAttackDuration;
        a.play();
      }

      currentActionName = "attack";
    }

    function finishAttack() {
      attackPlaying = false;
      attackTimer = 0;
      attackBtn.classList.remove("active");
      if (actions.attack) hardStopAction("attack");
      if (!gameOver) syncLocomotion(true);
    }

    function setDashMode(on) {
      if (gameOver) return;
      dashMode = on;
      dashBtn.classList.toggle("active", dashMode);
      if (!attackPlaying) syncLocomotion(true);
    }

    function stopAllActions(fade = 0.12) {
      for (const key of ["walk", "run", "attack"]) {
        const a = actions[key];
        if (!a) continue;
        a.fadeOut(fade);
      }
    }

    function hardStopAction(name) {
      const a = actions[name];
      if (!a) return;
      a.stop();
      a.reset();
      a.paused = false;
    }

    function playAction(name, fade = 0.14) {
      const next = actions[name];
      if (!next) return;
      for (const key of ["walk", "run"]) {
        if (key !== name) hardStopAction(key);
      }
      next.reset();
      next.enabled = true;
      next.paused = false;
      next.setEffectiveWeight(1);
      next.fadeIn(fade).play();
      currentActionName = name;
    }

    function syncLocomotion(force = false) {
      if (gameOver) return;
      if (attackPlaying && !force) return;

      const input = getMoveInput();
      const moving = input.magnitude > 0.001;

      if (!moving) {
        if (currentActionName !== "idle") {
          hardStopAction("walk");
          hardStopAction("run");
          currentActionName = "idle";
        }
        return;
      }

      const desired = (dashMode || dashHeld) ? "run" : "walk";
      if (force || currentActionName !== desired) {
        stopAllActions(0.08);
        playAction(desired, 0.08);
      } else {
        const a = actions[desired];
        if (a && !a.isRunning()) a.play();
        if (a) a.paused = false;
      }
    }

    function updateJoystickVisual() {
      const px = stick.x * stick.radius;
      const py = stick.y * stick.radius;
      joyKnob.style.transform = `translate(${px}px, ${py}px)`;
    }

    function resetJoystick() {
      stick.active = false;
      stick.pointerId = null;
      stick.x = 0;
      stick.y = 0;
      updateJoystickVisual();
    }

    function updateCamera(delta) {
      const cosPitch = Math.cos(cameraPitch);
      const sinPitch = Math.sin(cameraPitch);

      const offset = new THREE.Vector3(
        Math.sin(cameraYaw) * cosPitch,
        sinPitch,
        Math.cos(cameraYaw) * cosPitch
      ).multiplyScalar(config.cameraDistance);

      const target = new THREE.Vector3(
        playerRoot.position.x,
        playerRoot.position.y + config.targetHeight,
        playerRoot.position.z
      );

      const desiredCameraPos = new THREE.Vector3().copy(target).add(offset);
      const lerpAlpha = 1 - Math.exp(-config.cameraSmooth * delta);
      camera.position.lerp(desiredCameraPos, lerpAlpha);
      camera.lookAt(target);
    }

    function updateMiniMap() {
      drawWorldMap(miniMapCanvas, "mini");
    }

    function updateFullMap() {
      drawWorldMap(fullMapCanvas, "full");
    }

    function drawWorldMap(canvas, mode) {
      const ctx = canvas.getContext("2d");
      const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      const cssW = canvas.clientWidth || 1;
      const cssH = canvas.clientHeight || 1;
      const width = Math.floor(cssW * dpr);
      const height = Math.floor(cssH * dpr);

      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }

      ctx.clearRect(0, 0, width, height);
      ctx.save();
      ctx.scale(dpr, dpr);

      const W = cssW;
      const H = cssH;

      if (mode === "mini") {
        const cx = W / 2;
        const cy = H / 2;
        const radius = Math.min(W, H) / 2;

        ctx.fillStyle = "rgba(12,18,24,0.86)";
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, radius - 2, 0, Math.PI * 2);
        ctx.clip();

        ctx.fillStyle = "#18301f";
        ctx.fillRect(0, 0, W, H);

        const range = 180;
        const scale = (radius * 0.84) / range;
        const player = { x: playerRoot.position.x, z: playerRoot.position.z };

        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.lineWidth = 1;
        for (let d = -range; d <= range; d += 20) {
          const x = cx + d * scale;
          ctx.beginPath();
          ctx.moveTo(x, cy - range * scale);
          ctx.lineTo(x, cy + range * scale);
          ctx.stroke();

          const y = cy + d * scale;
          ctx.beginPath();
          ctx.moveTo(cx - range * scale, y);
          ctx.lineTo(cx + range * scale, y);
          ctx.stroke();
        }

        ctx.strokeStyle = "rgba(255,255,255,0.22)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, range * scale, 0, Math.PI * 2);
        ctx.stroke();

        for (const data of riverData) {
          const dx = data.x - player.x;
          const dz = data.z - player.z;
          if (dx * dx + dz * dz > (range + RIVER_LENGTH) * (range + RIVER_LENGTH)) continue;
          ctx.save();
          ctx.translate(cx + dx * scale, cy + dz * scale);
          ctx.rotate(data.rotY || 0);
          ctx.fillStyle = "rgba(40,160,255,0.72)";
          ctx.fillRect(-RIVER_LENGTH * 0.5 * scale, -RIVER_WIDTH * 0.5 * scale, RIVER_LENGTH * scale, RIVER_WIDTH * scale);
          ctx.restore();
        }

        for (const data of activeBoars.values()) {
          if (data.dead || !data.activeObject?.root) continue;
          const pos = data.activeObject.root.position;
          const dx = pos.x - player.x;
          const dz = pos.z - player.z;
          if (dx * dx + dz * dz > range * range) continue;

          const x = cx + dx * scale;
          const y = cy + dz * scale;
          ctx.fillStyle = "#ff5b5b";
          ctx.beginPath();
          ctx.arc(x, y, 4.5, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#fff";
          ctx.font = "10px system-ui, sans-serif";
          ctx.fillText("M", x - 3, y - 7);
        }

        const forward = getCharacterForwardVector();
        const yaw = Math.atan2(forward.x, forward.z);

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(yaw);
        ctx.fillStyle = "#4cff7e";
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(7, 8);
        ctx.lineTo(0, 4);
        ctx.lineTo(-7, 8);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        ctx.restore();
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, radius - 2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
        return;
      }

      const margin = 18;
      const innerW = W - margin * 2;
      const innerH = H - margin * 2;
      const scaleX = innerW / WORLD_SIZE;
      const scaleY = innerH / WORLD_SIZE;

      ctx.fillStyle = "#0f1720";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#17331f";
      ctx.fillRect(margin, margin, innerW, innerH);

      ctx.strokeStyle = "rgba(255,255,255,0.12)";
      ctx.lineWidth = 1;
      for (let x = -WORLD_HALF; x <= WORLD_HALF; x += 100) {
        const px = margin + (x + WORLD_HALF) * scaleX;
        ctx.beginPath();
        ctx.moveTo(px, margin);
        ctx.lineTo(px, margin + innerH);
        ctx.stroke();
      }
      for (let z = -WORLD_HALF; z <= WORLD_HALF; z += 100) {
        const py = margin + (z + WORLD_HALF) * scaleY;
        ctx.beginPath();
        ctx.moveTo(margin, py);
        ctx.lineTo(margin + innerW, py);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(255,255,255,0.22)";
      ctx.lineWidth = 2;
      ctx.strokeRect(margin, margin, innerW, innerH);

      for (const peak of MOUNTAIN_PEAKS) {
        const x = margin + (peak.x + WORLD_HALF) * scaleX;
        const y = margin + (peak.z + WORLD_HALF) * scaleY;
        ctx.fillStyle = "rgba(120,95,60,0.62)";
        ctx.beginPath();
        ctx.arc(x, y, peak.radius * scaleX, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.72)";
        ctx.beginPath();
        ctx.arc(x, y, Math.max(3, peak.radius * scaleX * 0.24), 0, Math.PI * 2);
        ctx.fill();
      }

      for (const data of riverData) {
        const x = margin + (data.x + WORLD_HALF) * scaleX;
        const y = margin + (data.z + WORLD_HALF) * scaleY;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(data.rotY || 0);
        ctx.fillStyle = "rgba(40,160,255,0.72)";
        ctx.fillRect(-(data.length || RIVER_LENGTH) * 0.5 * scaleX, -(data.width || RIVER_WIDTH) * 0.5 * scaleY, (data.length || RIVER_LENGTH) * scaleX, (data.width || RIVER_WIDTH) * scaleY);
        ctx.restore();
      }

      for (const data of boarData) {
        if (data.dead) continue;
        const pos = data.activeObject ? data.activeObject.root.position : { x: data.x, z: data.z };
        const x = margin + (pos.x + WORLD_HALF) * scaleX;
        const y = margin + (pos.z + WORLD_HALF) * scaleY;
        ctx.fillStyle = "#ff5b5b";
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = "10px system-ui, sans-serif";
        ctx.fillText("M", x - 3, y - 6);
      }

      const player = playerRoot.position;
      const px = margin + (player.x + WORLD_HALF) * scaleX;
      const py = margin + (player.z + WORLD_HALF) * scaleY;
      const forward = getCharacterForwardVector();
      const yaw = Math.atan2(forward.x, forward.z);

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(yaw);
      ctx.fillStyle = "#4cff7e";
      ctx.beginPath();
      ctx.moveTo(0, -12);
      ctx.lineTo(8, 9);
      ctx.lineTo(0, 5);
      ctx.lineTo(-8, 9);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      ctx.restore();
    }

    function spawnFromTemplateIfNeeded(data, templateType, now) {
      // placeholder for future expansion
    }

    function isWithinActiveRadiusXZ(x, z) {
      const dx = x - playerRoot.position.x;
      const dz = z - playerRoot.position.z;
      return (dx * dx + dz * dz) <= ACTIVE_RADIUS_SQ;
    }

    function despawnActiveOutsideRadius(activeMap, despawnFn, now) {
      for (const data of activeMap.values()) {
        const root = data.activeObject?.root;
        if (!root) continue;
        if (!isWithinActiveRadiusXZ(root.position.x, root.position.z)) {
          despawnFn(data, now);
        }
      }
    }

    function despawnStrictOutOfRange(now) {
      despawnActiveOutsideRadius(activeTrees, despawnTree, now);
      despawnActiveOutsideRadius(activeHerbs, despawnHerb, now);
      despawnActiveOutsideRadius(activeRocks, despawnRock, now);
      despawnActiveOutsideRadius(activeRivers, despawnRiver, now);
      despawnActiveOutsideRadius(activeBoars, despawnBoarForStream, now);
      for (let i = companions.length - 1; i >= 0; i--) {
        const c = companions[i];
        if (!c?.root) {
          companions.splice(i, 1);
          continue;
        }
        if (!isWithinActiveRadiusXZ(c.root.position.x, c.root.position.z)) {
          killCompanion(c);
          companions.splice(i, 1);
        }
      }
    }

    function syncStream(masterArray, spawnFn, despawnFn, now, state, budget, canSpawnFn = null) {
      if (!masterArray.length || budget <= 0) return;
      if (state.cursor >= masterArray.length) state.cursor = 0;

      for (let i = 0; i < budget; i++) {
        const data = masterArray[state.cursor];
        state.cursor = (state.cursor + 1) % masterArray.length;
        if (!data) continue;

        if (data.removed || data.dead) {
          if (data.activeObject) despawnFn(data, now);
          continue;
        }

        if (!data.activeObject && !data.isSpawning && now >= (data.spawnCooldownUntil || 0)) {
          if (canSpawnFn && !canSpawnFn()) continue;
          if (isWithinActiveRadiusXZ(data.x, data.z)) spawnFn(data, now);
        }
      }
    }

    function syncWorldEntities(now) {
      despawnStrictOutOfRange(now);
      syncStream(treeData, spawnTree, despawnTree, now, streamState.tree, Math.max(1, Math.ceil(treeData.length / 20)));
      syncStream(herbData, spawnHerb, despawnHerb, now, streamState.herb, Math.max(1, Math.ceil(herbData.length / 20)));
      syncStream(rockData, spawnRock, despawnRock, now, streamState.rock, Math.max(1, Math.ceil(rockData.length / 20)));
      syncStream(riverData, spawnRiver, despawnRiver, now, streamState.river, Math.max(1, Math.ceil(riverData.length / 20)));
      syncStream(
        boarData,
        spawnBoar,
        despawnBoarForStream,
        now,
        streamState.boar,
        Math.max(1, Math.ceil(boarData.length / 20)),
        () => activeBoars.size < MAX_ACTIVE_BOARS
      );
          }

    }

    function updateJoystickBindings() {
      const joystickEl = document.getElementById("joystick");
      const joyKnob = document.getElementById("joyKnob");
      const jumpBtn = document.getElementById("jumpBtn");

      joystickEl.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        stick.active = true;
        stick.pointerId = e.pointerId;
        joystickEl.setPointerCapture(e.pointerId);

        const rect = joystickEl.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = e.clientX - cx;
        const dy = e.clientY - cy;
        const len = Math.hypot(dx, dy);
        const maxLen = stick.radius;

        let nx = dx / maxLen;
        let ny = dy / maxLen;
        if (len > maxLen) {
          nx = dx / len;
          ny = dy / len;
        }

        stick.x = clamp(nx, -1, 1);
        stick.y = clamp(ny, -1, 1);
        joyKnob.style.transform = `translate(${stick.x * stick.radius}px, ${stick.y * stick.radius}px)`;
      });

      joystickEl.addEventListener("pointermove", (e) => {
        if (!stick.active || e.pointerId !== stick.pointerId) return;
        e.preventDefault();

        const rect = joystickEl.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = e.clientX - cx;
        const dy = e.clientY - cy;
        const len = Math.hypot(dx, dy);
        const maxLen = stick.radius;

        let nx = dx / maxLen;
        let ny = dy / maxLen;
        if (len > maxLen) {
          nx = dx / len;
          ny = dy / len;
        }

        stick.x = clamp(nx, -1, 1);
        stick.y = clamp(ny, -1, 1);
        joyKnob.style.transform = `translate(${stick.x * stick.radius}px, ${stick.y * stick.radius}px)`;
      });

      function endJoystick(e) {
        if (e.pointerId !== stick.pointerId) return;
        stick.active = false;
        stick.pointerId = null;
        stick.x = 0;
        stick.y = 0;
        joyKnob.style.transform = "translate(0,0)";
      }

      joystickEl.addEventListener("pointerup", endJoystick);
      joystickEl.addEventListener("pointercancel", endJoystick);
      joystickEl.addEventListener("lostpointercapture", () => {
        stick.active = false;
        stick.pointerId = null;
        stick.x = 0;
        stick.y = 0;
        joyKnob.style.transform = "translate(0,0)";
      });

      jumpBtn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        requestJump();
      });
    }

    function shouldIgnoreCameraDragTarget(target) {
      if (!(target instanceof Element)) return false;
      return !!target.closest("#ui, #miniMapWrap, #fullMapModal, #sideButtons, #inventoryModal, #joystick, #jumpBtn");
    }

    function bindCameraControls() {
      renderer.domElement.addEventListener("pointerdown", (e) => {
        if (e.pointerType === "mouse" && e.button !== 0) return;
        if (shouldIgnoreCameraDragTarget(e.target)) return;
        if (e.target !== renderer.domElement) return;
        cameraDrag.active = true;
        cameraDrag.pointerId = e.pointerId;
        cameraDrag.lastX = e.clientX;
        cameraDrag.lastY = e.clientY;
        renderer.domElement.setPointerCapture(e.pointerId);
      });

      renderer.domElement.addEventListener("pointermove", (e) => {
        if (!cameraDrag.active || e.pointerId !== cameraDrag.pointerId) return;
        const dx = e.clientX - cameraDrag.lastX;
        const dy = e.clientY - cameraDrag.lastY;
        cameraYaw -= dx * config.cameraYawSensitivity;
        cameraPitch = clamp(cameraPitch - dy * config.cameraPitchSensitivity, config.cameraPitchMin, config.cameraPitchMax);
        cameraDrag.lastX = e.clientX;
        cameraDrag.lastY = e.clientY;
      });

      function endDrag(e) {
        if (e.pointerId !== cameraDrag.pointerId) return;
        cameraDrag.active = false;
        cameraDrag.pointerId = null;
      }

      renderer.domElement.addEventListener("pointerup", endDrag);
      renderer.domElement.addEventListener("pointercancel", endDrag);
      renderer.domElement.addEventListener("lostpointercapture", () => {
        cameraDrag.active = false;
        cameraDrag.pointerId = null;
      });

      renderer.domElement.addEventListener("click", (e) => {
        if (shouldIgnoreCameraDragTarget(e.target)) return;
        tryInteractHerbAtScreen(e.clientX, e.clientY);
      });
    }

    function spawnStone(data, now = performance.now()) {
      if (!rockTemplate) return;
      if (data.activeObject || data.isSpawning || data.removed) return;
      data.isSpawning = true;
      try {
        const root = deepCloneUnique(rockTemplate);
        fitAndGround(root, ROCK_TARGET_HEIGHT * data.scale, ROCK_GROUND_LIFT);
        updateEntityGroundForTemplate(data, root);
        root.rotation.y = data.rotY;
        root.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        const box = new THREE.Box3().setFromObject(root);
        const size = box.getSize(new THREE.Vector3());
        data.collisionRadius = ROCK_COLLISION_RADIUS;
        data.activeObject = { root };
        scene.add(root);
        activeRocks.set(data.id, data);
      } finally {
        data.isSpawning = false;
      }
    }

    function despawnStone(data, now = performance.now()) {
      if (!data?.activeObject || data.isDespawning) return;
      data.isDespawning = true;
      try {
        const root = data.activeObject.root;
        if (root?.parent) root.parent.remove(root);
        disposeObject3D(root);
        data.activeObject = null;
        activeRocks.delete(data.id);
        addEntityRespawnLock(data);
      } finally {
        data.isDespawning = false;
      }
    }

    async function loadPlayerRig() {
      const fbx = await loadFBXWithFallback([WALK_FBX_URL]);
      if (fbx) {
        visualRoot = fbx;
        fitAndGround(visualRoot, config.modelHeight, 0.03);
        visualRoot.rotation.y = Math.PI;
        playerRoot.add(visualRoot);
      } else {

    async function loadAnimations() {
      if (!visualRoot || visualRoot.userData.fallback) return;
      try {
        const [walkFBX, runFBX, attackFBX] = await Promise.all([
          loadFBXWithFallback([WALK_FBX_URL]),
          loadFBXWithFallback([RUN_FBX_URL]),
          loadFBXWithFallback([ATTACK_FBX_URL])
        ]);

        if (!walkFBX || !runFBX || !attackFBX) return;

        const rootNames = collectRootNames(visualRoot);
        rootNames.push("Armature", "RootNode", "Scene");

        const walkClip = stripRootMotionTracks(firstClip(walkFBX), rootNames);
        const runClip = stripRootMotionTracks(firstClip(runFBX), rootNames);
        const attackClip = stripRootMotionTracks(firstClip(attackFBX), rootNames);

        mixer = new THREE.AnimationMixer(visualRoot);

        if (walkClip) {
          actions.walk = mixer.clipAction(walkClip);
          actions.walk.setLoop(THREE.LoopRepeat, Infinity);
          actions.walk.clampWhenFinished = false;
          actions.walk.enabled = true;
        }
        if (runClip) {
          actions.run = mixer.clipAction(runClip);
          actions.run.setLoop(THREE.LoopRepeat, Infinity);
          actions.run.clampWhenFinished = false;
          actions.run.enabled = true;
        }
        if (attackClip) {
          actions.attack = mixer.clipAction(attackClip);
          actions.attack.setLoop(THREE.LoopOnce, 1);
          actions.attack.clampWhenFinished = true;
          actions.attack.enabled = true;
        }
      } catch (e) {
        console.warn("animation load failed", e);
      }
    }

      } catch (err) {
        console.error(err);
        loading.classList.add("hidden");
        setStatus("読み込み失敗");
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.033);
      const now = performance.now();

      if (mixer) mixer.update(delta);

      updateMovementAndWorld(delta, now);

      if (!gameOver) {
        updateHerbActionUI();
        updateRecallActionUI();
      }
    }

    bindUI();
    bindKeyboardControls();
    bindCameraControls();
    updateJoystickBindings();
    bootstrap();
    animate();
  </script>
</body>
</html>
