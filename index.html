<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D Model Animation Viewer - Three.js</title>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #eef2f7;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
    }

    #ui {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 10;
      min-width: 280px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      color: #222;
      line-height: 1.55;
      font-size: 14px;
      user-select: none;
    }

    #status {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.78;
      word-break: break-all;
    }

    #clipList {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .clipBtn {
      border: 0;
      border-radius: 10px;
      padding: 8px 10px;
      background: #2f82ff;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .clipBtn.active {
      background: #1e5fbf;
    }

    #hint {
      position: fixed;
      right: 12px;
      top: 12px;
      z-index: 10;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.10);
      color: #222;
      font-size: 12px;
      line-height: 1.45;
      user-select: none;
      pointer-events: none;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="ui">
    <div><strong>3Dアニメーションビューア</strong></div>
    <div>モデル: <span id="modelName">読み込み中...</span></div>
    <span id="status">待機中</span>
    <div id="clipList"></div>
  </div>

  <div id="hint">
    マウスドラッグで回転 / ホイールでズーム<br>
    埋め込みアニメーションを自動再生
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { FBXLoader } from "three/addons/loaders/FBXLoader.js";

    // =========================
    // 設定
    // =========================
    // ここを書き換えて使ってください
    const MODEL_URL = "./model.glb"; // 例: "./character.glb" / "./animation.fbx"

    // =========================
    // 基本セットアップ
    // =========================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xEEF2F7);
    scene.fog = new THREE.Fog(0xEEF2F7, 20, 100);

    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );
    camera.position.set(0, 1.8, 5);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.2, 0);

    // =========================
    // ライティング
    // =========================
    scene.add(new THREE.AmbientLight(0xffffff, 1.3));

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
    dirLight.position.set(8, 12, 6);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    scene.add(dirLight);

    // =========================
    // 地面
    // =========================
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 1.0,
        metalness: 0.0
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(200, 100, 0x666666, 0xb8b8b8);
    grid.material.transparent = true;
    grid.material.opacity = 0.35;
    scene.add(grid);

    // =========================
    // DOM
    // =========================
    const statusEl = document.getElementById("status");
    const modelNameEl = document.getElementById("modelName");
    const clipListEl = document.getElementById("clipList");

    modelNameEl.textContent = MODEL_URL.split("/").pop() || MODEL_URL;

    // =========================
    // モデル/アニメ管理
    // =========================
    const root = new THREE.Group();
    scene.add(root);

    let currentModel = null;
    let mixer = null;
    let clips = [];
    let actions = [];
    let activeAction = null;

    function clearModel() {
      while (root.children.length > 0) {
        root.remove(root.children[0]);
      }
      currentModel = null;
      mixer = null;
      clips = [];
      actions = [];
      activeAction = null;
      clipListEl.innerHTML = "";
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function applyShadowFlags(object3D) {
      object3D.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
    }

    function fitModel(model) {
      applyShadowFlags(model);

      // 中心を取る
      const box1 = new THREE.Box3().setFromObject(model);
      const center1 = box1.getCenter(new THREE.Vector3());
      model.position.x -= center1.x;
      model.position.z -= center1.z;

      // 大きさを合わせる
      const box2 = new THREE.Box3().setFromObject(model);
      const size2 = box2.getSize(new THREE.Vector3());
      const targetHeight = 2.4;
      const scale = targetHeight / (size2.y || 1);
      model.scale.setScalar(scale);

      // 接地位置を合わせる
      const box3 = new THREE.Box3().setFromObject(model);
      const center3 = box3.getCenter(new THREE.Vector3());
      const minY = box3.min.y;

      model.position.x -= center3.x;
      model.position.z -= center3.z;
      model.position.y -= minY;

      // Meshy.ai/Blender系で前向きがズレる場合の補正
      model.rotation.y = Math.PI;

      return model;
    }

    function buildClipButtons(clipNames) {
      clipListEl.innerHTML = "";

      clipNames.forEach((name, index) => {
        const btn = document.createElement("button");
        btn.className = "clipBtn";
        btn.textContent = name || `Animation ${index + 1}`;
        btn.addEventListener("click", () => {
          playClip(index);
        });
        clipListEl.appendChild(btn);
      });
    }

    function updateActiveButton(index) {
      const buttons = clipListEl.querySelectorAll(".clipBtn");
      buttons.forEach((btn, i) => {
        btn.classList.toggle("active", i === index);
      });
    }

    function playClip(index) {
      if (!mixer || !actions[index]) return;

      if (activeAction) {
        activeAction.fadeOut(0.2);
      }

      const next = actions[index];
      next.reset();
      next.fadeIn(0.2);
      next.play();
      activeAction = next;

      updateActiveButton(index);
      setStatus(`再生中: ${clips[index]?.name || `Animation ${index + 1}`}`);
    }

    function loadModel(url) {
      clearModel();

      const ext = url.split("?")[0].split(".").pop().toLowerCase();

      const onLoaded = (sceneOrObject, animationClips = []) => {
        clearModel();

        const model = fitModel(sceneOrObject);
        root.add(model);
        currentModel = model;

        clips = animationClips || [];

        if (clips.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          actions = clips.map((clip) => {
            const action = mixer.clipAction(clip);
            action.setLoop(THREE.LoopRepeat);
            action.clampWhenFinished = false;
            return action;
          });

          buildClipButtons(clips.map(c => c.name));
          playClip(0);
          setStatus(`読み込み完了。アニメーション ${clips.length} 個を再生できます`);
        } else {
          mixer = null;
          actions = [];
          setStatus("読み込み完了。ただし埋め込みアニメーションは見つかりませんでした");
        }
      };

      if (ext === "glb" || ext === "gltf") {
        const loader = new GLTFLoader();
        loader.load(
          url,
          (gltf) => {
            onLoaded(gltf.scene, gltf.animations || []);
          },
          undefined,
          (err) => {
            console.error(err);
            setStatus("GLB/GLTFの読み込みに失敗しました");
          }
        );
      } else if (ext === "fbx") {
        const loader = new FBXLoader();
        loader.load(
          url,
          (fbx) => {
            onLoaded(fbx, fbx.animations || []);
          },
          undefined,
          (err) => {
            console.error(err);
            setStatus("FBXの読み込みに失敗しました");
          }
        );
      } else {
        setStatus("未対応の拡張子です。.glb / .gltf / .fbx を使ってください");
      }
    }

    // =========================
    // 起動
    // =========================
    loadModel(MODEL_URL);

    // =========================
    // ループ
    // =========================
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (mixer) {
        mixer.update(delta);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // =========================
    // リサイズ
    // =========================
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
