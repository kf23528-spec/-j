<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Three.js Character Controller</title>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f6f7fb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #hud {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 20;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      color: #222;
      line-height: 1.5;
      font-size: 14px;
      user-select: none;
      min-width: 280px;
    }

    #status {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.78;
      word-break: break-all;
    }

    #hint {
      position: fixed;
      right: 12px;
      top: 12px;
      z-index: 20;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.10);
      color: #222;
      font-size: 12px;
      line-height: 1.45;
      user-select: none;
      pointer-events: none;
    }

    #jumpBtn {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      width: 88px;
      height: 88px;
      border: 0;
      border-radius: 50%;
      background: rgba(47, 130, 255, 0.90);
      color: white;
      font-weight: 800;
      font-size: 16px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.22);
      touch-action: none;
    }

    #jumpBtn:active {
      transform: translateY(1px) scale(0.98);
    }

    #joystick-base {
      position: fixed;
      left: 24px;
      bottom: 24px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.16);
      border: 2px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(6px);
      z-index: 20;
      touch-action: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #joystick-thumb {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.65);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
      transform: translate(0px, 0px);
      transition: transform 0.06s linear;
      pointer-events: none;
    }

    #loadingOverlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(246, 247, 251, 0.65);
      backdrop-filter: blur(6px);
      color: #222;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.25s ease;
    }

    #loadingOverlay.hidden {
      opacity: 0;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="loadingOverlay">character.glb を読み込み中…</div>

  <div id="hud">
    WASD / 矢印キーで操作<br>
    W・↑ 前進 / S・↓ 後退 / A・← 左回転 / D・→ 右回転 / Space ジャンプ
    <span id="status">読み込み待ち</span>
  </div>

  <div id="hint">
    スマホは左下スティックで移動<br>
    右下のJUMPでジャンプ
  </div>

  <div id="joystick-base" aria-label="virtual joystick">
    <div id="joystick-thumb"></div>
  </div>

  <button id="jumpBtn" type="button">JUMP</button>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    // ---------------------------------
    // 基本セットアップ
    // ---------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf6f7fb);
    scene.fog = new THREE.Fog(0xf6f7fb, 25, 90);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // ---------------------------------
    // ライト
    // ---------------------------------
    scene.add(new THREE.AmbientLight(0xffffff, 1.25));

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.2);
    dirLight.position.set(8, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    scene.add(dirLight);

    // ---------------------------------
    // 地面とグリッド
    // ---------------------------------
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 1.0,
        metalness: 0.0
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(200, 100, 0x666666, 0xb8b8b8);
    grid.material.transparent = true;
    grid.material.opacity = 0.35;
    scene.add(grid);

    // ---------------------------------
    // キャラクター本体
    // ---------------------------------
    const characterRoot = new THREE.Group();
    scene.add(characterRoot);

    const statusEl = document.getElementById("status");
    const loadingOverlay = document.getElementById("loadingOverlay");

    let characterObject = null;
    let activeGLTF = null;
    let currentMixer = null;
    let currentAnimations = [];
    let proceduralParts = {
      leftArm: null,
      rightArm: null,
      leftLeg: null,
      rightLeg: null,
      head: null,
      torso: null
    };

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function clearCharacter() {
      while (characterRoot.children.length > 0) {
        characterRoot.remove(characterRoot.children[0]);
      }
      characterObject = null;
      activeGLTF = null;
      currentMixer = null;
      currentAnimations = [];
      proceduralParts = {
        leftArm: null,
        rightArm: null,
        leftLeg: null,
        rightLeg: null,
        head: null,
        torso: null
      };
    }

    function applyShadowFlags(object3D) {
      object3D.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
    }

    function createFallbackCube() {
      clearCharacter();

      const cube = new THREE.Mesh(
        new THREE.BoxGeometry(1, 2, 1),
        new THREE.MeshStandardMaterial({
          color: 0xff3b3b,
          roughness: 0.6,
          metalness: 0.1
        })
      );

      cube.position.y = 1;
      cube.castShadow = true;
      cube.receiveShadow = true;

      characterRoot.add(cube);
      characterObject = cube;
      setStatus("character.glb の読み込みに失敗したため、赤い立方体を使用中");
      loadingOverlay.classList.add("hidden");
    }

    function fitAndGroundModel(model) {
      applyShadowFlags(model);

      // 1) 原点の中央へ寄せる
      const boxA = new THREE.Box3().setFromObject(model);
      const centerA = boxA.getCenter(new THREE.Vector3());
      model.position.x -= centerA.x;
      model.position.z -= centerA.z;

      // 2) 自動で見やすい高さへスケーリング
      const boxB = new THREE.Box3().setFromObject(model);
      const sizeB = boxB.getSize(new THREE.Vector3());
      const targetHeight = 2.4;
      const scale = targetHeight / (sizeB.y || 1);
      model.scale.setScalar(scale);

      // 3) スケール後に地面へ接地
      const boxC = new THREE.Box3().setFromObject(model);
      const centerC = boxC.getCenter(new THREE.Vector3());
      const minY = boxC.min.y;

      model.position.x -= centerC.x;
      model.position.z -= centerC.z;
      model.position.y -= minY;

      return model;
    }

    function pickProceduralParts(root) {
      const parts = {
        leftArm: null,
        rightArm: null,
        leftLeg: null,
        rightLeg: null,
        head: null,
        torso: null
      };

      root.traverse((obj) => {
        if (!obj.isObject3D) return;
        const name = String(obj.name || "").toLowerCase();

        if (!parts.leftArm && (name.includes("leftarm") || name.includes("arm_l") || name.includes("l_arm") || name.includes("left_arm") || name.includes("leftupperarm"))) parts.leftArm = obj;
        if (!parts.rightArm && (name.includes("rightarm") || name.includes("arm_r") || name.includes("r_arm") || name.includes("right_arm") || name.includes("rightupperarm"))) parts.rightArm = obj;
        if (!parts.leftLeg && (name.includes("leftleg") || name.includes("leg_l") || name.includes("l_leg") || name.includes("left_leg") || name.includes("leftupperleg"))) parts.leftLeg = obj;
        if (!parts.rightLeg && (name.includes("rightleg") || name.includes("leg_r") || name.includes("r_leg") || name.includes("right_leg") || name.includes("rightupperleg"))) parts.rightLeg = obj;
        if (!parts.head && (name.includes("head"))) parts.head = obj;
        if (!parts.torso && (name.includes("spine") || name.includes("chest") || name.includes("torso") || name.includes("body") || name.includes("hips"))) parts.torso = obj;
      });

      return parts;
    }

    function maybeRotateToFaceForward(model) {
      // よくあるGLTFの前方向差を吸収するための軽い補正
      // 必要ないモデルもあるので、完全固定ではなく比較的安全な回転だけ入れる
      model.rotation.y = Math.PI;
    }

    function loadCharacterFromPath() {
      const loader = new GLTFLoader();

      loader.load(
        "character.glb",
        (gltf) => {
          clearCharacter();

          activeGLTF = gltf;
          const model = fitAndGroundModel(gltf.scene);
          maybeRotateToFaceForward(model);

          characterRoot.add(model);
          characterObject = model;

          currentAnimations = gltf.animations || [];
          if (currentAnimations.length > 0) {
            currentMixer = new THREE.AnimationMixer(model);
            currentAnimations.forEach((clip) => {
              const action = currentMixer.clipAction(clip);
              action.play();
            });
            setStatus(`character.glb を読み込みました。${currentAnimations.length}個のアニメーションを再生中`);
          } else {
            currentMixer = null;
            proceduralParts = pickProceduralParts(model);
            setStatus("character.glb を読み込みました。内蔵アニメなしのため、プログラムアニメを使用中");
          }

          loadingOverlay.classList.add("hidden");
        },
        undefined,
        (err) => {
          console.error("character.glb load failed:", err);
          createFallbackCube();
        }
      );
    }

    // ---------------------------------
    // 入力
    // ---------------------------------
    const keys = Object.create(null);

    window.addEventListener("keydown", (event) => {
      keys[event.code] = true;

      if (event.code === "Space" && !event.repeat) {
        event.preventDefault();
        tryJump();
      }
    });

    window.addEventListener("keyup", (event) => {
      keys[event.code] = false;
    });

    // ---------------------------------
    // ジャンプ物理
    // ---------------------------------
    let verticalVelocity = 0;
    let grounded = true;
    const gravity = -22;
    const jumpStrength = 8.8;

    function tryJump() {
      if (!grounded) return;
      verticalVelocity = jumpStrength;
      grounded = false;
    }

    // ---------------------------------
    // スマホ用ジョイスティック
    // ---------------------------------
    const joystickBase = document.getElementById("joystick-base");
    const joystickThumb = document.getElementById("joystick-thumb");

    const joystick = {
      active: false,
      pointerId: null,
      x: 0,
      y: 0,
      maxRadius: 48
    };

    function updateJoystickVisual(x, y) {
      joystickThumb.style.transform = `translate(${x * joystick.maxRadius}px, ${y * joystick.maxRadius}px)`;
    }

    function resetJoystick() {
      joystick.active = false;
      joystick.pointerId = null;
      joystick.x = 0;
      joystick.y = 0;
      updateJoystickVisual(0, 0);
    }

    joystickBase.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      joystick.active = true;
      joystick.pointerId = e.pointerId;
      joystickBase.setPointerCapture(e.pointerId);
    });

    joystickBase.addEventListener("pointermove", (e) => {
      if (!joystick.active || joystick.pointerId !== e.pointerId) return;

      const rect = joystickBase.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      let dx = e.clientX - cx;
      let dy = e.clientY - cy;

      const len = Math.hypot(dx, dy);
      const max = joystick.maxRadius;

      if (len > max) {
        dx = (dx / len) * max;
        dy = (dy / len) * max;
      }

      joystick.x = dx / max;
      joystick.y = dy / max;
      updateJoystickVisual(joystick.x, joystick.y);
    });

    function endJoystick(e) {
      if (joystick.pointerId !== e.pointerId) return;
      resetJoystick();
    }

    joystickBase.addEventListener("pointerup", endJoystick);
    joystickBase.addEventListener("pointercancel", endJoystick);
    joystickBase.addEventListener("lostpointercapture", resetJoystick);

    document.getElementById("jumpBtn").addEventListener("pointerdown", (e) => {
      e.preventDefault();
      tryJump();
    });

    // ---------------------------------
    // カメラ
    // ---------------------------------
    camera.position.set(0, 4, 8);
    camera.lookAt(0, 1.2, 0);

    // ---------------------------------
    // プログラムアニメーション（アニメなし時のフォールバック）
    // ---------------------------------
    function driveProceduralAnimation(t, moving, airborne, speedFactor = 1) {
      if (!characterObject) return;

      const sway = moving ? Math.sin(t * 12 * speedFactor) : Math.sin(t * 2.5) * 0.08;
      const sway2 = moving ? Math.sin(t * 12 * speedFactor + Math.PI) : Math.sin(t * 2.2 + 0.6) * 0.08;
      const lift = moving ? Math.abs(Math.sin(t * 12 * speedFactor)) : 0;

      // ボーンっぽい名前が取れる場合は個別に回す
      const { leftArm, rightArm, leftLeg, rightLeg, head, torso } = proceduralParts;

      if (torso) torso.rotation.z = Math.sin(t * 2.0) * 0.03 + (airborne ? -0.05 : 0);
      if (head) head.rotation.x = Math.sin(t * 1.8) * 0.04 + (airborne ? 0.04 : 0);

      if (leftArm) leftArm.rotation.x = -0.7 * lift * (moving ? 1 : 0.35) + (airborne ? -0.15 : 0);
      if (rightArm) rightArm.rotation.x = 0.7 * lift * (moving ? 1 : 0.35) + (airborne ? -0.15 : 0);
      if (leftLeg) leftLeg.rotation.x = 0.8 * lift * (moving ? 1 : 0.35) + (airborne ? 0.12 : 0);
      if (rightLeg) rightLeg.rotation.x = -0.8 * lift * (moving ? 1 : 0.35) + (airborne ? 0.12 : 0);

      // ボーンが見つからなくても、全体の揺れで「動いている感」を出す
      characterObject.position.y += Math.sin(t * 6.0) * 0.0005 * (moving ? 1 : 0.4);
      characterObject.rotation.z = Math.sin(t * 4.0) * 0.015;
      characterObject.rotation.x = Math.sin(t * 3.0) * 0.01;

      if (moving) {
        characterRoot.scale.set(
          1 + Math.sin(t * 12 * speedFactor) * 0.01,
          1 + Math.abs(Math.sin(t * 12 * speedFactor)) * 0.01,
          1 + Math.sin(t * 12 * speedFactor + 1.2) * 0.01
        );
      } else {
        characterRoot.scale.set(1, 1, 1);
      }
    }

    // ---------------------------------
    // メインループ
    // ---------------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.033);
      const elapsed = clock.getElapsedTime();

      const turnSpeed = 2.8;
      const moveSpeed = 5.0;

      const turnLeft = keys.ArrowLeft || keys.KeyA;
      const turnRight = keys.ArrowRight || keys.KeyD;
      const forwardKey = keys.ArrowUp || keys.KeyW;
      const backwardKey = keys.ArrowDown || keys.KeyS;

      const stickX = joystick.x;
      const stickY = joystick.y;

      const movingInput = (forwardKey || backwardKey || Math.abs(stickY) > 0.18);
      const turningInput = (turnLeft || turnRight || Math.abs(stickX) > 0.18);

      // 回転
      if (turnLeft || stickX < -0.18) characterRoot.rotation.y += turnSpeed * delta;
      if (turnRight || stickX > 0.18) characterRoot.rotation.y -= turnSpeed * delta;

      // 前後移動
      let moveAmount = 0;
      if (forwardKey || stickY < -0.18) moveAmount += 1;
      if (backwardKey || stickY > 0.18) moveAmount -= 1;

      if (moveAmount !== 0) {
        const forwardDir = new THREE.Vector3(0, 0, 1).applyQuaternion(characterRoot.quaternion);
        characterRoot.position.addScaledVector(forwardDir, moveAmount * moveSpeed * delta);
      }

      // 重力とジャンプ
      verticalVelocity += gravity * delta;
      characterRoot.position.y += verticalVelocity * delta;

      if (characterRoot.position.y <= 0) {
        characterRoot.position.y = 0;
        verticalVelocity = 0;
        grounded = true;
      }

      // GLTFにアニメがある場合は再生
      if (currentMixer) {
        currentMixer.update(delta);
      } else if (characterObject) {
        // 内蔵アニメが無い場合のプログラムアニメーション
        driveProceduralAnimation(elapsed, movingInput || turningInput, !grounded);
      }

      // 画像や単純メッシュのときは、見栄えのためカメラを見る
      if (characterObject && characterObject.isMesh && characterObject.geometry && characterObject.geometry.type === "PlaneGeometry") {
        characterObject.lookAt(camera.position);
      }

      // カメラ追従
      const cameraOffset = new THREE.Vector3(0, 3.8, -7.5).applyQuaternion(characterRoot.quaternion);
      const desiredCameraPos = characterRoot.position.clone().add(cameraOffset);

      camera.position.lerp(desiredCameraPos, 1 - Math.exp(-8 * delta));
      camera.lookAt(
        characterRoot.position.x,
        characterRoot.position.y + 1.3,
        characterRoot.position.z
      );

      renderer.render(scene, camera);
    }

    animate();

    // ---------------------------------
    // リサイズ
    // ---------------------------------
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    // ---------------------------------
    // 起動時に自動読み込み
    // ---------------------------------
    loadCharacterFromPath();
  </script>
</body>
</html>
