<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Meshy GLB Game Viewer</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #eef2f7;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }
    canvas { display: block; }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(238, 242, 247, 0.76);
      backdrop-filter: blur(8px);
      color: #222;
      font-size: 16px;
      font-weight: 800;
      transition: opacity 0.25s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #ui {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 20;
      min-width: 280px;
      max-width: min(92vw, 420px);
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      color: #222;
      line-height: 1.5;
      font-size: 14px;
      user-select: none;
    }
    #title {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 4px;
    }
    #meta {
      font-size: 12px;
      opacity: 0.8;
      word-break: break-word;
    }
    #status {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #1d3f7a;
    }
    #help {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.82;
      line-height: 1.5;
    }

    #joystick {
      position: fixed;
      left: 18px;
      bottom: 18px;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 10px 30px rgba(0,0,0,0.08);
      backdrop-filter: blur(8px);
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 25;
    }
    #joystick::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.35);
    }
    #joyKnob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 54px;
      height: 54px;
      margin-left: -27px;
      margin-top: -27px;
      border-radius: 50%;
      background: rgba(47, 130, 255, 0.9);
      box-shadow: 0 8px 18px rgba(47, 130, 255, 0.25);
      transform: translate(0, 0);
    }

    #jumpBtn {
      position: fixed;
      right: 18px;
      bottom: 28px;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 0;
      background: linear-gradient(180deg, #ff8f4d, #ff6a2c);
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.03em;
      box-shadow: 0 10px 24px rgba(255, 106, 44, 0.28);
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 25;
    }
    #jumpBtn:active {
      transform: scale(0.97);
    }

    @media (max-width: 700px) {
      #ui {
        min-width: 0;
        max-width: calc(100vw - 24px);
      }
      #help { font-size: 11px; }
      #jumpBtn {
        width: 94px;
        height: 94px;
        font-size: 16px;
      }
      #joystick {
        width: 118px;
        height: 118px;
      }
      #joyKnob {
        width: 48px;
        height: 48px;
        margin-left: -24px;
        margin-top: -24px;
      }
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="loading">読み込み中…</div>

  <div id="ui">
    <div id="title">Meshy / character 操作ビューア</div>
    <div id="meta">
      表示モデル: <span id="fileName">Meshy_AI_biped_Animation_Run_03_withSkin.glb</span><br>
      アニメ: <span id="animName">Armature|Run_03|baselayer</span>
    </div>
    <div id="status">待機中</div>
    <div id="help">
      操作: WASD / 矢印キー / 画面スティック / ジャンプボタン<br>
      W/S = 前進・後退, A/D = 回転, Space = ジャンプ
    </div>
  </div>

  <div id="joystick" aria-label="joystick">
    <div id="joyKnob"></div>
  </div>
  <button id="jumpBtn">JUMP</button>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const MODEL_URL = "./Meshy_AI_biped_Animation_Run_03_withSkin.glb";
    const TARGET_CLIP_NAME = "Armature|Run_03|baselayer";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xEEF2F7);
    scene.fog = new THREE.Fog(0xEEF2F7, 18, 120);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 2.5, 6.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.domElement.style.touchAction = "none";
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.25));

    const sun = new THREE.DirectionalLight(0xffffff, 2.15);
    sun.position.set(8, 14, 6);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 60;
    sun.shadow.camera.left = -20;
    sun.shadow.camera.right = 20;
    sun.shadow.camera.top = 20;
    sun.shadow.camera.bottom = -20;
    scene.add(sun);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(250, 250),
      new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1.0, metalness: 0.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(250, 125, 0x7a7a7a, 0xbfc7d1);
    grid.material.transparent = true;
    grid.material.opacity = 0.32;
    scene.add(grid);

    const loader = new GLTFLoader();

    const uiStatus = document.getElementById("status");
    const loading = document.getElementById("loading");
    const fileName = document.getElementById("fileName");
    const animName = document.getElementById("animName");

    const joystickEl = document.getElementById("joystick");
    const joyKnob = document.getElementById("joyKnob");
    const jumpBtn = document.getElementById("jumpBtn");

    fileName.textContent = "Meshy_AI_biped_Animation_Run_03_withSkin.glb";
    animName.textContent = TARGET_CLIP_NAME;

    const player = new THREE.Group();
    scene.add(player);

    let modelRoot = null;
    let mixer = null;
    let action = null;
    let wasMoving = false;

    const keys = new Set();

    const stick = {
      active: false,
      pointerId: null,
      x: 0,
      y: 0,
      radius: 40
    };

    const physics = {
      vy: 0,
      onGround: true
    };

    const config = {
      moveSpeed: 4.8,
      turnSpeed: 2.6,
      gravity: -22.0,
      jumpVelocity: 8.8,
      cameraHeight: 2.55,
      cameraDistance: 6.9,
      cameraSmooth: 8.5,
      targetHeight: 1.5,
      modelHeight: 2.45
    };

    const clock = new THREE.Clock();

    function setStatus(text) {
      uiStatus.textContent = text;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function applyShadows(object3D) {
      object3D.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
    }

    function fitAndGround(model) {
      applyShadows(model);

      const box1 = new THREE.Box3().setFromObject(model);
      const center1 = box1.getCenter(new THREE.Vector3());
      model.position.x -= center1.x;
      model.position.z -= center1.z;

      const box2 = new THREE.Box3().setFromObject(model);
      const size2 = box2.getSize(new THREE.Vector3());
      const scale = config.modelHeight / Math.max(size2.y, 0.0001);
      model.scale.setScalar(scale);

      const box3 = new THREE.Box3().setFromObject(model);
      const center3 = box3.getCenter(new THREE.Vector3());
      const minY = box3.min.y;

      model.position.x -= center3.x;
      model.position.z -= center3.z;
      model.position.y -= minY;

      model.rotation.y = Math.PI;
      return model;
    }

    function updateJoystickVisual() {
      const px = stick.x * stick.radius;
      const py = stick.y * stick.radius;
      joyKnob.style.transform = `translate(${px}px, ${py}px)`;
    }

    function resetJoystick() {
      stick.active = false;
      stick.pointerId = null;
      stick.x = 0;
      stick.y = 0;
      updateJoystickVisual();
    }

    function getKeyboardState() {
      const forward =
        (keys.has("KeyW") || keys.has("ArrowUp") ? 1 : 0) +
        (keys.has("KeyS") || keys.has("ArrowDown") ? -1 : 0);

      const turn =
        (keys.has("KeyA") || keys.has("ArrowLeft") ? 1 : 0) +
        (keys.has("KeyD") || keys.has("ArrowRight") ? -1 : 0);

      const jump = keys.has("Space");
      return { forward, turn, jump };
    }

    function getCombinedInput() {
      const k = getKeyboardState();
      return {
        forward: clamp(k.forward + (-stick.y), -1, 1),
        turn: clamp(k.turn + stick.x, -1, 1),
        jump: k.jump
      };
    }

    function requestJump() {
      if (!physics.onGround) return;
      physics.vy = config.jumpVelocity;
      physics.onGround = false;
    }

    function playRunAnimation() {
      if (!action) return;
      action.enabled = true;
      action.reset();
      action.paused = false;
      action.play();
    }

    function stopRunAnimation() {
      if (!action) return;
      action.stop();
      action.reset();
    }

    async function loadModel() {
      try {
        setStatus("モデルを読み込み中…");

        const gltf = await loader.loadAsync(MODEL_URL);

        modelRoot = gltf.scene;
        fitAndGround(modelRoot);
        player.add(modelRoot);

        const clip = gltf.animations.find((c) => c.name && c.name.includes("Run_03"));

        if (clip) {
          mixer = new THREE.AnimationMixer(modelRoot);
          action = mixer.clipAction(clip);
          action.setLoop(THREE.LoopRepeat, Infinity);
          action.clampWhenFinished = false;
          action.enabled = true;
          action.reset();
          action.stop();
          wasMoving = false;
          console.log("Animation found:", clip.name);
        } else {
          console.error("Run_03 animation not found. Available clips:", gltf.animations.map(a => a.name));
        }

        loading.classList.add("hidden");
        setStatus("待機中");
      } catch (err) {
        console.error(err);
        loading.classList.add("hidden");
        setStatus("読み込み失敗");
      }
    }

    function updateMovement(delta) {
      const input = getCombinedInput();

      if (input.jump) {
        requestJump();
      }

      if (Math.abs(input.turn) > 0.001) {
        player.rotation.y += input.turn * config.turnSpeed * delta;
      }

      const facingYaw = player.rotation.y + Math.PI;

      if (Math.abs(input.forward) > 0.001) {
        player.position.x += Math.sin(facingYaw) * input.forward * config.moveSpeed * delta;
        player.position.z += Math.cos(facingYaw) * input.forward * config.moveSpeed * delta;
      }

      physics.vy += config.gravity * delta;
      player.position.y += physics.vy * delta;

      if (player.position.y <= 0) {
        player.position.y = 0;
        physics.vy = 0;
        physics.onGround = true;
      }

      const isMoving = Math.abs(input.forward) > 0.001 || Math.abs(input.turn) > 0.001;

      if (isMoving && !wasMoving) {
        playRunAnimation();
      } else if (!isMoving && wasMoving) {
        stopRunAnimation();
      }
      wasMoving = isMoving;

      setStatus(
        physics.onGround
          ? (isMoving ? "移動中" : "待機中")
          : (isMoving ? "移動中 / ジャンプ中" : "ジャンプ中")
      );
    }

    function updateCamera(delta) {
      const facingYaw = player.rotation.y + Math.PI;
      const offset = new THREE.Vector3(0, config.cameraHeight, config.cameraDistance);
      offset.applyAxisAngle(new THREE.Vector3(0, 1, 0), facingYaw);

      const desiredCameraPos = new THREE.Vector3().copy(player.position).add(offset);
      const lerpAlpha = 1 - Math.exp(-config.cameraSmooth * delta);
      camera.position.lerp(desiredCameraPos, lerpAlpha);

      camera.lookAt(
        player.position.x,
        player.position.y + config.targetHeight,
        player.position.z
      );
    }

    joystickEl.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      stick.active = true;
      stick.pointerId = e.pointerId;
      joystickEl.setPointerCapture(e.pointerId);

      const rect = joystickEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const len = Math.hypot(dx, dy);
      const maxLen = stick.radius;

      let nx = dx / maxLen;
      let ny = dy / maxLen;

      if (len > maxLen) {
        nx = dx / len;
        ny = dy / len;
      }

      stick.x = clamp(nx, -1, 1);
      stick.y = clamp(ny, -1, 1);
      updateJoystickVisual();
    });

    joystickEl.addEventListener("pointermove", (e) => {
      if (!stick.active || e.pointerId !== stick.pointerId) return;
      e.preventDefault();

      const rect = joystickEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const len = Math.hypot(dx, dy);
      const maxLen = stick.radius;

      let nx = dx / maxLen;
      let ny = dy / maxLen;

      if (len > maxLen) {
        nx = dx / len;
        ny = dy / len;
      }

      stick.x = clamp(nx, -1, 1);
      stick.y = clamp(ny, -1, 1);
      updateJoystickVisual();
    });

    function endJoystick(e) {
      if (e.pointerId !== stick.pointerId) return;
      resetJoystick();
    }

    joystickEl.addEventListener("pointerup", endJoystick);
    joystickEl.addEventListener("pointercancel", endJoystick);
    joystickEl.addEventListener("lostpointercapture", () => resetJoystick());

    jumpBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      requestJump();
    });

    window.addEventListener("keydown", (e) => {
      if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "KeyW", "KeyA", "KeyS", "KeyD"].includes(e.code)) {
        e.preventDefault();
      }
      keys.add(e.code);
      if (e.code === "Space") requestJump();
    }, { passive: false });

    window.addEventListener("keyup", (e) => {
      keys.delete(e.code);
    });

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.033);

      updateMovement(delta);

      // 毎フレーム必ず更新
      if (mixer) {
        mixer.update(delta);
      }

      updateCamera(delta);
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    loadModel();
    animate();
  </script>
</body>
</html>
