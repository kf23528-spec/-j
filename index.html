<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Forest TPS Game</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #9fd3ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }
    canvas { display: block; }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(238, 242, 247, 0.78);
      backdrop-filter: blur(8px);
      color: #222;
      font-size: 16px;
      font-weight: 800;
      transition: opacity 0.25s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #ui {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 20;
      min-width: 280px;
      max-width: min(92vw, 500px);
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      color: #222;
      line-height: 1.5;
      font-size: 14px;
      user-select: none;
    }
    #title {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 4px;
    }
    #meta {
      font-size: 12px;
      opacity: 0.82;
      word-break: break-word;
    }
    #status {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 800;
      color: #1d3f7a;
    }
    #buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .modeBtn {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      background: #2f82ff;
      box-shadow: 0 8px 18px rgba(47, 130, 255, 0.22);
    }
    .modeBtn.active { background: #1d5fc0; }
    .modeBtn.attack {
      background: #ff6a2c;
      box-shadow: 0 8px 18px rgba(255, 106, 44, 0.22);
    }
    .modeBtn.attack.active { background: #cc4e1d; }

    #help {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.82;
      line-height: 1.5;
    }

    #joystick {
      position: fixed;
      left: 18px;
      bottom: 18px;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 10px 30px rgba(0,0,0,0.08);
      backdrop-filter: blur(8px);
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 25;
    }
    #joystick::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.35);
    }
    #joyKnob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 54px;
      height: 54px;
      margin-left: -27px;
      margin-top: -27px;
      border-radius: 50%;
      background: rgba(47, 130, 255, 0.9);
      box-shadow: 0 8px 18px rgba(47, 130, 255, 0.25);
      transform: translate(0, 0);
    }

    #jumpBtn {
      position: fixed;
      right: 18px;
      bottom: 28px;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 0;
      background: linear-gradient(180deg, #ff8f4d, #ff6a2c);
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.03em;
      box-shadow: 0 10px 24px rgba(255, 106, 44, 0.28);
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 25;
    }
    #jumpBtn:active { transform: scale(0.97); }

    @media (max-width: 700px) {
      #ui {
        min-width: 0;
        max-width: calc(100vw - 24px);
      }
      #help { font-size: 11px; }
      #jumpBtn {
        width: 94px;
        height: 94px;
        font-size: 16px;
      }
      #joystick {
        width: 118px;
        height: 118px;
      }
      #joyKnob {
        width: 48px;
        height: 48px;
        margin-left: -24px;
        margin-top: -24px;
      }
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="loading">読み込み中…</div>

  <div id="ui">
    <div id="title">Forest TPS Game</div>
    <div id="meta">
      歩き: <span id="walkName">Meshy_AI_biped_Animation_Walking_withSkin.fbx</span><br>
      走り: <span id="runName">Meshy_AI_biped_Animation_Running_withSkin.fbx</span><br>
      攻撃: <span id="attackName">Meshy_AI_biped_Animation_Attack_withSkin.fbx</span><br>
      木: <span id="treeName">tree.glb</span><br>
      猪: <span id="boarName">boar.glb</span>
    </div>
    <div id="status">待機中</div>
    <div id="buttons">
      <button id="dashBtn" class="modeBtn">ダッシュ</button>
      <button id="attackBtn" class="modeBtn attack">攻撃</button>
    </div>
    <div id="help">
      WASD / 矢印 / 画面スティック / ジャンプ / 攻撃 / ダッシュ<br>
      スティックはカメラ基準。ドラッグでカメラを回せます。
    </div>
  </div>

  <div id="joystick" aria-label="joystick">
    <div id="joyKnob"></div>
  </div>
  <button id="jumpBtn">JUMP</button>

  <script type="module">
    import * as THREE from "three";
    import { FBXLoader } from "three/addons/loaders/FBXLoader.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const WALK_FBX_URL = "./Meshy_AI_biped_Animation_Walking_withSkin.fbx";
    const ATTACK_FBX_URL = "./Meshy_AI_biped_Animation_Attack_withSkin.fbx";
    const RUN_FBX_URL = "./Meshy_AI_biped_Animation_Running_withSkin.fbx";
    const TREE_URL = "./tree.glb";
    const BOAR_URL = "./boar.glb";

    const VISUAL_LOCAL_YAW = Math.PI;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9fd3ff);
    scene.fog = new THREE.Fog(0x9fd3ff, 45, 220);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 2.5, 6.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.25;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.domElement.style.touchAction = "none";
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xbbe6ff, 0x4d7a3b, 1.9));

    const sun = new THREE.DirectionalLight(0xffffff, 3.2);
    sun.position.set(25, 35, 18);
    sun.castShadow = true;
    sun.shadow.mapSize.set(4096, 4096);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 140;
    sun.shadow.camera.left = -70;
    sun.shadow.camera.right = 70;
    sun.shadow.camera.top = 70;
    sun.shadow.camera.bottom = -70;
    sun.shadow.bias = -0.00015;
    scene.add(sun);

    const fill = new THREE.PointLight(0xffffff, 0.7, 120);
    fill.position.set(-20, 18, -12);
    scene.add(fill);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(500, 500),
      new THREE.MeshStandardMaterial({ color: 0x4fa84f, roughness: 1.0, metalness: 0.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grassGrid = new THREE.GridHelper(500, 100, 0x3e7f3e, 0x6cbf6c);
    grassGrid.material.transparent = true;
    grassGrid.material.opacity = 0.16;
    scene.add(grassGrid);

    const fbxLoader = new FBXLoader();
    const gltfLoader = new GLTFLoader();

    const uiStatus = document.getElementById("status");
    const loading = document.getElementById("loading");
    const dashBtn = document.getElementById("dashBtn");
    const attackBtn = document.getElementById("attackBtn");

    const playerRoot = new THREE.Group();
    scene.add(playerRoot);

    let visualRoot = null;
    let mixer = null;

    const actions = {
      walk: null,
      run: null,
      attack: null
    };

    let currentActionName = "idle";
    let attackPlaying = false;
    let dashMode = false;
    let dashHeld = false;

    const keys = new Set();

    const stick = {
      active: false,
      pointerId: null,
      x: 0,
      y: 0,
      radius: 40
    };

    const physics = {
      vy: 0,
      onGround: true
    };

    const config = {
      walkSpeed: 4.8,
      dashMultiplier: 2.5,
      gravity: -22.0,
      jumpVelocity: 8.8,
      cameraHeight: 2.55,
      cameraDistance: 6.9,
      cameraSmooth: 8.5,
      targetHeight: 1.5,
      modelHeight: 2.45,
      turnSpeed: 9.0,
      attackDamage: 50,
      attackRange: 4.5,
      attackConeDot: 0.45,
      boarHp: 100,
      playerCollisionRadius: 0.72,
      cameraYawSensitivity: 0.005,
      cameraPitchSensitivity: 0.004,
      cameraPitchMin: 0.08,
      cameraPitchMax: 0.78
    };

    // 木と猪を大きめにする
    const TREE_TARGET_HEIGHT = 7.0;
    const BOAR_TARGET_HEIGHT = 1.75;

    let cameraYaw = Math.PI;
    let cameraPitch = 0.22;

    const trees = [];
    const boars = [];
    const clock = new THREE.Clock();

    const tmp = {
      v1: new THREE.Vector3(),
      v2: new THREE.Vector3(),
      v3: new THREE.Vector3(),
      v4: new THREE.Vector3(),
      v5: new THREE.Vector3(),
      q: new THREE.Quaternion(),
      m: new THREE.Matrix4()
    };
    const upAxis = new THREE.Vector3(0, 1, 0);

    function setStatus(text) {
      uiStatus.textContent = text;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function rand(min, max) {
      return min + Math.random() * max;
    }

    function applyShadowsAndFixMaterials(object3D) {
      object3D.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          for (const mat of mats) {
            if (!mat) continue;
            mat.side = THREE.DoubleSide;
            mat.needsUpdate = true;
          }
        }
      });
    }

    // 拡大 → 中心合わせ → 地面にぴったり置く
    function fitScaleAndGround(model, targetHeight = config.modelHeight) {
      applyShadowsAndFixMaterials(model);

      model.updateMatrixWorld(true);

      const box1 = new THREE.Box3().setFromObject(model);
      const size1 = box1.getSize(new THREE.Vector3());
      const center1 = box1.getCenter(new THREE.Vector3());

      const scale = targetHeight / Math.max(size1.y, 0.0001);
      model.scale.setScalar(scale);
      model.updateMatrixWorld(true);

      const box2 = new THREE.Box3().setFromObject(model);
      const center2 = box2.getCenter(new THREE.Vector3());

      // X/Z の中心を揃える
      model.position.x -= center2.x;
      model.position.z -= center2.z;

      // 地面( y = 0 )に合わせる
      model.position.y -= box2.min.y;

      model.updateMatrixWorld(true);

      return {
        scale,
        box: new THREE.Box3().setFromObject(model),
        size: new THREE.Box3().setFromObject(model).getSize(new THREE.Vector3())
      };
    }

    function collectRootNames(root) {
      const names = new Set();
      root.traverse((obj) => {
        if (!obj?.name) return;
        if (/^Armature$/i.test(obj.name) || /^RootNode$/i.test(obj.name) || /^Scene$/i.test(obj.name)) {
          names.add(obj.name);
        }
        if ((obj.isBone || obj.type === "Bone") && (!obj.parent || !obj.parent.isBone)) {
          names.add(obj.name);
        }
      });
      return [...names];
    }

    function stripRootMotionTracks(clip, rootNames) {
      if (!clip) return null;
      const c = clip.clone();

      c.tracks = c.tracks.filter((track) => {
        const name = track.name || "";
        const dot = name.lastIndexOf(".");
        if (dot === -1) return true;

        const target = name.slice(0, dot);
        const prop = name.slice(dot + 1);

        if (rootNames.some((r) => target === r || target.startsWith(r + ".") || target.startsWith(r + "_"))) {
          if (prop === "position" || prop === "quaternion" || prop === "scale") return false;
        }

        if (/Hips|hips|mixamorigHips|Pelvis|pelvis/i.test(target) && prop === "position") {
          return false;
        }

        return true;
      });

      return c;
    }

    function getCameraBasis() {
      const forward = new THREE.Vector3(
        -Math.sin(cameraYaw),
        0,
        -Math.cos(cameraYaw)
      ).normalize();

      const right = new THREE.Vector3(
        Math.cos(cameraYaw),
        0,
        -Math.sin(cameraYaw)
      ).normalize();

      return { forward, right };
    }

    function getCameraRelativeMoveDirection(inputX, inputZ) {
      const { forward, right } = getCameraBasis();

      tmp.v1.copy(right).multiplyScalar(inputX);
      tmp.v2.copy(forward).multiplyScalar(inputZ);
      tmp.v3.copy(tmp.v1).add(tmp.v2);

      if (tmp.v3.lengthSq() < 1e-8) return tmp.v3.set(0, 0, 0);
      return tmp.v3.normalize();
    }

    function wouldCollideAt(candidatePos) {
      for (const tree of trees) {
        const radius = config.playerCollisionRadius + (tree.userData.collisionRadius || 1.5);
        const dx = candidatePos.x - tree.position.x;
        const dz = candidatePos.z - tree.position.z;
        if ((dx * dx) + (dz * dz) < radius * radius) return true;
      }
      return false;
    }

    function moveWithCollision(dx, dz) {
      const current = playerRoot.position.clone();

      const full = current.clone();
      full.x += dx;
      full.z += dz;

      if (!wouldCollideAt(full)) {
        playerRoot.position.copy(full);
        return;
      }

      const xOnly = current.clone();
      xOnly.x += dx;
      if (!wouldCollideAt(xOnly)) {
        playerRoot.position.x = xOnly.x;
      }

      const zOnly = current.clone();
      zOnly.z += dz;
      if (!wouldCollideAt(zOnly)) {
        playerRoot.position.z = zOnly.z;
      }
    }

    async function loadBaseModel() {
      const base = await fbxLoader.loadAsync(WALK_FBX_URL);
      visualRoot = base;
      fitScaleAndGround(visualRoot, config.modelHeight);
      visualRoot.rotation.y = VISUAL_LOCAL_YAW;
      playerRoot.add(visualRoot);
    }

    function firstClip(fbx) {
      if (!fbx.animations || fbx.animations.length === 0) return null;
      return fbx.animations[0];
    }

    async function loadAnimations() {
      const [walkFBX, runFBX, attackFBX] = await Promise.all([
        fbxLoader.loadAsync(WALK_FBX_URL),
        fbxLoader.loadAsync(RUN_FBX_URL),
        fbxLoader.loadAsync(ATTACK_FBX_URL)
      ]);

      const rootNames = collectRootNames(visualRoot);
      rootNames.push("Armature", "RootNode", "Scene");

      const walkClip = stripRootMotionTracks(firstClip(walkFBX), rootNames);
      const runClip = stripRootMotionTracks(firstClip(runFBX), rootNames);
      const attackClip = stripRootMotionTracks(firstClip(attackFBX), rootNames);

      mixer = new THREE.AnimationMixer(visualRoot);

      if (walkClip) {
        actions.walk = mixer.clipAction(walkClip);
        actions.walk.setLoop(THREE.LoopRepeat, Infinity);
        actions.walk.clampWhenFinished = false;
        actions.walk.enabled = true;
      }

      if (runClip) {
        actions.run = mixer.clipAction(runClip);
        actions.run.setLoop(THREE.LoopRepeat, Infinity);
        actions.run.clampWhenFinished = false;
        actions.run.enabled = true;
      }

      if (attackClip) {
        actions.attack = mixer.clipAction(attackClip);
        actions.attack.setLoop(THREE.LoopOnce, 1);
        actions.attack.clampWhenFinished = true;
        actions.attack.enabled = true;
      }

      mixer.addEventListener("finished", (event) => {
        if (event.action === actions.attack) {
          attackPlaying = false;
          syncLocomotion(true);
        }
      });
    }

    function stopAllActions(fade = 0.12) {
      for (const key of ["walk", "run", "attack"]) {
        const a = actions[key];
        if (!a) continue;
        a.fadeOut(fade);
      }
    }

    function hardStopAction(name) {
      const a = actions[name];
      if (!a) return;
      a.stop();
      a.reset();
      a.paused = false;
    }

    function playAction(name, fade = 0.14) {
      const next = actions[name];
      if (!next) return;

      for (const key of ["walk", "run"]) {
        if (key !== name) hardStopAction(key);
      }

      next.reset();
      next.enabled = true;
      next.paused = false;
      next.setEffectiveWeight(1);
      next.fadeIn(fade).play();
      currentActionName = name;
    }

    function currentSpeed() {
      return config.walkSpeed * ((dashMode || dashHeld) ? config.dashMultiplier : 1.0);
    }

    function getKeyboardMoveVector() {
      const x =
        (keys.has("KeyD") || keys.has("ArrowRight") ? 1 : 0) +
        (keys.has("KeyA") || keys.has("ArrowLeft") ? -1 : 0);

      const z =
        (keys.has("KeyW") || keys.has("ArrowUp") ? 1 : 0) +
        (keys.has("KeyS") || keys.has("ArrowDown") ? -1 : 0);

      return { x, z };
    }

    function getMoveInput() {
      const k = getKeyboardMoveVector();

      let x = clamp(k.x + stick.x, -1, 1);
      let z = clamp(k.z + (-stick.y), -1, 1);

      const len = Math.hypot(x, z);
      if (len > 1) {
        x /= len;
        z /= len;
      }

      return {
        x,
        z,
        magnitude: Math.hypot(x, z),
        jump: keys.has("Space"),
        attack: keys.has("KeyJ") || keys.has("KeyK")
      };
    }

    function requestJump() {
      if (!physics.onGround) return;
      physics.vy = config.jumpVelocity;
      physics.onGround = false;
    }

    function getCharacterForwardVector() {
      return new THREE.Vector3(0, 0, -1).applyQuaternion(playerRoot.quaternion).normalize();
    }

    function applyAttackDamage() {
      if (!boars.length) return;

      const playerPos = tmp.v1.set(playerRoot.position.x, playerRoot.position.y, playerRoot.position.z);
      const forward = getCharacterForwardVector();

      for (let i = boars.length - 1; i >= 0; i--) {
        const boar = boars[i];
        if (boar.dead || !boar.root.visible) continue;

        tmp.v2.set(boar.root.position.x, boar.root.position.y, boar.root.position.z);
        tmp.v3.copy(tmp.v2).sub(playerPos);
        tmp.v3.y = 0;

        const dist = tmp.v3.length();
        if (dist > config.attackRange) continue;

        const dir = tmp.v3.clone().normalize();
        if (forward.dot(dir) < config.attackConeDot) continue;

        boar.hp -= config.attackDamage;

        if (boar.hp <= 0) {
          boar.dead = true;
          scene.remove(boar.root);
          boars.splice(i, 1);
        }
      }
    }

    function startAttack() {
      const a = actions.attack;
      if (!a || attackPlaying) return;

      attackPlaying = true;
      stopAllActions(0.05);

      a.reset();
      a.enabled = true;
      a.paused = false;
      a.clampWhenFinished = true;
      a.setLoop(THREE.LoopOnce, 1);
      a.play();
      currentActionName = "attack";

      applyAttackDamage();
    }

    function setDashMode(on) {
      dashMode = on;
      dashBtn.classList.toggle("active", dashMode);
      if (!attackPlaying) syncLocomotion(true);
    }

    function syncLocomotion(force = false) {
      if (attackPlaying && !force) return;

      const input = getMoveInput();
      const moving = input.magnitude > 0.001;

      if (!moving) {
        if (currentActionName !== "idle") {
          hardStopAction("walk");
          hardStopAction("run");
          currentActionName = "idle";
        }
        return;
      }

      const desired = (dashMode || dashHeld) ? "run" : "walk";

      if (force || currentActionName !== desired) {
        stopAllActions(0.08);
        playAction(desired, 0.08);
      } else {
        const a = actions[desired];
        if (a && !a.isRunning()) a.play();
        if (a) a.paused = false;
      }
    }

    function updateJoystickVisual() {
      const px = stick.x * stick.radius;
      const py = stick.y * stick.radius;
      joyKnob.style.transform = `translate(${px}px, ${py}px)`;
    }

    function resetJoystick() {
      stick.active = false;
      stick.pointerId = null;
      stick.x = 0;
      stick.y = 0;
      updateJoystickVisual();
    }

    const joystickEl = document.getElementById("joystick");
    const joyKnob = document.getElementById("joyKnob");
    const jumpBtn = document.getElementById("jumpBtn");

    joystickEl.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      stick.active = true;
      stick.pointerId = e.pointerId;
      joystickEl.setPointerCapture(e.pointerId);

      const rect = joystickEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const len = Math.hypot(dx, dy);
      const maxLen = stick.radius;

      let nx = dx / maxLen;
      let ny = dy / maxLen;

      if (len > maxLen) {
        nx = dx / len;
        ny = dy / len;
      }

      stick.x = clamp(nx, -1, 1);
      stick.y = clamp(ny, -1, 1);
      updateJoystickVisual();
    });

    joystickEl.addEventListener("pointermove", (e) => {
      if (!stick.active || e.pointerId !== stick.pointerId) return;
      e.preventDefault();

      const rect = joystickEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const len = Math.hypot(dx, dy);
      const maxLen = stick.radius;

      let nx = dx / maxLen;
      let ny = dy / maxLen;

      if (len > maxLen) {
        nx = dx / len;
        ny = dy / len;
      }

      stick.x = clamp(nx, -1, 1);
      stick.y = clamp(ny, -1, 1);
      updateJoystickVisual();
    });

    function endJoystick(e) {
      if (e.pointerId !== stick.pointerId) return;
      resetJoystick();
    }

    joystickEl.addEventListener("pointerup", endJoystick);
    joystickEl.addEventListener("pointercancel", endJoystick);
    joystickEl.addEventListener("lostpointercapture", () => resetJoystick());

    jumpBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      requestJump();
    });

    dashBtn.addEventListener("click", () => {
      setDashMode(!dashMode);
    });

    attackBtn.addEventListener("click", () => {
      startAttack();
    });

    window.addEventListener("keydown", (e) => {
      if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "KeyW", "KeyA", "KeyS", "KeyD", "ShiftLeft", "ShiftRight", "KeyJ", "KeyK"].includes(e.code)) {
        e.preventDefault();
      }
      keys.add(e.code);

      if (e.code === "Space") requestJump();
      if (e.code === "ShiftLeft" || e.code === "ShiftRight") dashHeld = true;
      if (e.code === "KeyJ" || e.code === "KeyK") startAttack();
    }, { passive: false });

    window.addEventListener("keyup", (e) => {
      keys.delete(e.code);
      if (e.code === "ShiftLeft" || e.code === "ShiftRight") dashHeld = false;
    });

    let cameraDragging = false;
    let cameraPointerId = null;
    let cameraLastX = 0;
    let cameraLastY = 0;

    function startCameraDrag(e) {
      if (e.pointerType === "mouse" && e.button !== 0) return;
      cameraDragging = true;
      cameraPointerId = e.pointerId;
      cameraLastX = e.clientX;
      cameraLastY = e.clientY;
      renderer.domElement.setPointerCapture(e.pointerId);
    }

    function moveCameraDrag(e) {
      if (!cameraDragging || e.pointerId !== cameraPointerId) return;

      const dx = e.clientX - cameraLastX;
      const dy = e.clientY - cameraLastY;

      cameraYaw -= dx * config.cameraYawSensitivity;
      cameraPitch = clamp(
        cameraPitch - dy * config.cameraPitchSensitivity,
        config.cameraPitchMin,
        config.cameraPitchMax
      );

      cameraLastX = e.clientX;
      cameraLastY = e.clientY;
    }

    function endCameraDrag(e) {
      if (e.pointerId !== cameraPointerId) return;
      cameraDragging = false;
      cameraPointerId = null;
    }

    renderer.domElement.addEventListener("pointerdown", startCameraDrag);
    renderer.domElement.addEventListener("pointermove", moveCameraDrag);
    renderer.domElement.addEventListener("pointerup", endCameraDrag);
    renderer.domElement.addEventListener("pointercancel", endCameraDrag);
    renderer.domElement.addEventListener("lostpointercapture", () => {
      cameraDragging = false;
      cameraPointerId = null;
    });

    function randomWorldPosition(minR = 18, maxR = 95) {
      const angle = Math.random() * Math.PI * 2;
      const dist = rand(minR, maxR);
      return {
        x: Math.cos(angle) * dist,
        z: Math.sin(angle) * dist
      };
    }

    async function addForestTrees() {
      const treeGroup = new THREE.Group();
      scene.add(treeGroup);

      const positions = [];
      const count = 30;

      for (let i = 0; i < count; i++) {
        const p = randomWorldPosition(25, 105);
        if (Math.hypot(p.x, p.z) < 14) {
          i--;
          continue;
        }
        positions.push({
          x: p.x,
          z: p.z,
          scale: 0.85 + Math.random() * 0.95,
          rotY: Math.random() * Math.PI * 2
        });
      }

      try {
        const treeGLTF = await gltfLoader.loadAsync(TREE_URL);
        const template = treeGLTF.scene;

        // まず見本を1本作って、当たり判定サイズを決める
        const sample = template.clone(true);
        fitScaleAndGround(sample, TREE_TARGET_HEIGHT);
        const sampleBox = new THREE.Box3().setFromObject(sample);
        const sampleSize = sampleBox.getSize(new THREE.Vector3());
        const baseRadius = Math.max(sampleSize.x, sampleSize.z) * 0.42;

        for (const p of positions) {
          const tree = template.clone(true);
          fitScaleAndGround(tree, TREE_TARGET_HEIGHT * p.scale);

          tree.position.set(p.x, 0, p.z);
          tree.rotation.y = p.rotY;

          tree.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });

          tree.userData.collisionRadius = baseRadius * p.scale + 0.7;
          treeGroup.add(tree);
          trees.push(tree);
        }
      } catch (err) {
        console.warn("tree.glb load failed, using fallback trees.", err);

        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x7b4f2a, roughness: 1.0 });
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x2f7d32, roughness: 1.0 });

        for (const p of positions) {
          const tree = new THREE.Group();

          const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.33, 2.4, 8), trunkMat);
          trunk.position.y = 1.2;
          trunk.castShadow = true;
          trunk.receiveShadow = true;

          const crown1 = new THREE.Mesh(new THREE.ConeGeometry(1.15, 2.8, 8), leafMat);
          crown1.position.y = 3.2;
          crown1.castShadow = true;
          crown1.receiveShadow = true;

          const crown2 = new THREE.Mesh(new THREE.ConeGeometry(0.95, 2.2, 8), leafMat);
          crown2.position.y = 4.0;
          crown2.castShadow = true;
          crown2.receiveShadow = true;

          tree.add(trunk, crown1, crown2);

          // フォールバックも大きめに
          tree.position.set(p.x, 0, p.z);
          tree.rotation.y = p.rotY;
          tree.scale.setScalar(1.0 + p.scale * 0.55);
          tree.userData.collisionRadius = 1.9 * p.scale + 0.6;
          treeGroup.add(tree);
          trees.push(tree);
        }
      }
    }

    function createFallbackBoar() {
      const boar = new THREE.Group();

      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x6b4b2b, roughness: 1.0 });
      const snoutMat = new THREE.MeshStandardMaterial({ color: 0x7f6044, roughness: 1.0 });
      const earMat = new THREE.MeshStandardMaterial({ color: 0x5c3f23, roughness: 1.0 });

      const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.9, 0.9), bodyMat);
      body.position.y = 0.8;
      body.castShadow = true;
      body.receiveShadow = true;

      const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.55, 0.65), snoutMat);
      head.position.set(1.15, 0.85, 0);
      head.castShadow = true;
      head.receiveShadow = true;

      const snout = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.22, 0.24), snoutMat);
      snout.position.set(1.52, 0.78, 0);
      snout.castShadow = true;
      snout.receiveShadow = true;

      const ear1 = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.3, 4), earMat);
      ear1.position.set(0.95, 1.18, 0.22);
      ear1.rotation.z = Math.PI / 2;
      ear1.rotation.x = -0.3;
      ear1.castShadow = true;
      ear1.receiveShadow = true;

      const ear2 = ear1.clone();
      ear2.position.z = -0.22;

      const legGeo = new THREE.CylinderGeometry(0.1, 0.12, 0.7, 6);
      const legOffsets = [
        [-0.6, 0.25, 0.3],
        [-0.6, 0.25, -0.3],
        [0.5, 0.25, 0.3],
        [0.5, 0.25, -0.3]
      ];
      for (const [x, y, z] of legOffsets) {
        const leg = new THREE.Mesh(legGeo, bodyMat);
        leg.position.set(x, y, z);
        leg.castShadow = true;
        leg.receiveShadow = true;
        boar.add(leg);
      }

      boar.add(body, head, snout, ear1, ear2);
      return boar;
    }

    async function addBoars() {
      const positions = [];
      const count = 15;

      for (let i = 0; i < count; i++) {
        const p = randomWorldPosition(20, 105);
        if (Math.hypot(p.x, p.z) < 18) {
          i--;
          continue;
        }
        positions.push({
          x: p.x,
          z: p.z,
          rotY: Math.random() * Math.PI * 2,
          scale: 0.8 + Math.random() * 0.55
        });
      }

      try {
        const boarGLTF = await gltfLoader.loadAsync(BOAR_URL);
        const template = boarGLTF.scene;

        for (const p of positions) {
          const boarRoot = template.clone(true);

          // 先に拡大してから地面に合わせる
          fitScaleAndGround(boarRoot, BOAR_TARGET_HEIGHT * p.scale);

          boarRoot.position.set(p.x, 0, p.z);
          boarRoot.rotation.y = p.rotY;

          boarRoot.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });

          scene.add(boarRoot);
          boars.push({
            root: boarRoot,
            hp: config.boarHp,
            dead: false
          });
        }
      } catch (err) {
        console.warn("boar.glb load failed, using fallback boars.", err);

        for (const p of positions) {
          const boarRoot = createFallbackBoar();

          // フォールバックもちゃんと地面に乗せる
          fitScaleAndGround(boarRoot, BOAR_TARGET_HEIGHT * p.scale);

          boarRoot.position.set(p.x, 0, p.z);
          boarRoot.rotation.y = p.rotY;

          scene.add(boarRoot);

          boars.push({
            root: boarRoot,
            hp: config.boarHp,
            dead: false
          });
        }
      }
    }

    function updateMovement(delta) {
      const input = getMoveInput();

      if (input.jump) requestJump();
      if (input.attack) startAttack();

      const moving = input.magnitude > 0.001;

      if (moving) {
        const moveDir = getCameraRelativeMoveDirection(input.x, input.z);

        if (moveDir.lengthSq() > 1e-8) {
          tmp.m.lookAt(new THREE.Vector3(0, 0, 0), moveDir, upAxis);
          tmp.q.setFromRotationMatrix(tmp.m);

          playerRoot.quaternion.rotateTowards(tmp.q, config.turnSpeed * delta);

          const currentForward = new THREE.Vector3(0, 0, -1).applyQuaternion(playerRoot.quaternion).normalize();

          const align = clamp(currentForward.dot(moveDir), 0, 1);
          const moveScale = align * align;

          const speed = currentSpeed() * input.magnitude * moveScale;
          const dx = currentForward.x * speed * delta;
          const dz = currentForward.z * speed * delta;

          moveWithCollision(dx, dz);

          if (!attackPlaying) syncLocomotion(false);
        }
      } else if (!attackPlaying && currentActionName !== "idle") {
        hardStopAction("walk");
        hardStopAction("run");
        currentActionName = "idle";
      }

      physics.vy += config.gravity * delta;
      playerRoot.position.y += physics.vy * delta;

      if (playerRoot.position.y <= 0) {
        playerRoot.position.y = 0;
        physics.vy = 0;
        physics.onGround = true;
      }

      setStatus(
        attackPlaying
          ? "攻撃中"
          : physics.onGround
            ? (moving ? (dashMode || dashHeld ? "ダッシュ中" : "移動中") : "待機中")
            : (moving ? "移動中 / ジャンプ中" : "ジャンプ中")
      );
    }

    function updateCamera(delta) {
      const cosPitch = Math.cos(cameraPitch);
      const sinPitch = Math.sin(cameraPitch);

      const offset = new THREE.Vector3(
        Math.sin(cameraYaw) * cosPitch,
        sinPitch,
        Math.cos(cameraYaw) * cosPitch
      ).multiplyScalar(config.cameraDistance);

      const target = new THREE.Vector3(
        playerRoot.position.x,
        playerRoot.position.y + config.targetHeight,
        playerRoot.position.z
      );

      const desiredCameraPos = new THREE.Vector3().copy(target).add(offset);
      const lerpAlpha = 1 - Math.exp(-config.cameraSmooth * delta);
      camera.position.lerp(desiredCameraPos, lerpAlpha);
      camera.lookAt(target);
    }

    async function bootstrap() {
      try {
        setStatus("モデルを読み込み中…");
        await loadBaseModel();
        await loadAnimations();
        await addForestTrees();
        await addBoars();
        loading.classList.add("hidden");
        setStatus("待機中");
      } catch (err) {
        console.error(err);
        loading.classList.add("hidden");
        setStatus("読み込み失敗");
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.033);

      updateMovement(delta);

      if (mixer) {
        mixer.update(delta);
      }

      updateCamera(delta);
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    bootstrap();
    animate();
  </script>
</body>
