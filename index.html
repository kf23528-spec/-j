<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Character Animation Controller</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #eef2f7;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }
    canvas { display: block; }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(238, 242, 247, 0.78);
      backdrop-filter: blur(8px);
      color: #222;
      font-size: 16px;
      font-weight: 800;
      transition: opacity 0.25s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #ui {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 20;
      min-width: 280px;
      max-width: min(92vw, 460px);
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      color: #222;
      line-height: 1.5;
      font-size: 14px;
      user-select: none;
    }
    #title {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 4px;
    }
    #meta {
      font-size: 12px;
      opacity: 0.8;
      word-break: break-word;
    }
    #status {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #1d3f7a;
    }
    #help {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.82;
      line-height: 1.5;
    }
    #buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .modeBtn {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      background: #2f82ff;
      box-shadow: 0 8px 18px rgba(47, 130, 255, 0.22);
    }
    .modeBtn.active {
      background: #1d5fc0;
    }
    .modeBtn.attack {
      background: #ff6a2c;
      box-shadow: 0 8px 18px rgba(255, 106, 44, 0.22);
    }
    .modeBtn.attack.active {
      background: #cc4e1d;
    }

    #joystick {
      position: fixed;
      left: 18px;
      bottom: 18px;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 10px 30px rgba(0,0,0,0.08);
      backdrop-filter: blur(8px);
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 25;
    }
    #joystick::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.35);
    }
    #joyKnob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 54px;
      height: 54px;
      margin-left: -27px;
      margin-top: -27px;
      border-radius: 50%;
      background: rgba(47, 130, 255, 0.9);
      box-shadow: 0 8px 18px rgba(47, 130, 255, 0.25);
      transform: translate(0, 0);
    }

    #jumpBtn {
      position: fixed;
      right: 18px;
      bottom: 28px;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 0;
      background: linear-gradient(180deg, #ff8f4d, #ff6a2c);
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.03em;
      box-shadow: 0 10px 24px rgba(255, 106, 44, 0.28);
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      z-index: 25;
    }
    #jumpBtn:active { transform: scale(0.97); }

    @media (max-width: 700px) {
      #ui {
        min-width: 0;
        max-width: calc(100vw - 24px);
      }
      #help { font-size: 11px; }
      #jumpBtn {
        width: 94px;
        height: 94px;
        font-size: 16px;
      }
      #joystick {
        width: 118px;
        height: 118px;
      }
      #joyKnob {
        width: 48px;
        height: 48px;
        margin-left: -24px;
        margin-top: -24px;
      }
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="loading">読み込み中…</div>

  <div id="ui">
    <div id="title">Character 操作ビューア</div>
    <div id="meta">
      表示モデル: <span id="fileName">characteranimation.glb</span><br>
      歩き: <span id="walkName">Meshy_AI_biped_Animation_Walking_withSkin.fbx</span><br>
      攻撃: <span id="attackName">Meshy_AI_biped_Animation_Attack_withSkin.fbx</span><br>
      走り: <span id="runName">Meshy_AI_biped_Animation_Running_withSkin.fbx</span>
    </div>
    <div id="status">待機中</div>
    <div id="buttons">
      <button id="runBtn" class="modeBtn">走る</button>
      <button id="attackBtn" class="modeBtn attack">攻撃</button>
    </div>
    <div id="help">
      操作: WASD / 矢印キー / 画面スティック / ジャンプボタン<br>
      W/S = 前進・後退, A/D = 回転, Space = ジャンプ
    </div>
  </div>

  <div id="joystick" aria-label="joystick">
    <div id="joyKnob"></div>
  </div>
  <button id="jumpBtn">JUMP</button>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { FBXLoader } from "three/addons/loaders/FBXLoader.js";

    const BASE_MODEL_URL = "./characteranimation.glb";
    const WALK_FBX_URL = "./Meshy_AI_biped_Animation_Walking_withSkin.fbx";
    const ATTACK_FBX_URL = "./Meshy_AI_biped_Animation_Attack_withSkin.fbx";
    const RUN_FBX_URL = "./Meshy_AI_biped_Animation_Running_withSkin.fbx";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xEEF2F7);
    scene.fog = new THREE.Fog(0xEEF2F7, 18, 120);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 2.5, 6.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.4;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.domElement.style.touchAction = "none";
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0xc9d6ff, 2.6));

    const sun = new THREE.DirectionalLight(0xffffff, 3.2);
    sun.position.set(8, 16, 6);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 60;
    sun.shadow.camera.left = -20;
    sun.shadow.camera.right = 20;
    sun.shadow.camera.top = 20;
    sun.shadow.camera.bottom = -20;
    scene.add(sun);

    const fill = new THREE.PointLight(0xffffff, 1.2, 80);
    fill.position.set(-6, 8, -4);
    scene.add(fill);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(250, 250),
      new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1.0, metalness: 0.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(250, 125, 0x7a7a7a, 0xbfc7d1);
    grid.material.transparent = true;
    grid.material.opacity = 0.32;
    scene.add(grid);

    const gltfLoader = new GLTFLoader();
    const fbxLoader = new FBXLoader();

    const uiStatus = document.getElementById("status");
    const loading = document.getElementById("loading");
    const fileName = document.getElementById("fileName");
    const walkName = document.getElementById("walkName");
    const attackName = document.getElementById("attackName");
    const runName = document.getElementById("runName");
    const runBtn = document.getElementById("runBtn");
    const attackBtn = document.getElementById("attackBtn");

    fileName.textContent = "characteranimation.glb";
    walkName.textContent = "Meshy_AI_biped_Animation_Walking_withSkin.fbx";
    attackName.textContent = "Meshy_AI_biped_Animation_Attack_withSkin.fbx";
    runName.textContent = "Meshy_AI_biped_Animation_Running_withSkin.fbx";

    const player = new THREE.Group();
    scene.add(player);

    let modelRoot = null;
    let mixer = null;

    const actions = {
      walk: null,
      attack: null,
      run: null
    };

    let currentLocomotion = "idle"; // idle | walk | run
    let attackPlaying = false;
    let runMode = false;

    const keys = new Set();

    const stick = {
      active: false,
      pointerId: null,
      x: 0,
      y: 0,
      radius: 40
    };

    const physics = {
      vy: 0,
      onGround: true
    };

    const config = {
      moveSpeed: 4.8,
      turnSpeed: 2.6,
      gravity: -22.0,
      jumpVelocity: 8.8,
      cameraHeight: 2.55,
      cameraDistance: 6.9,
      cameraSmooth: 8.5,
      targetHeight: 1.5,
      modelHeight: 2.45
    };

    const clock = new THREE.Clock();

    function setStatus(text) {
      uiStatus.textContent = text;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function applyShadowsAndFixMaterials(object3D) {
      object3D.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          for (const mat of mats) {
            if (!mat) continue;
            mat.side = THREE.DoubleSide;
            mat.needsUpdate = true;
          }
        }
      });
    }

    function fitAndGround(model) {
      applyShadowsAndFixMaterials(model);

      const box1 = new THREE.Box3().setFromObject(model);
      const center1 = box1.getCenter(new THREE.Vector3());
      model.position.x -= center1.x;
      model.position.z -= center1.z;

      const box2 = new THREE.Box3().setFromObject(model);
      const size2 = box2.getSize(new THREE.Vector3());
      const scale = config.modelHeight / Math.max(size2.y, 0.0001);
      model.scale.setScalar(scale);

      const box3 = new THREE.Box3().setFromObject(model);
      const center3 = box3.getCenter(new THREE.Vector3());
      const minY = box3.min.y;

      model.position.x -= center3.x;
      model.position.z -= center3.z;
      model.position.y -= minY;

      model.rotation.y = Math.PI;
      return model;
    }

    async function loadBaseModel() {
      try {
        const gltf = await gltfLoader.loadAsync(BASE_MODEL_URL);
        const model = gltf.scene;
        fitAndGround(model);
        modelRoot = model;
        player.add(modelRoot);
        return true;
      } catch (e) {
        console.warn("GLB base model failed, trying FBX fallback...", e);
        try {
          const fbx = await fbxLoader.loadAsync(BASE_MODEL_URL);
          const model = fbx;
          fitAndGround(model);
          modelRoot = model;
          player.add(modelRoot);
          return true;
        } catch (e2) {
          console.error("Base model load failed:", e2);
          return false;
        }
      }
    }

    async function loadClip(url, key) {
      const fbx = await fbxLoader.loadAsync(url);
      const clip = fbx.animations && fbx.animations.length > 0 ? fbx.animations[0] : null;
      if (!clip) {
        console.warn(`No animation clip found in ${url}`);
        return;
      }
      actions[key] = mixer.clipAction(clip);
      actions[key].setLoop(key === "attack" ? THREE.LoopOnce : THREE.LoopRepeat, key === "attack" ? 1 : Infinity);
      actions[key].clampWhenFinished = key === "attack";
      actions[key].enabled = true;
      console.log(`${key} clip loaded:`, clip.name, clip);
    }

    async function loadAll() {
      setStatus("モデルを読み込み中…");
      const ok = await loadBaseModel();
      if (!ok) {
        loading.classList.add("hidden");
        setStatus("読み込み失敗");
        return;
      }

      mixer = new THREE.AnimationMixer(modelRoot);

      try {
        await loadClip(WALK_FBX_URL, "walk");
        await loadClip(ATTACK_FBX_URL, "attack");
        await loadClip(RUN_FBX_URL, "run");
      } catch (e) {
        console.error("Animation loading failed:", e);
      }

      mixer.addEventListener("finished", (event) => {
        if (event.action === actions.attack) {
          attackPlaying = false;
          syncLocomotion(true);
        }
      });

      loading.classList.add("hidden");
      setStatus("待機中");
      console.log("Loaded actions:", actions);
    }

    function stopAllActions() {
      for (const key of ["walk", "attack", "run"]) {
        const a = actions[key];
        if (!a) continue;
        a.stop();
        a.reset();
        a.paused = false;
      }
    }

    function playAction(key) {
      const a = actions[key];
      if (!a) return;
      stopAllActions();
      a.reset();
      a.paused = false;
      a.enabled = true;
      a.play();
      if (key !== "attack") {
        currentLocomotion = key;
      }
    }

    function syncLocomotion(force = false) {
      if (!actions.walk && !actions.run) return;
      if (attackPlaying && !force) return;

      const input = getCombinedInput();
      const isMoving = Math.abs(input.forward) > 0.001 || Math.abs(input.turn) > 0.001;

      if (!isMoving) {
        if (currentLocomotion !== "idle") {
          stopAllActions();
          currentLocomotion = "idle";
        }
        return;
      }

      const next = runMode ? "run" : "walk";
      if (currentLocomotion !== next || force) {
        playAction(next);
      } else {
        const a = actions[next];
        if (a && !a.isRunning()) a.play();
        if (a) a.paused = false;
      }
    }

    function startAttack() {
      const a = actions.attack;
      if (!a) return;
      attackPlaying = true;
      stopAllActions();
      a.reset();
      a.enabled = true;
      a.clampWhenFinished = true;
      a.setLoop(THREE.LoopOnce, 1);
      a.play();
    }

    function setRunMode(on) {
      runMode = on;
      runBtn.classList.toggle("active", runMode);
      if (!attackPlaying) syncLocomotion(true);
    }

    function getKeyboardState() {
      const forward =
        (keys.has("KeyW") || keys.has("ArrowUp") ? 1 : 0) +
        (keys.has("KeyS") || keys.has("ArrowDown") ? -1 : 0);

      const turn =
        (keys.has("KeyA") || keys.has("ArrowLeft") ? 1 : 0) +
        (keys.has("KeyD") || keys.has("ArrowRight") ? 1 : 0);

      const jump = keys.has("Space");
      return { forward, turn, jump };
    }

    function getCombinedInput() {
      const k = getKeyboardState();
      return {
        forward: clamp(k.forward + (-stick.y), -1, 1),
        turn: clamp(k.turn + stick.x, -1, 1),
        jump: k.jump
      };
    }

    function requestJump() {
      if (!physics.onGround) return;
      physics.vy = config.jumpVelocity;
      physics.onGround = false;
    }

    const joystickEl = document.getElementById("joystick");
    const joyKnob = document.getElementById("joyKnob");
    const jumpBtn = document.getElementById("jumpBtn");

    function updateJoystickVisual() {
      const px = stick.x * stick.radius;
      const py = stick.y * stick.radius;
      joyKnob.style.transform = `translate(${px}px, ${py}px)`;
    }

    function resetJoystick() {
      stick.active = false;
      stick.pointerId = null;
      stick.x = 0;
      stick.y = 0;
      updateJoystickVisual();
    }

    joystickEl.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      stick.active = true;
      stick.pointerId = e.pointerId;
      joystickEl.setPointerCapture(e.pointerId);

      const rect = joystickEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const len = Math.hypot(dx, dy);
      const maxLen = stick.radius;

      let nx = dx / maxLen;
      let ny = dy / maxLen;

      if (len > maxLen) {
        nx = dx / len;
        ny = dy / len;
      }

      stick.x = clamp(nx, -1, 1);
      stick.y = clamp(ny, -1, 1);
      updateJoystickVisual();
    });

    joystickEl.addEventListener("pointermove", (e) => {
      if (!stick.active || e.pointerId !== stick.pointerId) return;
      e.preventDefault();

      const rect = joystickEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const len = Math.hypot(dx, dy);
      const maxLen = stick.radius;

      let nx = dx / maxLen;
      let ny = dy / maxLen;

      if (len > maxLen) {
        nx = dx / len;
        ny = dy / len;
      }

      stick.x = clamp(nx, -1, 1);
      stick.y = clamp(ny, -1, 1);
      updateJoystickVisual();
    });

    function endJoystick(e) {
      if (e.pointerId !== stick.pointerId) return;
      resetJoystick();
    }

    joystickEl.addEventListener("pointerup", endJoystick);
    joystickEl.addEventListener("pointercancel", endJoystick);
    joystickEl.addEventListener("lostpointercapture", () => resetJoystick());

    jumpBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      requestJump();
    });

    runBtn.addEventListener("click", () => {
      setRunMode(!runMode);
    });

    attackBtn.addEventListener("click", () => {
      startAttack();
    });

    window.addEventListener("keydown", (e) => {
      if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "KeyW", "KeyA", "KeyS", "KeyD"].includes(e.code)) {
        e.preventDefault();
      }
      keys.add(e.code);
      if (e.code === "Space") requestJump();
    }, { passive: false });

    window.addEventListener("keyup", (e) => {
      keys.delete(e.code);
    });

    function updateMovement(delta) {
      const input = getCombinedInput();

      if (input.jump) {
        requestJump();
      }

      if (Math.abs(input.turn) > 0.001) {
        player.rotation.y += input.turn * config.turnSpeed * delta;
      }

      const facingYaw = player.rotation.y + Math.PI;

      if (Math.abs(input.forward) > 0.001) {
        player.position.x += Math.sin(facingYaw) * input.forward * config.moveSpeed * delta;
        player.position.z += Math.cos(facingYaw) * input.forward * config.moveSpeed * delta;
      }

      physics.vy += config.gravity * delta;
      player.position.y += physics.vy * delta;

      if (player.position.y <= 0) {
        player.position.y = 0;
        physics.vy = 0;
        physics.onGround = true;
      }

      const isMoving = Math.abs(input.forward) > 0.001 || Math.abs(input.turn) > 0.001;

      if (!attackPlaying) {
        if (isMoving) {
          const desired = runMode ? "run" : "walk";
          if (currentLocomotion !== desired) {
            playAction(desired);
          } else {
            const a = actions[desired];
            if (a && !a.isRunning()) a.play();
            if (a) a.paused = false;
          }
        } else {
          if (currentLocomotion !== "idle") {
            stopAllActions();
            currentLocomotion = "idle";
          }
        }
      }

      setStatus(
        attackPlaying
          ? "攻撃中"
          : physics.onGround
            ? (isMoving ? (runMode ? "走行中" : "移動中") : "待機中")
            : (isMoving ? "移動中 / ジャンプ中" : "ジャンプ中")
      );
    }

    function updateCamera(delta) {
      const facingYaw = player.rotation.y + Math.PI;
      const offset = new THREE.Vector3(0, config.cameraHeight, config.cameraDistance);
      offset.applyAxisAngle(new THREE.Vector3(0, 1, 0), facingYaw);

      const desiredCameraPos = new THREE.Vector3().copy(player.position).add(offset);
      const lerpAlpha = 1 - Math.exp(-config.cameraSmooth * delta);
      camera.position.lerp(desiredCameraPos, lerpAlpha);

      camera.lookAt(
        player.position.x,
        player.position.y + config.targetHeight,
        player.position.z
      );
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.033);

      updateMovement(delta);

      if (mixer) {
        mixer.update(delta);
      }

      updateCamera(delta);
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    loadAll();
    animate();
  </script>
</body>
</html>
